name: Build Wireless Backports Modules for OP11R

on:
  workflow_dispatch:
    inputs:
      manifest:
        description: "Manifest preset"
        required: true
        default: "OOS16"
        type: choice
        options:
          - OOS14
          - OOS15
          - OOS16
      backports_release:
        description: "Stable backports release"
        required: true
        default: "backports-6.1.97-1"
        type: choice
        options:
          - backports-6.1.97-1

jobs:
  build-wireless-modules:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    env:
      MODEL: OP11R
      SOC: waipio
      CONFIG: OP11R
      BRANCH: oneplus/sm8475
      MANIFEST_OOS14_MODULES: oneplus_11r_u.xml
      MANIFEST_OOS15_MODULES: oneplus_11r_v.xml
      MANIFEST_OOS16_MODULES: oneplus_11r_b.xml

    steps:
      - name: Validate target
        shell: bash
        run: |
          set -euo pipefail
          [ "$MODEL" = "OP11R" ] || { echo "Wrong MODEL: $MODEL"; exit 1; }
          [ "$SOC" = "waipio" ] || { echo "Wrong SOC: $SOC"; exit 1; }
          echo "✓ Target validation passed"

      - name: Cleanup runner
        shell: bash
        run: |
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet /usr/share/swift /usr/local/.ghcup /usr/local/julia* \
            /usr/local/lib/android /usr/local/share/chromium /opt/microsoft /opt/google \
            /opt/az /usr/local/share/powershell /opt/hostedtoolcache 2>/dev/null || true
          docker system prune -af 2>/dev/null || true
          docker builder prune -af 2>/dev/null || true
          echo "Disk space after cleanup:"
          df -h

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git curl ca-certificates build-essential clang lld flex bison \
            libelf-dev libssl-dev libncurses-dev zlib1g-dev liblz4-tool \
            libxml2-utils rsync unzip dwarves file python3 ccache wget patch jq \
            coccinelle kmod bc perl xz-utils zip device-tree-compiler
          sudo apt-get clean
          echo "✓ Dependencies installed"

      - name: Set manifest
        shell: bash
        run: |
          set -euo pipefail
          case "${{ github.event.inputs.manifest }}" in
            OOS14) echo "MANIFEST=$MANIFEST_OOS14_MODULES" >> "$GITHUB_ENV" ;;
            OOS15) echo "MANIFEST=$MANIFEST_OOS15_MODULES" >> "$GITHUB_ENV" ;;
            OOS16) echo "MANIFEST=$MANIFEST_OOS16_MODULES" >> "$GITHUB_ENV" ;;
            *) echo "Unknown manifest"; exit 1 ;;
          esac

      - name: Install repo
        shell: bash
        run: |
          set -euo pipefail
          sudo curl -L https://storage.googleapis.com/git-repo-downloads/repo -o /usr/local/bin/repo
          sudo chmod +x /usr/local/bin/repo
          repo --version
          echo "✓ Repo tool installed"

      - name: Sync OP11R kernel source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$CONFIG"
          cd "$CONFIG"

          repo init -u https://github.com/OnePlusOSS/kernel_manifest.git \
            -b "$BRANCH" \
            -m "$MANIFEST" \
            --repo-rev=v2.16 \
            --depth=1 \
            --no-clone-bundle \
            --no-tags

          ok=false
          for i in 1 2 3; do
            echo "repo sync attempt $i"
            if repo sync -c --no-clone-bundle --no-tags --optimized-fetch -j"$(nproc --all)" --fail-fast; then
              ok=true
              break
            fi
            sleep 20
          done
          $ok || { echo "repo sync failed"; exit 1; }

      - name: Detect kernel version and prepare tree
        shell: bash
        run: |
          set -euo pipefail
          MSM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel"
          cd "$MSM"

          VERSION=$(grep '^VERSION *=' Makefile | awk '{print $3}')
          PATCHLEVEL=$(grep '^PATCHLEVEL *=' Makefile | awk '{print $3}')
          SUBLEVEL=$(grep '^SUBLEVEL *=' Makefile | awk '{print $3}')
          KERNEL_VER="${VERSION}.${PATCHLEVEL}.${SUBLEVEL}"
          echo "KERNEL_VER=$KERNEL_VER" >> "$GITHUB_ENV"
          echo "Detected kernel version: $KERNEL_VER"

          make ARCH=arm64 mrproper
          mkdir -p out

          ./scripts/kconfig/merge_config.sh -O out -m \
            arch/arm64/configs/gki_defconfig \
            arch/arm64/configs/vendor/${SOC}_GKI.config || true

          cp out/.config arch/arm64/configs/gki_defconfig
          make O=out ARCH=arm64 olddefconfig </dev/null

      - name: Detect clang
        shell: bash
        run: |
          set -euo pipefail
          KP="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
          FOUND=false

          for base in "$KP/prebuilts" "$KP/prebuilts-master"; do
            [ -d "$base/clang/host/linux-x86" ] || continue
            latest=$(ls -d "$base"/clang/host/linux-x86/clang-r*/ 2>/dev/null | sort -V | tail -n1 || true)
            if [ -n "$latest" ] && [ -x "$latest/bin/clang" ]; then
              echo "CLANG_BIN=$latest/bin" >> "$GITHUB_ENV"
              echo "Using prebuilt clang: $latest/bin"
              FOUND=true
              break
            fi
          done

          if ! $FOUND; then
            SYSTEM_CLANG=$(dirname "$(command -v clang)")
            echo "CLANG_BIN=$SYSTEM_CLANG" >> "$GITHUB_ENV"
            echo "Using system clang: $SYSTEM_CLANG"
          fi

      - name: Kernel prepare
        shell: bash
        run: |
          set -euo pipefail
          MSM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel"
          OUT="$MSM/out"

          export PATH="${CLANG_BIN}:$PATH:/usr/lib/ccache"
          export HOSTCC=clang
          export HOSTCXX=clang++

          MAKE_FLAGS=(
            LLVM=1
            LLVM_IAS=1
            ARCH=arm64
            SUBARCH=arm64
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
            LD=ld.lld
            HOSTLD=ld.lld
            AR=llvm-ar
            NM=llvm-nm
            OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump
            DEPMOD=depmod
            DTC=dtc
            STRIP=llvm-strip
            CC=clang
          )

          cd "$MSM"

          make "${MAKE_FLAGS[@]}" O="$OUT" gki_defconfig
          make "${MAKE_FLAGS[@]}" O="$OUT" olddefconfig </dev/null
          make "${MAKE_FLAGS[@]}" O="$OUT" prepare modules_prepare

          echo "✓ Kernel prepare complete"
          ls -la "$OUT" | head -20

      - name: Download backports
        shell: bash
        run: |
          set -euo pipefail
          RELEASE="${{ github.event.inputs.backports_release }}"
          wget -O backports.tar.xz \
            "https://cdn.kernel.org/pub/linux/kernel/projects/backports/stable/v6.1.97/backports-6.1.97-1.tar.xz"
          tar -xf backports.tar.xz
          mv "$RELEASE" backports-stable
          echo "✓ Backports extracted"

      # ✅ ԱՎԵԼԱՑՐԵՆՔ PATCH-Ը (ieee80211.h)
      - name: Apply ieee80211 backport patch for kernel 5.10
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p backports-stable/backport-include/linux
          curl -L --fail \
            https://raw.githubusercontent.com/docdry0001/kernel_patches/main/backports/ieee80211.h \
            -o backports-stable/backport-include/linux/ieee80211.h
          echo "✅ ieee80211 backport patch applied"

      - name: Configure backports (only mt76/mt7921u, disable CFI/LTO/SCS)
        shell: bash
        run: |
          set -euo pipefail
          cd backports-stable

          # Disable incompatible options (CFI, LTO, SCS) - these cause errors on 5.10
          cat >> .config <<'EOF'
          CPTCFG_CFI=n
          CPTCFG_LTO=n
          CPTCFG_KERNEL_CFI=n
          CPTCFG_SHADOW_CALL_STACK=n
          CPTCFG_STACK_VALIDATION=n
          EOF

          # Start from defconfig-wifi, then disable all vendors except MediaTek
          make defconfig-wifi

          # Disable all other wireless vendors to avoid ieee80211 struct conflicts
          ./scripts/config --disable CPTCFG_WLAN_VENDOR_ATH
          ./scripts/config --disable CPTCFG_WLAN_VENDOR_BROADCOM
          ./scripts/config --disable CPTCFG_WLAN_VENDOR_INTEL
          ./scripts/config --disable CPTCFG_WLAN_VENDOR_REALTEK
          ./scripts/config --disable CPTCFG_WLAN_VENDOR_RALINK
          ./scripts/config --disable CPTCFG_WLAN_VENDOR_INTERSIL
          ./scripts/config --disable CPTCFG_WLAN_VENDOR_MARVELL
          ./scripts/config --disable CPTCFG_WLAN_VENDOR_QUANTENNA
          ./scripts/config --disable CPTCFG_WLAN_VENDOR_RSI
          ./scripts/config --disable CPTCFG_WLAN_VENDOR_ST
          ./scripts/config --disable CPTCFG_WLAN_VENDOR_TI
          ./scripts/config --disable CPTCFG_WLAN_VENDOR_ZYDAS

          # Enable only MediaTek and mt7921u
          ./scripts/config --enable CPTCFG_WLAN_VENDOR_MEDIATEK
          ./scripts/config --module CPTCFG_MT76_CORE
          ./scripts/config --module CPTCFG_MT76_USB
          ./scripts/config --module CPTCFG_MT7921_COMMON
          ./scripts/config --module CPTCFG_MT7921U

          # Finalize
          make olddefconfig

          # Verify mt7921u is enabled
          grep -q "CPTCFG_MT7921U=m" .config || { echo "mt7921u not enabled"; exit 1; }
          echo "✓ Backports configured for mt7921u"

      - name: Build wireless backports modules
        shell: bash
        run: |
          set -euo pipefail
          KERNEL_BUILD="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel/out"

          export PATH="${CLANG_BIN}:$PATH:/usr/lib/ccache"
          export CCACHE_DIR="$GITHUB_WORKSPACE/.ccache"
          mkdir -p "$CCACHE_DIR"

          MAKE_FLAGS=(
            LLVM=1
            LLVM_IAS=1
            ARCH=arm64
            SUBARCH=arm64
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
            LD=ld.lld
            HOSTLD=ld.lld
            AR=llvm-ar
            NM=llvm-nm
            OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump
            DEPMOD=depmod
            DTC=dtc
            STRIP=llvm-strip
            HOSTCC=clang
            HOSTCXX=clang++
            CC=clang
          )

          cd backports-stable

          make -j"$(nproc)" \
            "${MAKE_FLAGS[@]}" \
            KLIB="$KERNEL_BUILD" \
            KLIB_BUILD="$KERNEL_BUILD" \
            V=1 2>&1 | tee "$GITHUB_WORKSPACE/build.log"

          # Check if mt7921u.ko was built
          if [ ! -f drivers/net/wireless/mediatek/mt76/mt7921/mt7921u.ko ]; then
            echo "ERROR: mt7921u.ko not found!"
            tail -100 "$GITHUB_WORKSPACE/build.log"
            exit 1
          fi

      - name: Collect and package modules
        shell: bash
        run: |
          set -euo pipefail
          cd backports-stable
          mkdir -p ../modules-out
          find . -name "*.ko" -type f -exec cp -v {} ../modules-out/ \;
          cd ../modules-out

          # Create zip archive
          ARCHIVE_NAME="wireless-backports-5.10-${GITHUB_RUN_NUMBER}.zip"
          zip -r "$GITHUB_WORKSPACE/$ARCHIVE_NAME" *.ko

          echo "✓ Archive created: $ARCHIVE_NAME"
          ls -lh "$GITHUB_WORKSPACE/$ARCHIVE_NAME"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: op11r-wireless-backports-5.10
          path: |
            ${{ github.workspace }}/wireless-backports-5.10-*.zip
            ${{ github.workspace }}/build.log
            ${{ github.workspace }}/backports-stable/.config
