name: Build Wireless Backports Modules for OP11R

on:
  workflow_dispatch:
    inputs:
      manifest:
        description: "Manifest preset"
        required: true
        default: "OOS16"
        type: choice
        options:
          - OOS14
          - OOS15
          - OOS16
      backports_release:
        description: "Stable backports release"
        required: true
        default: "backports-6.1.97-1"
        type: choice
        options:
          - backports-6.1.97-1

jobs:
  build-wireless-modules:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    env:
      MODEL: OP11R
      SOC: waipio
      CONFIG: OP11R
      BRANCH: oneplus/sm8475
      MANIFEST_OOS14_MODULES: oneplus_11r_u.xml
      MANIFEST_OOS15_MODULES: oneplus_11r_v.xml
      MANIFEST_OOS16_MODULES: oneplus_11r_b.xml

  steps:
    - name: Validate Inputs
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Validate inputs"

        model="${MODEL:-}"
        soc="${SOC:-}"
        branch="${BRANCH:-}"
        manifest="${MANIFEST:-}"
        optimize='${{ inputs.optimize_level }}'

        [[ -n "$model" ]] || { echo "Input 'model' cannot be empty"; exit 1; }
        [[ -n "$soc" ]] || { echo "Input 'soc' cannot be empty"; exit 1; }
        [[ -n "$branch" ]] || { echo "Input 'branch' cannot be empty"; exit 1; }
        [[ -n "$manifest" ]] || { echo "Input 'manifest' cannot be empty"; exit 1; }

        if ! [[ "$soc" =~ ^[A-Za-z0-9_-]+$ ]]; then
          echo "Input 'soc' contains invalid characters. Allowed: letters, digits, underscore, dash"
          exit 1
        fi

        if ! [[ "$branch" =~ ^[A-Za-z0-9._/-]+$ ]]; then
          echo "Input 'branch' contains invalid characters. Allowed: letters, digits, ., _, -, /"
          exit 1
        fi

        if [[ "$manifest" == http*://* ]]; then
          if ! [[ "$manifest" =~ ^https:// ]]; then
            echo "Manifest URL must be HTTPS"
            exit 1
          fi
          if ! [[ "$manifest" =~ \.xml($|\?) ]]; then
            echo "Manifest URL should point to an XML file (.xml)"
            exit 1
          fi
          else
          if ! [[ "$manifest" =~ \.xml$ ]]; then
            echo "Manifest filename must end with .xml"
            exit 1
          fi
          if [[ "$manifest" =~ [[:space:]] ]]; then
            echo "Manifest filename cannot contain spaces"
            exit 1
          fi
          fi

           case "$optimize" in
            O2|O3) ;;
           *)
            echo "optimize_level must be O2 or O3; got '$optimize'"
            exit 1
            ;;
            esac

           echo "Input validation OK."
           echo "::endgroup::"

      - name: Aggressive cleanup
        shell: bash
        run: |
            set -euo pipefail
            echo "::group::Cleanup space"
            sudo rm -rf /usr/share/dotnet || true
            sudo rm -rf /usr/share/swift || true
            sudo rm -rf /usr/local/.ghcup || true
            sudo rm -rf /usr/local/julia* || true
            sudo rm -rf /usr/local/lib/android || true
            sudo rm -rf /usr/local/share/chromium || true
            sudo rm -rf /opt/microsoft /opt/google || true
            sudo rm -rf /opt/az || true
            bsudo rm -rf /usr/local/share/powershell || true
            sudo rm -rf /opt/host edtoolcache || true
            docker system prune -af || true
            docker builder prune -af || true
            df -h
           echo "::endgroup::"

     - name: Install Minimal Dependencies
       shell: bash
       run: |
         set -euo pipefail
         echo "::group::Install deps"
         sudo apt-get -o Acquire::Retries=3 update -qq
         sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
          git curl ca-certificates build-essential clang lld flex bison \
          libelf-dev libssl-dev libncurses-dev zlib1g-dev liblz4-tool \
          libxml2-utils rsync unzip dwarves file python3 ccache wget patch jq \
          coccinelle kmod bc perl xz-utils
         sudo apt-get clean
         echo "::endgroup::"
         
      - name: Set manifest
        shell: bash
        run: |
          set -euo pipefail
          case "${{ github.event.inputs.manifest }}" in
            OOS14) echo "MANIFEST=$MANIFEST_OOS14_MODULES" >> "$GITHUB_ENV" ;;
            OOS15) echo "MANIFEST=$MANIFEST_OOS15_MODULES" >> "$GITHUB_ENV" ;;
            OOS16) echo "MANIFEST=$MANIFEST_OOS16_MODULES" >> "$GITHUB_ENV" ;;
            *) echo "Unknown manifest"; exit 1 ;;
          esac

      - name: Install repo
        shell: bash
        run: |
          set -euo pipefail
          sudo curl -L https://storage.googleapis.com/git-repo-downloads/repo -o /usr/local/bin/repo
          sudo chmod +x /usr/local/bin/repo

      - name: Sync OP11R kernel source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$CONFIG" && cd "$CONFIG"
          repo init -u https://github.com/OnePlusOSS/kernel_manifest.git \
            -b "$BRANCH" -m "$MANIFEST" --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags
          for i in 1 2 3; do
            if repo sync -c --no-clone-bundle --no-tags --optimized-fetch -j"$(nproc)" --fail-fast; then
              break
            fi
            [ "$i" -lt 3 ] && sleep 20 || { echo "Sync failed"; exit 1; }
          done

      - name: Locate prebuilt clang
        shell: bash
        run: |
          set -euo pipefail
          FOUND=false
          for base in "$GITHUB_WORKSPACE/$CONFIG/kernel_platform/prebuilts-master/clang/host/linux-x86" \
                      "$GITHUB_WORKSPACE/$CONFIG/kernel_platform/prebuilts/clang/host/linux-x86"; do
            [ -d "$base" ] || continue
            latest=$(ls -1d "$base"/clang-* 2>/dev/null | sort -V | tail -n1 || true)
            if [ -n "$latest" ] && [ -x "$latest/bin/clang" ]; then
              echo "CLANG_BIN=$latest/bin" >> "$GITHUB_ENV"
              FOUND=true
              echo "Prebuilt clang: $latest/bin"
              break
            fi
          done
          if ! $FOUND; then
            echo "CLANG_BIN=$(dirname "$(command -v clang)")" >> "$GITHUB_ENV"
          fi

      - name: Prepare kernel tree (detect version + configure + modules_prepare)
        shell: bash
        run: |
          set -euo pipefail
          MSM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel"
          cd "$MSM"

          KV=$(grep '^VERSION' Makefile | awk '{print $3}')
          KP=$(grep '^PATCHLEVEL' Makefile | awk '{print $3}')
          KS=$(grep '^SUBLEVEL' Makefile | awk '{print $3}')
          echo "KERNEL_VER=${KV}.${KP}.${KS}" >> "$GITHUB_ENV"

          export PATH="${CLANG_BIN}:$PATH:/usr/lib/ccache"
          FLAGS=(LLVM=1 LLVM_IAS=1 ARCH=arm64 SUBARCH=arm64 \
                 CLANG_TRIPLE=aarch64-linux-gnu- \
                 CROSS_COMPILE=aarch64-linux-gnu- \
                 CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
                 LD=ld.lld HOSTLD=ld.lld AR=llvm-ar NM=llvm-nm \
                 OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump \
                 STRIP=llvm-strip HOSTCC=clang HOSTCXX=clang++ CC=clang)

          make "${FLAGS[@]}" mrproper
          mkdir -p out
          ./scripts/kconfig/merge_config.sh -O out -m \
            arch/arm64/configs/gki_defconfig \
            arch/arm64/configs/vendor/${SOC}_GKI.config || true
          cp out/.config arch/arm64/configs/gki_defconfig
          make "${FLAGS[@]}" O=out gki_defconfig

          for sym in CFI CFI_CLANG LTO_CLANG LTO_CLANG_THIN SHADOW_CALL_STACK \
                     KASAN KASAN_SW_TAGS KASAN_HW_TAGS UBSAN UBSAN_TRAP UBSAN_BOUNDS \
                     TRIM_UNUSED_KSYMS MODULE_SIG_ALL MODVERSIONS; do
            ./scripts/config --file out/.config --disable "$sym" || true
          done

          for sym in MODULES MODULE_UNLOAD PCI USB USB_SUPPORT MMC; do
            ./scripts/config --file out/.config --enable "$sym" || true
          done

          make "${FLAGS[@]}" O=out olddefconfig
          make "${FLAGS[@]}" O=out -j"$(nproc)" modules_prepare
          echo "Kernel prepared at $MSM/out"

      - name: Download + extract backports
        shell: bash
        run: |
          set -euo pipefail
          REL="${{ github.event.inputs.backports_release }}"
          wget -q -O backports.tar.xz \
            "https://cdn.kernel.org/pub/linux/kernel/projects/backports/stable/v6.1.97/${REL}.tar.xz"
          tar -xf backports.tar.xz
          mv "$REL" backports-stable
          ls backports-stable/ | head

      - name: Patch compat for CFI signatures
        shell: bash
        run: |
          set -euo pipefail
          F=backports-stable/backport-include/linux/module.h
          if [ -f "$F" ]; then
            sed -i 's/__CFI_ADDRESSABLE(init_module, __initdata)/__CFI_ADDRESSABLE(init_module)/g' "$F"
            sed -i 's/__CFI_ADDRESSABLE(cleanup_module, __exitdata)/__CFI_ADDRESSABLE(cleanup_module)/g' "$F"
          fi

      - name: Configure backports (allnoconfig + explicit MT76/RTW88/rtl8xxxu only)
        shell: bash
        run: |
          set -euo pipefail
          KERNEL_BUILD="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel/out"
          export PATH="${CLANG_BIN}:$PATH:/usr/lib/ccache"

          FLAGS=(LLVM=1 LLVM_IAS=1 ARCH=arm64 SUBARCH=arm64 \
                 CLANG_TRIPLE=aarch64-linux-gnu- \
                 CROSS_COMPILE=aarch64-linux-gnu- \
                 CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
                 LD=ld.lld HOSTLD=ld.lld AR=llvm-ar NM=llvm-nm \
                 OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump \
                 STRIP=llvm-strip HOSTCC=clang HOSTCXX=clang++ CC=clang)

          cd backports-stable

          make "${FLAGS[@]}" \
            KLIB="$KERNEL_BUILD" \
            KLIB_BUILD="$KERNEL_BUILD" \
            allnoconfig

          cat >> .config <<'EOF'
          CPTCFG_WLAN=y
          CPTCFG_CFG80211=m
          CPTCFG_MAC80211=m
          CPTCFG_WLAN_VENDOR_MEDIATEK=y
          CPTCFG_WLAN_VENDOR_REALTEK=y

          CPTCFG_MT76_CORE=m
          CPTCFG_MT76_USB=m
          CPTCFG_MT76_SDIO=m
          CPTCFG_MT76_CONNAC_LIB=m
          CPTCFG_MT792x_LIB=m
          CPTCFG_MT792x_USB=m
          CPTCFG_MT7921_COMMON=m
          CPTCFG_MT7921E=m
          CPTCFG_MT7921U=m
          CPTCFG_MT7921S=m

          CPTCFG_RTL8XXXU=m
          CPTCFG_RTL8XXXU_UNTESTED=y

          CPTCFG_RTW88=m
          CPTCFG_RTW88_CORE=m
          CPTCFG_RTW88_PCI=m
          CPTCFG_RTW88_USB=m
          CPTCFG_RTW88_8822BE=m
          CPTCFG_RTW88_8822BU=m
          CPTCFG_RTW88_8822CE=m
          CPTCFG_RTW88_8821CE=m
          CPTCFG_RTW88_8821CU=m
          CPTCFG_RTW88_8723DE=m
          CPTCFG_RTW88_8723D=m
          CPTCFG_RTW88_8821C=m
          CPTCFG_RTW88_8822B=m
          CPTCFG_RTW88_8822C=m

          CPTCFG_USB=y
          CPTCFG_PCI=y
          CPTCFG_NL80211_TESTMODE=y
          EOF

          make "${FLAGS[@]}" \
            KLIB="$KERNEL_BUILD" \
            KLIB_BUILD="$KERNEL_BUILD" \
            olddefconfig 2>&1 | tee oldconfig.log

          echo "===== enabled symbols ====="
          grep -E '^(CPTCFG_(CFG80211|MAC80211|MT76|MT792|RTW88|RTL8XXXU|WLAN_VENDOR_).*)=' .config | sort || true
          echo "==========================="

          if grep -qE '^CPTCFG_(IWLWIFI|IWLMVM|IWLDVM|IWLEGACY)=([my])' .config; then
            echo "ERROR: Intel wireless symbols still enabled."
            grep -E '^CPTCFG_(IWLWIFI|IWLMVM|IWLDVM|IWLEGACY)=' .config || true
            exit 1
          fi

          MCOUNT=$(grep -cE '=m$' .config || true)
          echo "Module symbols enabled: $MCOUNT"
          if [ "$MCOUNT" -lt 8 ]; then
            echo "ERROR: too few modules enabled."
            tail -80 oldconfig.log || true
            exit 1
          fi

      - name: Build backports modules
        shell: bash
        run: |
          set -euo pipefail
          KERNEL_BUILD="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel/out"
          export PATH="${CLANG_BIN}:$PATH:/usr/lib/ccache"
          export CCACHE_DIR="$GITHUB_WORKSPACE/.ccache"
          mkdir -p "$CCACHE_DIR"

          FLAGS=(LLVM=1 LLVM_IAS=1 ARCH=arm64 SUBARCH=arm64 \
                 CLANG_TRIPLE=aarch64-linux-gnu- \
                 CROSS_COMPILE=aarch64-linux-gnu- \
                 CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
                 LD=ld.lld HOSTLD=ld.lld AR=llvm-ar NM=llvm-nm \
                 OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump \
                 STRIP=llvm-strip HOSTCC=clang HOSTCXX=clang++ CC=clang)

          cd backports-stable
          set +e
          make -j"$(nproc)" "${FLAGS[@]}" \
            KLIB="$KERNEL_BUILD" \
            KLIB_BUILD="$KERNEL_BUILD" \
            V=1 2>&1 | tee "$GITHUB_WORKSPACE/build.log"
          RC=${PIPESTATUS[0]}
          set -e

          if [ "$RC" -ne 0 ]; then
            echo "--- last 200 lines of build.log ---"
            tail -200 "$GITHUB_WORKSPACE/build.log"
            echo "--- filtered errors ---"
            grep -iE 'error:|undefined reference|No rule to make|Error [0-9]+' "$GITHUB_WORKSPACE/build.log" | tail -120 || true
            exit "$RC"
          fi

      - name: Verify and collect .ko files
        shell: bash
        run: |
          set -euo pipefail
          cd backports-stable
          mapfile -t KO < <(find . -name '*.ko' -type f | sort)
          echo "Total .ko files: ${#KO[@]}"
          printf '  %s\n' "${KO[@]}"

          if [ "${#KO[@]}" -lt 5 ]; then
            echo "ERROR: expected 5+ .ko files, got ${#KO[@]}"
            grep -iE 'error:|undefined reference|No rule to make' "$GITHUB_WORKSPACE/build.log" | head -50 || true
            exit 1
          fi

          mkdir -p ../modules-out
          find . -name '*.ko' -type f -exec cp -v {} ../modules-out/ \;

          cd ../modules-out
          for ko in *.ko; do
            echo "  [$(du -h "$ko" | cut -f1)] $ko"
          done

          ARCHIVE="wireless-modules-op11r-mediatek-realtek-${GITHUB_RUN_NUMBER}.zip"
          zip -r "$GITHUB_WORKSPACE/$ARCHIVE" *.ko
          ls -lh "$GITHUB_WORKSPACE/$ARCHIVE"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wireless-modules-op11r-${{ github.run_number }}
          path: |
            wireless-modules-op11r-mediatek-realtek-*.zip
            build.log
            backports-stable/.config
            backports-stable/oldconfig.log
          if-no-files-found: warn
          retention-days: 14
