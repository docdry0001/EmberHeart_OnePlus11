name: Build Wireless Backports Modules for OP11R (5.10)

on:
  workflow_dispatch:
    inputs:
      manifest:
        description: "Manifest preset"
        required: true
        default: "OOS16"
        type: choice
        options:
          - OOS14
          - OOS15
          - OOS16
      backports_release:
        description: "Stable backports release"
        required: true
        default: "backports-6.1.97-1"
        type: choice
        options:
          - backports-6.1.97-1

jobs:
  build-wireless-modules:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    env:
      MODEL: OP11R
      SOC: waipio
      CONFIG: OP11R
      BRANCH: oneplus/sm8475
      MANIFEST_OOS14_MODULES: oneplus_11r_u.xml
      MANIFEST_OOS15_MODULES: oneplus_11r_v.xml
      MANIFEST_OOS16_MODULES: oneplus_11r_b.xml

    steps:
      - name: Validate target
        shell: bash
        run: |
          set -euo pipefail
          [ "$MODEL" = "OP11R" ] || { echo "Wrong MODEL: $MODEL"; exit 1; }
          [ "$SOC" = "waipio" ] || { echo "Wrong SOC: $SOC"; exit 1; }
          echo "✓ Target validation passed"

      - name: Cleanup runner
        shell: bash
        run: |
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet /usr/share/swift /usr/local/.ghcup /usr/local/julia* \
            /usr/local/lib/android /usr/local/share/chromium /opt/microsoft /opt/google \
            /opt/az /usr/local/share/powershell /opt/hostedtoolcache 2>/dev/null || true
          docker system prune -af 2>/dev/null || true
          docker builder prune -af 2>/dev/null || true
          echo "Disk space after cleanup:"
          df -h

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git curl ca-certificates build-essential clang lld flex bison \
            libelf-dev libssl-dev libncurses-dev zlib1g-dev liblz4-tool \
            libxml2-utils rsync unzip dwarves file python3 ccache wget patch jq \
            coccinelle kmod bc perl xz-utils zip device-tree-compiler
          sudo apt-get clean
          echo "✓ Dependencies installed"

      - name: Set manifest
        shell: bash
        run: |
          set -euo pipefail
          case "${{ github.event.inputs.manifest }}" in
            OOS14) echo "MANIFEST=$MANIFEST_OOS14_MODULES" >> "$GITHUB_ENV" ;;
            OOS15) echo "MANIFEST=$MANIFEST_OOS15_MODULES" >> "$GITHUB_ENV" ;;
            OOS16) echo "MANIFEST=$MANIFEST_OOS16_MODULES" >> "$GITHUB_ENV" ;;
            *) echo "Unknown manifest"; exit 1 ;;
          esac

      - name: Install repo
        shell: bash
        run: |
          set -euo pipefail
          sudo curl -L https://storage.googleapis.com/git-repo-downloads/repo -o /usr/local/bin/repo
          sudo chmod +x /usr/local/bin/repo
          repo --version
          echo "✓ Repo tool installed"

      - name: Sync OP11R kernel source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$CONFIG"
          cd "$CONFIG"

          repo init -u https://github.com/OnePlusOSS/kernel_manifest.git \
            -b "$BRANCH" \
            -m "$MANIFEST" \
            --repo-rev=v2.16 \
            --depth=1 \
            --no-clone-bundle \
            --no-tags

          ok=false
          for i in 1 2 3; do
            echo "repo sync attempt $i"
            if repo sync -c --no-clone-bundle --no-tags --optimized-fetch -j"$(nproc --all)" --fail-fast; then
              ok=true
              break
            fi
            sleep 20
          done
          $ok || { echo "repo sync failed"; exit 1; }

      - name: Detect kernel version and prepare tree
        shell: bash
        run: |
          set -euo pipefail
          MSM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel"
          cd "$MSM"

          VERSION=$(grep '^VERSION *=' Makefile | awk '{print $3}')
          PATCHLEVEL=$(grep '^PATCHLEVEL *=' Makefile | awk '{print $3}')
          SUBLEVEL=$(grep '^SUBLEVEL *=' Makefile | awk '{print $3}')
          KERNEL_VER="${VERSION}.${PATCHLEVEL}.${SUBLEVEL}"
          echo "KERNEL_VER=$KERNEL_VER" >> "$GITHUB_ENV"
          echo "Detected kernel version: $KERNEL_VER"

          make ARCH=arm64 mrproper
          mkdir -p out

          ./scripts/kconfig/merge_config.sh -O out -m \
            arch/arm64/configs/gki_defconfig \
            arch/arm64/configs/vendor/${SOC}_GKI.config || true

          cp out/.config arch/arm64/configs/gki_defconfig
          make O=out ARCH=arm64 olddefconfig </dev/null

      - name: Detect clang
        shell: bash
        run: |
          set -euo pipefail
          KP="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
          FOUND=false

          for base in "$KP/prebuilts" "$KP/prebuilts-master"; do
            [ -d "$base/clang/host/linux-x86" ] || continue
            latest=$(ls -d "$base"/clang/host/linux-x86/clang-r*/ 2>/dev/null | sort -V | tail -n1 || true)
            if [ -n "$latest" ] && [ -x "$latest/bin/clang" ]; then
              echo "CLANG_BIN=$latest/bin" >> "$GITHUB_ENV"
              echo "Using prebuilt clang: $latest/bin"
              FOUND=true
              break
            fi
          done

          if ! $FOUND; then
            SYSTEM_CLANG=$(dirname "$(command -v clang)")
            echo "CLANG_BIN=$SYSTEM_CLANG" >> "$GITHUB_ENV"
            echo "Using system clang: $SYSTEM_CLANG"
          fi

      - name: Kernel prepare
        shell: bash
        run: |
          set -euo pipefail
          MSM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel"
          OUT="$MSM/out"

          export PATH="${CLANG_BIN}:$PATH:/usr/lib/ccache"
          export HOSTCC=clang
          export HOSTCXX=clang++

          MAKE_FLAGS=(
            LLVM=1
            LLVM_IAS=1
            ARCH=arm64
            SUBARCH=arm64
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
            LD=ld.lld
            HOSTLD=ld.lld
            AR=llvm-ar
            NM=llvm-nm
            OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump
            DEPMOD=depmod
            DTC=dtc
            STRIP=llvm-strip
            CC=clang
          )

          cd "$MSM"

          make "${MAKE_FLAGS[@]}" O="$OUT" gki_defconfig
          make "${MAKE_FLAGS[@]}" O="$OUT" olddefconfig </dev/null
          make "${MAKE_FLAGS[@]}" O="$OUT" prepare modules_prepare

          echo "✓ Kernel prepare complete"
          ls -la "$OUT" | head -20

      - name: Download backports
        shell: bash
        run: |
          set -euo pipefail
          RELEASE="${{ github.event.inputs.backports_release }}"
          wget -O backports.tar.xz \
            "https://cdn.kernel.org/pub/linux/kernel/projects/backports/stable/v6.1.97/backports-6.1.97-1.tar.xz"
          tar -xf backports.tar.xz
          mv "$RELEASE" backports-stable
          echo "✓ Backports extracted"

      - name: Patch backports for kernel 5.10 compatibility
        shell: bash
        run: |
          set -euo pipefail
          cd backports-stable

          # 1. Disable CFI, LTO, Shadow Call Stack
          cat >> .config <<'EOF'
          CPTCFG_CFI=n
          CPTCFG_LTO=n
          CPTCFG_KERNEL_CFI=n
          CPTCFG_SHADOW_CALL_STACK=n
          CPTCFG_STACK_VALIDATION=n
          EOF

          # 2. Fix missing ieee80211_txq struct fields (5.10 vs 6.1)
          cat >> backport-include/linux/ieee80211.h <<'EOF'
          #ifndef BACKPORT_IEEE80211_H
          #define BACKPORT_IEEE80211_H
          #include <linux/version.h>
          #if LINUX_VERSION_CODE < KERNEL_VERSION(5,11,0)
          /* 5.10 does not have 'netdev' and 'txstats' in ieee80211_txq */
          struct ieee80211_txq {
            struct ieee80211_vif *vif;
            struct sta_info *sta;
            struct ieee80211_tx_rate rates[8];
            u8 rate_idx;
            u8 hw_queue;
            u16 flags;
          };
          #define BACKPORT_IEEE80211_TXQ_HAS_NETDEV 0
          #else
          #define BACKPORT_IEEE80211_TXQ_HAS_NETDEV 1
          #endif
          #endif
          EOF

          # 3. Remove unsupported compiler flags from Makefiles
          find . -name "Makefile" -exec sed -i 's/-fsanitize=cfi//g' {} \;
          find . -name "Makefile" -exec sed -i 's/-flto//g' {} \;
          find . -name "Makefile" -exec sed -i 's/-fsanitize=shadow-call-stack//g' {} \;

          echo "✓ Backports patched for kernel 5.10"

      - name: Create wireless backports config (full, with mt7921u)
        shell: bash
        run: |
          set -euo pipefail
          cd backports-stable

          # Start from a clean known-good config
          make defconfig-wifi || true

          # Now explicitly enable all required modules, especially mt7921u
          cat >> .config <<'EOF'
          CPTCFG_WLAN=y
          CPTCFG_CFG80211=m
          CPTCFG_MAC80211=m
          CPTCFG_CFG80211_WEXT=y
          CPTCFG_WIRELESS_EXT=y
          CPTCFG_WEXT_PRIV=y
          CPTCFG_NL80211_TESTMODE=y
          CPTCFG_USB=y
          CPTCFG_PCI=y

          # MediaTek MT76 family (critical: mt7921u)
          CPTCFG_WLAN_VENDOR_MEDIATEK=y
          CPTCFG_MT76_CORE=m
          CPTCFG_MT76_USB=m
          CPTCFG_MT76_SDIO=m
          CPTCFG_MT76_CONNAC_LIB=m
          CPTCFG_MT76x02_LIB=m
          CPTCFG_MT76x02_USB=m
          CPTCFG_MT76x0_COMMON=m
          CPTCFG_MT76x0U=m
          CPTCFG_MT76x2_COMMON=m
          CPTCFG_MT76x2U=m
          CPTCFG_MT792x_LIB=m
          CPTCFG_MT792x_USB=m
          CPTCFG_MT7921_COMMON=m
          CPTCFG_MT7921E=m
          CPTCFG_MT7921U=m    # <-- this is the key module

          # Ralink
          CPTCFG_WLAN_VENDOR_RALINK=y
          CPTCFG_RT2X00=m
          CPTCFG_RT2X00_LIB=m
          CPTCFG_RT2X00_LIB_USB=m
          CPTCFG_RT2X00_USB=m
          CPTCFG_RT2800_LIB=m
          CPTCFG_RT2800_LIB_USB=m
          CPTCFG_RT2800USB=m
          CPTCFG_RT2800USB_RT33XX=y
          CPTCFG_RT2800USB_RT35XX=y
          CPTCFG_RT2800USB_RT3573=y
          CPTCFG_RT2800USB_RT53XX=y
          CPTCFG_RT2800USB_UNKNOWN=y
          CPTCFG_CRC_CCITT=m
          CPTCFG_EEPROM_93CX6=m

          # Realtek
          CPTCFG_WLAN_VENDOR_REALTEK=y
          CPTCFG_RTL8XXXU=m
          CPTCFG_RTW88=m
          CPTCFG_RTW88_CORE=m
          CPTCFG_RTW88_USB=m
          CPTCFG_RTW88_DEBUG=y
          EOF

          # Finalize configuration without overwriting our additions
          make olddefconfig

          # Verify that mt7921u is really set
          grep "CPTCFG_MT7921U" .config || { echo "ERROR: mt7921u not enabled in config"; exit 1; }

          echo "=== BACKPORTS FINAL CONFIG ==="
          grep -E "^(CPTCFG_MT7921U|CPTCFG_MT76|CPTCFG_RT2X00|CPTCFG_RTW88)" .config || true

      - name: Build wireless backports modules (with V=1 for debugging)
        shell: bash
        run: |
          set -euo pipefail
          KERNEL_BUILD="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel/out"

          export PATH="${CLANG_BIN}:$PATH:/usr/lib/ccache"
          export CCACHE_DIR="$GITHUB_WORKSPACE/.ccache"
          mkdir -p "$CCACHE_DIR"

          MAKE_FLAGS=(
            LLVM=1
            LLVM_IAS=1
            ARCH=arm64
            SUBARCH=arm64
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
            LD=ld.lld
            HOSTLD=ld.lld
            AR=llvm-ar
            NM=llvm-nm
            OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump
            DEPMOD=depmod
            DTC=dtc
            STRIP=llvm-strip
            HOSTCC=clang
            HOSTCXX=clang++
            CC=clang
          )

          cd backports-stable

          # Use more parallel jobs (but keep log readable)
          make -j"$(nproc)" \
            "${MAKE_FLAGS[@]}" \
            KLIB="$KERNEL_BUILD" \
            KLIB_BUILD="$KERNEL_BUILD" \
            V=1 2>&1 | tee "$GITHUB_WORKSPACE/build.log"

          # Check if mt7921u.ko was actually built
          if [ ! -f drivers/net/wireless/mediatek/mt76/mt7921/mt7921u.ko ] && [ ! -f net/mac80211/rc80211_minstrel_ht.ko ]; then
            echo "ERROR: mt7921u.ko not found after build!"
            echo "Last 100 lines of build log:"
            tail -100 "$GITHUB_WORKSPACE/build.log"
            exit 1
          fi

      - name: Verify and collect modules (with mt7921u mandatory)
        shell: bash
        run: |
          set -euo pipefail
          cd backports-stable

          mkdir -p ../modules-out

          # Find all .ko files
          find . -name "*.ko" -type f -exec cp -v {} ../modules-out/ \;

          echo "=== ALL MODULES COPIED ==="
          ls -lh ../modules-out/

          # Critical check
          if [ ! -f ../modules-out/mt7921u.ko ]; then
            echo "FATAL: mt7921u.ko is missing after copy!"
            echo "Available .ko files:"
            find ../modules-out -name "*.ko" | sort
            exit 1
          fi

          cd ../modules-out

          # Create final zip
          ARCHIVE_NAME="wireless-backports-5.10-${GITHUB_RUN_NUMBER}.zip"
          zip -r "$GITHUB_WORKSPACE/$ARCHIVE_NAME" *.ko

          echo "✓ Archive created with mt7921u.ko included"
          unzip -l "$GITHUB_WORKSPACE/$ARCHIVE_NAME" | grep mt7921u

      - name: Upload artifacts (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: op11r-wireless-backports-5.10
          path: |
            ${{ github.workspace }}/wireless-backports-5.10-*.zip
            ${{ github.workspace }}/build.log
            ${{ github.workspace }}/backports-stable/.config
