name: Build Wireless Backports Modules for OP11R

on:
  workflow_dispatch:
    inputs:
      manifest:
        description: "Manifest preset"
        required: true
        default: "OOS16"
        type: choice
        options:
          - OOS14
          - OOS15
          - OOS16
      backports_release:
        description: "Stable backports release"
        required: true
        default: "backports-6.1.97-1"
        type: choice
        options:
          - backports-6.1.97-1

jobs:
  build-wireless-modules:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    env:
      MODEL: OP11R
      SOC: waipio
      CONFIG: OP11R
      BRANCH: oneplus/sm8475
      MANIFEST_OOS14_MODULES: oneplus_11r_u.xml
      MANIFEST_OOS15_MODULES: oneplus_11r_v.xml
      MANIFEST_OOS16_MODULES: oneplus_11r_b.xml

    steps:
      - name: Validate target
        shell: bash
        run: |
          set -euo pipefail
          [ "$MODEL" = "OP11R" ] || { echo "Wrong MODEL: $MODEL"; exit 1; }
          [ "$SOC" = "waipio" ] || { echo "Wrong SOC: $SOC"; exit 1; }
          echo "✓ Target validation passed"

      - name: Cleanup runner
        shell: bash
        run: |
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet /usr/share/swift /usr/local/.ghcup /usr/local/julia* \
            /usr/local/lib/android /usr/local/share/chromium /opt/microsoft /opt/google \
            /opt/az /usr/local/share/powershell /opt/hostedtoolcache 2>/dev/null || true
          docker system prune -af 2>/dev/null || true
          docker builder prune -af 2>/dev/null || true
          echo "Disk space after cleanup:"
          df -h

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git curl ca-certificates build-essential clang lld flex bison \
            libelf-dev libssl-dev libncurses-dev zlib1g-dev liblz4-tool \
            libxml2-utils rsync unzip dwarves file python3 ccache wget patch jq \
            coccinelle kmod bc perl xz-utils zip device-tree-compiler
          sudo apt-get clean
          echo "✓ Dependencies installed"

      - name: Set manifest
        shell: bash
        run: |
          set -euo pipefail
          case "${{ github.event.inputs.manifest }}" in
            OOS14) echo "MANIFEST=$MANIFEST_OOS14_MODULES" >> "$GITHUB_ENV" ;;
            OOS15) echo "MANIFEST=$MANIFEST_OOS15_MODULES" >> "$GITHUB_ENV" ;;
            OOS16) echo "MANIFEST=$MANIFEST_OOS16_MODULES" >> "$GITHUB_ENV" ;;
            *) echo "Unknown manifest"; exit 1 ;;
          esac

      - name: Install repo
        shell: bash
        run: |
          set -euo pipefail
          sudo curl -L https://storage.googleapis.com/git-repo-downloads/repo -o /usr/local/bin/repo
          sudo chmod +x /usr/local/bin/repo
          repo --version
          echo "✓ Repo tool installed"

      - name: Sync OP11R kernel source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$CONFIG"
          cd "$CONFIG"

          repo init -u https://github.com/OnePlusOSS/kernel_manifest.git \
            -b "$BRANCH" \
            -m "$MANIFEST" \
            --repo-rev=v2.16 \
            --depth=1 \
            --no-clone-bundle \
            --no-tags

          ok=false
          for i in 1 2 3; do
            echo "repo sync attempt $i"
            if repo sync -c --no-clone-bundle --no-tags --optimized-fetch -j"$(nproc --all)" --fail-fast; then
              ok=true
              break
            fi
            sleep 20
          done
          $ok || { echo "repo sync failed"; exit 1; }

      - name: Detect kernel version and prepare tree
        shell: bash
        run: |
          set -euo pipefail
          MSM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel"
          cd "$MSM"

          VERSION=$(grep '^VERSION *=' Makefile | awk '{print $3}')
          PATCHLEVEL=$(grep '^PATCHLEVEL *=' Makefile | awk '{print $3}')
          SUBLEVEL=$(grep '^SUBLEVEL *=' Makefile | awk '{print $3}')
          KERNEL_VER="${VERSION}.${PATCHLEVEL}.${SUBLEVEL}"
          echo "KERNEL_VER=$KERNEL_VER" >> "$GITHUB_ENV"
          echo "Detected kernel version: $KERNEL_VER"

          make ARCH=arm64 mrproper
          mkdir -p out

          ./scripts/kconfig/merge_config.sh -O out -m \
            arch/arm64/configs/gki_defconfig \
            arch/arm64/configs/vendor/${SOC}_GKI.config || true

          cp out/.config arch/arm64/configs/gki_defconfig
          make O=out ARCH=arm64 olddefconfig </dev/null

      - name: Detect clang
        shell: bash
        run: |
          set -euo pipefail
          KP="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
          FOUND=false

          for base in "$KP/prebuilts" "$KP/prebuilts-master"; do
            [ -d "$base/clang/host/linux-x86" ] || continue
            latest=$(ls -d "$base"/clang/host/linux-x86/clang-r*/ 2>/dev/null | sort -V | tail -n1 || true)
            if [ -n "$latest" ] && [ -x "$latest/bin/clang" ]; then
              echo "CLANG_BIN=$latest/bin" >> "$GITHUB_ENV"
              echo "Using prebuilt clang: $latest/bin"
              FOUND=true
              break
            fi
          done

          if ! $FOUND; then
            SYSTEM_CLANG=$(dirname "$(command -v clang)")
            echo "CLANG_BIN=$SYSTEM_CLANG" >> "$GITHUB_ENV"
            echo "Using system clang: $SYSTEM_CLANG"
          fi

      - name: Kernel prepare
        shell: bash
        run: |
          set -euo pipefail
          MSM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel"
          OUT="$MSM/out"

          export PATH="${CLANG_BIN}:$PATH:/usr/lib/ccache"
          export HOSTCC=clang
          export HOSTCXX=clang++

          MAKE_FLAGS=(
            LLVM=1
            LLVM_IAS=1
            ARCH=arm64
            SUBARCH=arm64
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
            LD=ld.lld
            HOSTLD=ld.lld
            AR=llvm-ar
            NM=llvm-nm
            OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump
            DEPMOD=depmod
            DTC=dtc
            STRIP=llvm-strip
            CC=clang
          )

          cd "$MSM"

          make "${MAKE_FLAGS[@]}" O="$OUT" gki_defconfig

          if [ -x ./scripts/config ]; then
            ./scripts/config --file "$OUT/.config" --disable CONFIG_CFI || true
            ./scripts/config --file "$OUT/.config" --disable CONFIG_CFI_CLANG || true
            ./scripts/config --file "$OUT/.config" --disable CONFIG_LTO_CLANG || true
            ./scripts/config --file "$OUT/.config" --disable CONFIG_LTO_CLANG_THIN || true
            ./scripts/config --file "$OUT/.config" --disable CONFIG_SHADOW_CALL_STACK || true
            ./scripts/config --file "$OUT/.config" --disable CONFIG_KASAN || true
            ./scripts/config --file "$OUT/.config" --disable CONFIG_KASAN_SW_TAGS || true
            ./scripts/config --file "$OUT/.config" --disable CONFIG_KASAN_HW_TAGS || true
            ./scripts/config --file "$OUT/.config" --disable CONFIG_UBSAN || true
            ./scripts/config --file "$OUT/.config" --disable CONFIG_UBSAN_TRAP || true
            ./scripts/config --file "$OUT/.config" --disable CONFIG_UBSAN_BOUNDS || true
          fi

          make "${MAKE_FLAGS[@]}" O="$OUT" olddefconfig </dev/null
          make "${MAKE_FLAGS[@]}" O="$OUT" prepare modules_prepare

          echo "✓ Kernel prepare complete"
          ls -la "$OUT" | head -20

      - name: Download backports
        shell: bash
        run: |
          set -euo pipefail
          RELEASE="${{ github.event.inputs.backports_release }}"
          wget -O backports.tar.gz \
            "https://git.kernel.org/pub/scm/linux/kernel/git/backports/backports.git/snapshot/backports-6.1.145-1.tar.gz"
          tar -xf backports.tar.gz
          mv "$RELEASE" backports-stable
          echo "✓ Backports extracted"

      - name: Inspect backports symbols
        shell: bash
        run: |
          set -euo pipefail
          cd backports-stable

          echo "===== DRIVER FILES ====="
          find drivers/net/wireless -maxdepth 4 -type f | grep -E "(mediatek|ralink|realtek|mt76|rt2x00|rtl8|rtw88)" | sort || true

          echo "===== KCONFIG SYMBOLS ====="
          grep -RnsE "^[[:space:]]*config[[:space:]]+(MT|RT|RTL|WLAN_VENDOR_|CFG80211|MAC80211)" drivers/net/wireless compat . || true

      - name: Patch compat for CFI
        shell: bash
        run: |
          set -euo pipefail
          cd backports-stable

          FILE="backport-include/linux/module.h"
          if [ -f "$FILE" ]; then
            sed -i 's/__CFI_ADDRESSABLE(init_module, __initdata)/__CFI_ADDRESSABLE(init_module)/g' "$FILE"
            sed -i 's/__CFI_ADDRESSABLE(cleanup_module, __exitdata)/__CFI_ADDRESSABLE(cleanup_module)/g' "$FILE"
            echo "✓ CFI patch applied"
          fi

      - name: Create wireless backports config
        shell: bash
        run: |
          set -euo pipefail
          cd backports-stable

          rm -f .config

          cat > .config <<'EOF'
          CPTCFG_WLAN=y
          CPTCFG_CFG80211=m
          CPTCFG_MAC80211=m
          CPTCFG_CFG80211_WEXT=y
          CPTCFG_WIRELESS_EXT=y
          CPTCFG_WEXT_PRIV=y
          CPTCFG_NL80211_TESTMODE=y

          CPTCFG_USB=y
          CPTCFG_PCI=y

          CPTCFG_WLAN_VENDOR_MEDIATEK=y
          CPTCFG_MT76_CORE=m
          CPTCFG_MT76_USB=m
          CPTCFG_MT76_SDIO=m
          CPTCFG_MT76_CONNAC_LIB=m
          CPTCFG_MT76x02_LIB=m
          CPTCFG_MT76x02_USB=m
          CPTCFG_MT76x0_COMMON=m
          CPTCFG_MT76x0U=m
          CPTCFG_MT76x2_COMMON=m
          CPTCFG_MT76x2U=m
          CPTCFG_MT792x_LIB=m
          CPTCFG_MT792x_USB=m
          CPTCFG_MT7921_COMMON=m
          CPTCFG_MT7921U=m

          CPTCFG_WLAN_VENDOR_RALINK=y
          CPTCFG_RT2X00=m
          CPTCFG_RT2X00_LIB=m
          CPTCFG_RT2X00_LIB_USB=m
          CPTCFG_RT2X00_USB=m
          CPTCFG_RT2800_LIB=m
          CPTCFG_RT2800_LIB_USB=m
          CPTCFG_RT2800USB=m
          CPTCFG_RT2800USB_RT33XX=y
          CPTCFG_RT2800USB_RT35XX=y
          CPTCFG_RT2800USB_RT3573=y
          CPTCFG_RT2800USB_RT53XX=y
          CPTCFG_RT2800USB_UNKNOWN=y
          CPTCFG_CRC_CCITT=m
          CPTCFG_EEPROM_93CX6=m

          CPTCFG_WLAN_VENDOR_REALTEK=y
          CPTCFG_RTL8XXXU=m
          CPTCFG_RTW88=m
          CPTCFG_RTW88_CORE=m
          CPTCFG_RTW88_USB=m
          CPTCFG_RTW88_DEBUG=y
          EOF

          echo "=== RAW BACKPORTS CONFIG ==="
          cat .config

      - name: Configure wireless backports
        shell: bash
        run: |
          set -euo pipefail
          KERNEL_BUILD="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel/out"

          export PATH="${CLANG_BIN}:$PATH:/usr/lib/ccache"

          MAKE_FLAGS=(
            LLVM=1
            LLVM_IAS=1
            ARCH=arm64
            SUBARCH=arm64
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
            LD=ld.lld
            HOSTLD=ld.lld
            AR=llvm-ar
            NM=llvm-nm
            OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump
            DEPMOD=depmod
            DTC=dtc
            STRIP=llvm-strip
            HOSTCC=clang
            HOSTCXX=clang++
            CC=clang
          )

          cd backports-stable

          make "${MAKE_FLAGS[@]}" \
            KLIB="$KERNEL_BUILD" \
            KLIB_BUILD="$KERNEL_BUILD" \
            olddefconfig 2>&1 | tee oldconfig.log

          echo "=== FINAL CONFIG CHECK ==="
          grep -E "^(CPTCFG_|CONFIG_).*(MT76|MT792|RT2X00|RT2800|RTL8|RTW88|CFG80211|MAC80211|WLAN_VENDOR|CRC_CCITT|EEPROM_93CX6)" .config | sort || true

          echo "=== MAKE/KBUILD RULE HINTS ==="
          grep -RnsE "(mt76|mt7921|mt76x0|mt76x2|rt2800|rt2x00|rtl8xxxu|rtw88)" . 2>/dev/null | head -500 || true

      - name: Clean backports build directory
        shell: bash
        run: |
          set -euo pipefail
          cd backports-stable
          find . -name "*.o" -delete || true
          find . -name "*.ko" -delete || true
          find . -name ".tmp_versions" -type d -exec rm -rf {} + 2>/dev/null || true
          find . -name "modules.order" -delete || true
          echo "✓ Build directory cleaned"

      - name: Build wireless backports modules
        shell: bash
        run: |
          set -euo pipefail
          KERNEL_BUILD="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel/out"

          export PATH="${CLANG_BIN}:$PATH:/usr/lib/ccache"
          export CCACHE_DIR="$GITHUB_WORKSPACE/.ccache"
          mkdir -p "$CCACHE_DIR"

          MAKE_FLAGS=(
            LLVM=1
            LLVM_IAS=1
            ARCH=arm64
            SUBARCH=arm64
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
            LD=ld.lld
            HOSTLD=ld.lld
            AR=llvm-ar
            NM=llvm-nm
            OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump
            DEPMOD=depmod
            DTC=dtc
            STRIP=llvm-strip
            HOSTCC=clang
            HOSTCXX=clang++
            CC=clang
          )

          cd backports-stable

          make -j2 \
            "${MAKE_FLAGS[@]}" \
            KLIB="$KERNEL_BUILD" \
            KLIB_BUILD="$KERNEL_BUILD" \
            V=1 2>&1 | tee "$GITHUB_WORKSPACE/build.log"

      - name: Verify target .ko files generated
        shell: bash
        run: |
          set -euo pipefail
          cd backports-stable

          KO_FILES=$(find . -name "*.ko" -type f | sort || true)
          echo "=== ALL KO FILES ==="
          echo "$KO_FILES"

          REQUIRED=(
            "cfg80211.ko"
            "mac80211.ko"
            "mt76.ko"
            "rtl8xxxu.ko"
          )

          OPTIONAL_TARGETS=(
            "mt7921u.ko"
            "mt76x0u.ko"
            "mt76x2u.ko"
            "rt2800usb.ko"
            "rt2x00usb.ko"
            "rt2x00lib.ko"
            "rt2800lib.ko"
            "rtw88_core.ko"
            "rtw88_usb.ko"
          )

          for f in "${REQUIRED[@]}"; do
            echo "$KO_FILES" | grep -q "/$f$" || { echo "Missing required module: $f"; exit 1; }
          done

          echo "=== OPTIONAL TARGETS STATUS ==="
          FOUND_OPTIONAL=0
          for f in "${OPTIONAL_TARGETS[@]}"; do
            if echo "$KO_FILES" | grep -q "/$f$"; then
              echo "FOUND: $f"
              FOUND_OPTIONAL=$((FOUND_OPTIONAL + 1))
            else
              echo "MISSING: $f"
            fi
          done

          if [ "$FOUND_OPTIONAL" -eq 0 ]; then
            echo "No target USB/device-specific modules were generated"
            echo "Last 200 build log lines:"
            tail -200 "$GITHUB_WORKSPACE/build.log" || true
            exit 1
          fi

      - name: Extract and organize modules
        shell: bash
        run: |
          set -euo pipefail
          cd backports-stable

          mkdir -p ../modules-out

          find . -name "*.ko" -type f | grep -E '(mt76|mt7921|mt76x0|mt76x2|rt2x00|rt2800|rtl8xxxu|rtw88|cfg80211|mac80211)\.ko$' | while read -r f; do
            cp -v "$f" ../modules-out/
          done

          echo "=== FILES IN modules-out ==="
          ls -lh ../modules-out/

          if [ "$(find ../modules-out -maxdepth 1 -name "*.ko" | wc -l)" -eq 0 ]; then
            echo "ERROR: no wireless .ko files copied"
            exit 1
          fi

          cd ../modules-out
          ARCHIVE_NAME="wireless-modules-op11r-allfamilies-${GITHUB_RUN_NUMBER}.zip"
          zip -r "$GITHUB_WORKSPACE/$ARCHIVE_NAME" *.ko

          echo "✓ Archive created: $ARCHIVE_NAME"
          ls -lh "$GITHUB_WORKSPACE/$ARCHIVE_NAME"

      - name: Collect and verify artifacts
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts

          echo "Collecting artifacts..."

          if ls "$GITHUB_WORKSPACE"/wireless-modules-op11r-allfamilies-*.zip 1> /dev/null 2>&1; then
            cp "$GITHUB_WORKSPACE"/wireless-modules-op11r-allfamilies-*.zip artifacts/ || true
            echo "✓ Wireless modules archive copied"
          fi

          if [ -f "$GITHUB_WORKSPACE/build.log" ]; then
            cp "$GITHUB_WORKSPACE/build.log" artifacts/build-full.log || true
            echo "✓ Build log copied"
          fi

          if [ -f backports-stable/oldconfig.log ]; then
            cp backports-stable/oldconfig.log artifacts/ || true
            echo "✓ Config log copied"
          fi

          if [ -f backports-stable/.config ]; then
            cp backports-stable/.config artifacts/backports.config || true
            echo "✓ Backports config copied"
          fi

          cat > artifacts/BUILD_SUMMARY.txt <<EOF
          Build Summary
          =============
          Date: $(date)
          Kernel Version: ${KERNEL_VER:-unknown}
          Manifest: ${MANIFEST:-unknown}
          Backports Release: ${{ github.event.inputs.backports_release }}
          SOC: ${SOC}
          Model: ${MODEL}
          Build Type: MediaTek + Ralink + Realtek WiFi modules
          EOF

          ls -lah artifacts

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: op11r-wireless-backports
          path: artifacts
