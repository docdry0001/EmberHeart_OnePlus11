name: Build Wireless Backports Modules for OP11R (FIXED)

on:
  workflow_dispatch:
    inputs:
      manifest:
        description: "Manifest preset"
        required: true
        default: "OOS16"
        type: choice
        options:
          - OOS14
          - OOS15
          - OOS16
      backports_release:
        description: "Stable backports release"
        required: true
        default: "backports-6.1.97-1"
        type: choice
        options:
          - backports-6.1.97-1
      build_jobs:
        description: "Parallel build jobs (2-8, lower = more stable)"
        required: true
        default: "4"
        type: choice
        options:
          - "2"
          - "4"
          - "6"
          - "8"

jobs:
  build-wireless-modules:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    env:
      MODEL: OP11R
      SOC: waipio
      CONFIG: OP11R
      BRANCH: oneplus/sm8475
      MANIFEST_OOS14_MODULES: oneplus_11r_u.xml
      MANIFEST_OOS15_MODULES: oneplus_11r_v.xml
      MANIFEST_OOS16_MODULES: oneplus_11r_b.xml

    steps:
      - name: Validate target
        shell: bash
        run: |
          set -euo pipefail
          [ "$MODEL" = "OP11R" ] || exit 1
          [ "$SOC" = "waipio" ] || exit 1
          echo "✓ Target validation passed"

      - name: Cleanup runner
        shell: bash
        run: |
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet /usr/share/swift /usr/local/.ghcup /usr/local/julia* \
            /usr/local/lib/android /usr/local/share/chromium /opt/microsoft /opt/google \
            /opt/az /usr/local/share/powershell /opt/hostedtoolcache 2>/dev/null || true
          docker system prune -af 2>/dev/null || true
          docker builder prune -af 2>/dev/null || true
          echo "Disk space after cleanup:"
          df -h

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git curl ca-certificates build-essential clang lld flex bison \
            libelf-dev libssl-dev libncurses-dev zlib1g-dev liblz4-tool \
            libxml2-utils rsync unzip dwarves file python3 ccache wget patch jq \
            coccinelle kmod bc perl xz-utils zip device-tree-compiler \
            python3-dev python-is-python3
          sudo apt-get clean
          echo "✓ Dependencies installed"

      - name: Set manifest
        shell: bash
        run: |
          set -euo pipefail
          case "${{ github.event.inputs.manifest }}" in
            OOS14) echo "MANIFEST=$MANIFEST_OOS14_MODULES" >> "$GITHUB_ENV" ;;
            OOS15) echo "MANIFEST=$MANIFEST_OOS15_MODULES" >> "$GITHUB_ENV" ;;
            OOS16) echo "MANIFEST=$MANIFEST_OOS16_MODULES" >> "$GITHUB_ENV" ;;
            *) echo "✗ Unknown manifest"; exit 1 ;;
          esac

      - name: Install repo
        shell: bash
        run: |
          set -euo pipefail
          sudo curl -L https://storage.googleapis.com/git-repo-downloads/repo -o /usr/local/bin/repo
          sudo chmod +x /usr/local/bin/repo
          repo --version
          echo "✓ Repo tool installed"

      - name: Sync OP11R kernel source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$CONFIG"
          cd "$CONFIG"
          repo init -u https://github.com/OnePlusOSS/kernel_manifest.git \
            -b "$BRANCH" -m "$MANIFEST" --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags

          for i in 1 2 3; do
            echo "repo sync attempt $i..."
            if repo sync -c --no-clone-bundle --no-tags --optimized-fetch -j"$(nproc)" --fail-fast; then
              echo "✓ Sync successful"
              break
            fi
            if [ "$i" -lt 3 ]; then
              sleep 20
            else
              echo "✗ Sync failed after 3 attempts"
              exit 1
            fi
          done

      - name: Detect kernel version and prepare tree
        shell: bash
        run: |
          set -euo pipefail
          MSM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel"
          cd "$MSM"

          VERSION=$(grep '^VERSION *=' Makefile | awk '{print $3}')
          PATCHLEVEL=$(grep '^PATCHLEVEL *=' Makefile | awk '{print $3}')
          SUBLEVEL=$(grep '^SUBLEVEL *=' Makefile | awk '{print $3}')
          KERNEL_VER="${VERSION}.${PATCHLEVEL}.${SUBLEVEL}"
          echo "KERNEL_VER=$KERNEL_VER" >> "$GITHUB_ENV"
          echo "✓ Kernel version: $KERNEL_VER"

          make ARCH=arm64 mrproper
          mkdir -p out
          ./scripts/kconfig/merge_config.sh -O out -m \
            arch/arm64/configs/gki_defconfig \
            arch/arm64/configs/vendor/${SOC}_GKI.config || true

          cp out/.config arch/arm64/configs/gki_defconfig
          make O=out ARCH=arm64 olddefconfig </dev/null

      - name: Find clang toolchain
        shell: bash
        run: |
          set -euo pipefail
          MSM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel"
          FOUND=false

          for search_dir in "$MSM/../prebuilts-master/clang/host/linux-x86" \
                            "$MSM/../common/prebuilts-master/clang/host/linux-x86" \
                            "$GITHUB_WORKSPACE/$CONFIG/prebuilts-master/clang/host/linux-x86" \
                            "$GITHUB_WORKSPACE/$CONFIG/kernel_platform/prebuilts-master/clang/host/linux-x86" \
                            "$GITHUB_WORKSPACE/$CONFIG/kernel_platform/prebuilts/clang/host/linux-x86"; do
            if [ -d "$search_dir" ]; then
              latest=$(find "$search_dir" -maxdepth 1 -type d -name "clang-r*" 2>/dev/null | sort -V | tail -n1 || true)
              if [ -n "$latest" ] && [ -x "$latest/bin/clang" ]; then
                echo "CLANG_BIN=$latest/bin" >> "$GITHUB_ENV"
                echo "✓ Found prebuilt clang: $latest/bin"
                FOUND=true
                break
              fi
            fi
          done

          if ! $FOUND; then
            echo "CLANG_BIN=$(dirname "$(command -v clang)")" >> "$GITHUB_ENV"
            echo "✓ Using system clang"
          fi

      - name: Kernel prepare
        shell: bash
        run: |
          set -euo pipefail
          MSM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel"
          OUT="$MSM/out"

          export PATH="${CLANG_BIN}:$PATH:/usr/lib/ccache"
          export HOSTCC=clang
          export HOSTCXX=clang++

          MAKE_FLAGS=(
            LLVM=1
            LLVM_IAS=1
            ARCH=arm64
            SUBARCH=arm64
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
            LD=ld.lld
            HOSTLD=ld.lld
            AR=llvm-ar
            NM=llvm-nm
            OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump
            DEPMOD=depmod
            DTC=dtc
            STRIP=llvm-strip
            CC=clang
          )

          cd "$MSM"

          make "${MAKE_FLAGS[@]}" O="$OUT" gki_defconfig

          if [ -x ./scripts/config ]; then
            ./scripts/config --file "$OUT/.config" --set-val CFG80211 m || true
            ./scripts/config --file "$OUT/.config" --set-val MAC80211 m || true
            ./scripts/config --file "$OUT/.config" --enable WIRELESS || true
            ./scripts/config --file "$OUT/.config" --enable WIRELESS_EXT || true
            ./scripts/config --file "$OUT/.config" --enable WEXT_PRIV || true

            for sym in CFI CFI_CLANG LTO_CLANG LTO_CLANG_THIN SHADOW_CALL_STACK \
                       KASAN KASAN_SW_TAGS KASAN_HW_TAGS UBSAN UBSAN_TRAP UBSAN_BOUNDS; do
              ./scripts/config --file "$OUT/.config" --disable "$sym" || true
            done
          fi

          make "${MAKE_FLAGS[@]}" O="$OUT" olddefconfig
          make "${MAKE_FLAGS[@]}" O="$OUT" prepare
          make "${MAKE_FLAGS[@]}" O="$OUT" modules_prepare

          echo "✓ Kernel preparation complete"
          ls -la "$OUT" | head -20

      - name: Download backports
        shell: bash
        run: |
          set -euo pipefail
          RELEASE="${{ github.event.inputs.backports_release }}"
          wget -v -O backports.tar.xz \
            "https://cdn.kernel.org/pub/linux/kernel/projects/backports/stable/v6.1.97/${RELEASE}.tar.xz"
          tar -xf backports.tar.xz
          mv "$RELEASE" backports-stable
          echo "✓ Backports extracted"

      - name: Patch compat for CFI
        shell: bash
        run: |
          set -euo pipefail
          cd backports-stable
          FILE="backport-include/linux/module.h"
          if [ -f "$FILE" ]; then
            sed -i 's/__CFI_ADDRESSABLE(init_module, __initdata)/__CFI_ADDRESSABLE(init_module)/g' "$FILE"
            sed -i 's/__CFI_ADDRESSABLE(cleanup_module, __exitdata)/__CFI_ADDRESSABLE(cleanup_module)/g' "$FILE"
            echo "✓ CFI patch applied"
          fi

      - name: Configure backports with CPTCFG symbols
        shell: bash
        run: |
          set -euo pipefail
          KERNEL_BUILD="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel/out"
          export PATH="${CLANG_BIN}:$PATH:/usr/lib/ccache"

          MAKE_FLAGS=(
            LLVM=1
            LLVM_IAS=1
            ARCH=arm64
            SUBARCH=arm64
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
            LD=ld.lld
            HOSTLD=ld.lld
            AR=llvm-ar
            NM=llvm-nm
            OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump
            DEPMOD=depmod
            DTC=dtc
            STRIP=llvm-strip
            HOSTCC=clang
            HOSTCXX=clang++
            CC=clang
          )

          cd backports-stable

          make "${MAKE_FLAGS[@]}" \
            KLIB="$KERNEL_BUILD" \
            KLIB_BUILD="$KERNEL_BUILD" \
            allnoconfig

          cat >> .config <<'EOF'
          CPTCFG_WLAN=y
          CPTCFG_CFG80211=m
          CPTCFG_CFG80211_WEXT=y
          CPTCFG_MAC80211=m
          CPTCFG_MAC80211_RC_MINSTREL=y
          CPTCFG_MAC80211_LEDS=y

          CPTCFG_WIRELESS=y
          CPTCFG_WIRELESS_EXT=y
          CPTCFG_WEXT_CORE=y
          CPTCFG_WEXT_PROC=y
          CPTCFG_WEXT_SPY=y
          CPTCFG_WEXT_PRIV=y

          CPTCFG_WLAN_VENDOR_MEDIATEK=y
          CPTCFG_MT76_CORE=m
          CPTCFG_MT76_USB=m
          CPTCFG_MT76_SDIO=m
          CPTCFG_MT76_MMIO=m
          CPTCFG_MT76_CONNAC_LIB=m
          CPTCFG_MT792x_LIB=m
          CPTCFG_MT792x_USB=m
          CPTCFG_MT7921_COMMON=m
          CPTCFG_MT7921U=m
          CPTCFG_MT7921E=m
          CPTCFG_MT7921S=m
          CPTCFG_MT7615_COMMON=m
          CPTCFG_MT7615E=m
          CPTCFG_MT7663_USB_SDIO_COMMON=m
          CPTCFG_MT7663U=m
          CPTCFG_MT7663S=m

          CPTCFG_WLAN_VENDOR_REALTEK=y
          CPTCFG_RTL8XXXU=m
          CPTCFG_RTL8XXXU_UNTESTED=y
          CPTCFG_RTL8188EU=m
          CPTCFG_RTL8192EU=m
          CPTCFG_RTL8723BU=m
          CPTCFG_RTL8723CU=m
          CPTCFG_RTL8821CU=m

          CPTCFG_RTW88=m
          CPTCFG_RTW88_CORE=m
          CPTCFG_RTW88_USB=m
          CPTCFG_RTW88_SDIO=m
          CPTCFG_RTW88_8822B=m
          CPTCFG_RTW88_8822C=m
          CPTCFG_RTW88_8723D=m
          CPTCFG_RTW88_8821C=m
          CPTCFG_RTW88_DEBUG=y
          CPTCFG_RTW88_DEBUGFS=y

          CPTCFG_RTW89=m
          CPTCFG_RTW89_CORE=m
          CPTCFG_RTW89_8852AE=m
          CPTCFG_RTW89_8852BE=m
          CPTCFG_RTW89_8852CE=m
          CPTCFG_RTW89_DEBUG=y
          CPTCFG_RTW89_DEBUGFS=y

          CPTCFG_USB=y
          CPTCFG_PCI=y
          CPTCFG_NL80211_TESTMODE=y

          CPTCFG_WLAN_VENDOR_INTEL=n
          CPTCFG_IWLWIFI=n
          CPTCFG_IWLMVM=n
          CPTCFG_IWLDVM=n

          CPTCFG_WLAN_VENDOR_ATH=n
          CPTCFG_ATH10K=n
          CPTCFG_ATH11K=n
          CPTCFG_ATH9K=n

          CPTCFG_WLAN_VENDOR_BROADCOM=n
          CPTCFG_BRCMFMAC=n

          CPTCFG_MWIFIEX=n
          CPTCFG_WL18XX=n
          CPTCFG_WLCORE=n
          EOF

          yes "" | make "${MAKE_FLAGS[@]}" \
            KLIB="$KERNEL_BUILD" \
            KLIB_BUILD="$KERNEL_BUILD" \
            oldconfig 2>&1 | tee oldconfig.log

          echo "===== effective wireless config ====="
          grep -E '^(CPTCFG_(CFG80211|MAC80211|MT76|MT792|MT7615|MT7663|RTL8XXXU|RTL8188EU|RTL8192EU|RTL8723BU|RTL8723CU|RTL8821CU|RTW88|RTW89|WLAN_VENDOR_).*)=' .config | sort || true

          if ! grep -q '^CPTCFG_MT7921U=m' .config; then
            echo "✗ CPTCFG_MT7921U was dropped"
            exit 1
          fi

          if ! grep -q '^CPTCFG_RTL8XXXU=m' .config; then
            echo "✗ CPTCFG_RTL8XXXU was dropped"
            exit 1
          fi

          if grep -qE '^CPTCFG_(IWLWIFI|IWLMVM|IWLDVM)=([my])' .config; then
            echo "✗ Intel subtree is still enabled"
            grep -E '^CPTCFG_(IWLWIFI|IWLMVM|IWLDVM)=' .config || true
            exit 1
          fi

          echo "✓ Backports config looks valid"

      - name: Clean backports build directory
        shell: bash
        run: |
          set -euo pipefail
          cd backports-stable
          make clean 2>/dev/null || true
          find . -name "*.o" -delete
          find . -name "*.ko" -delete
          find . -name ".tmp_versions" -type d -exec rm -rf {} + 2>/dev/null || true
          find . -name "modules.order" -delete
          echo "✓ Build directory cleaned"

      - name: Build backports modules
        shell: bash
        run: |
          set -euo pipefail
          KERNEL_BUILD="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel/out"
          export PATH="${CLANG_BIN}:$PATH:/usr/lib/ccache"
          export CCACHE_DIR="$GITHUB_WORKSPACE/.ccache"
          mkdir -p "$CCACHE_DIR"

          MAKE_FLAGS=(
            LLVM=1
            LLVM_IAS=1
            ARCH=arm64
            SUBARCH=arm64
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
            LD=ld.lld
            HOSTLD=ld.lld
            AR=llvm-ar
            NM=llvm-nm
            OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump
            DEPMOD=depmod
            DTC=dtc
            STRIP=llvm-strip
            HOSTCC=clang
            HOSTCXX=clang++
            CC=clang
          )

          cd backports-stable

          make -j${{ github.event.inputs.build_jobs }} \
            "${MAKE_FLAGS[@]}" \
            KLIB="$KERNEL_BUILD" \
            KLIB_BUILD="$KERNEL_BUILD" \
            V=1 2>&1 | tee "$GITHUB_WORKSPACE/build.log"

          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "✗ Build failed with exit code $BUILD_EXIT"
            echo "--- last 200 lines ---"
            tail -200 "$GITHUB_WORKSPACE/build.log"
            echo "--- filtered errors ---"
            grep -iE 'error:|undefined|failed|Error [0-9]+' "$GITHUB_WORKSPACE/build.log" | tail -120 || true
            exit 1
          fi

          echo "✓ Build completed successfully"

      - name: Verify .ko files generated
        shell: bash
        run: |
          set -euo pipefail
          cd backports-stable

          KO_FILES=$(find . -name "*.ko" -type f 2>/dev/null || true)
          KO_COUNT=$(echo "$KO_FILES" | grep -c '\.ko$' || true)

          echo "Total .ko files found: $KO_COUNT"
          echo "$KO_FILES" | sort || true

          if [ "$KO_COUNT" -eq 0 ]; then
            echo "✗ No .ko files generated"
            exit 1
          fi

          if [ "$KO_COUNT" -eq 1 ] && echo "$KO_FILES" | grep -q 'compat\.ko'; then
            echo "✗ Only compat.ko was generated, driver config is still wrong"
            exit 1
          fi

          echo ""
          echo "Critical module check:"
          for module in compat cfg80211 mac80211 mt76 mt7921u rtl8xxxu rtw88_core; do
            if echo "$KO_FILES" | grep -q "${module}\.ko"; then
              echo "  ✓ ${module}.ko"
            else
              echo "  ✗ ${module}.ko"
            fi
          done

      - name: Extract and organize modules
        shell: bash
        run: |
          set -euo pipefail
          cd backports-stable
          mkdir -p ../modules-out

          find . -name "*.ko" -type f | while read -r ko; do
            cp -v "$ko" "../modules-out/$(basename "$ko")"
          done

          cd ../modules-out
          COUNT=$(ls -1 *.ko 2>/dev/null | wc -l || true)
          if [ "$COUNT" -eq 0 ]; then
            echo "✗ No modules copied to modules-out"
            exit 1
          fi

          echo "Modules copied: $COUNT"
          ls -lh *.ko

          ARCHIVE="wireless-modules-op11r-backports-${GITHUB_RUN_NUMBER}.zip"
          zip -r "$GITHUB_WORKSPACE/$ARCHIVE" *.ko
          ls -lh "$GITHUB_WORKSPACE/$ARCHIVE"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wireless-modules-op11r-${{ github.run_number }}
          path: |
            wireless-modules-op11r-backports-*.zip
            build.log
            backports-stable/.config
            backports-stable/oldconfig.log
            modules-out/*.ko
          if-no-files-found: warn
          retention-days: 14
