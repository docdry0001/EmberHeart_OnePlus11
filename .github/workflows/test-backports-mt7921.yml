name: Test Stable Backports MT7921U on OP11R via Stock Action

on:
  workflow_dispatch:
    inputs:
      manifest:
        description: "Manifest preset"
        required: true
        default: "OOS16"
        type: choice
        options:
          - OOS14
          - OOS15
          - OOS16

      backports_release:
        description: "Stable backports release"
        required: true
        default: "backports-6.1.97-1"
        type: choice
        options:
          - backports-6.1.97-1

      optimize_level:
        description: "Optimization level"
        required: true
        default: "O2"
        type: choice
        options:
          - O2
          - O3

jobs:
  backports-mt7921-stock-env:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build MT7921 backports through stock kernel action
        uses: ./.github/kernel_modules/action.yml
        with:
          manifest: ${{ github.event.inputs.manifest }}
          optimize_level: ${{ github.event.inputs.optimize_level }}
          package_external_only: 'true'
          op_config_json: >-
            {"model":"OP11R","soc":"waipio","branch":"oneplus/sm8475","manifest_OOS14_MODULES":"oneplus_11r_u.xml","manifest_OOS15_MODULES":"oneplus_11r_v.xml","manifest_OOS16_MODULES":"oneplus_11r_b.xml"}

          external_modules_script: |
            set -euo pipefail

            WORK="$GITHUB_WORKSPACE/backports-stable"
            RELEASE="${{ github.event.inputs.backports_release }}"
            URL="https://cdn.kernel.org/pub/linux/kernel/projects/backports/stable/v6.1.97/${RELEASE}.tar.xz"

            rm -rf "$WORK" "$GITHUB_WORKSPACE/backports.tar.xz"

            wget -O "$GITHUB_WORKSPACE/backports.tar.xz" "$URL"
            tar -xf "$GITHUB_WORKSPACE/backports.tar.xz" -C "$GITHUB_WORKSPACE"
            mv "$GITHUB_WORKSPACE/$RELEASE" "$WORK"

            cd "$WORK"

            MAKE_FLAGS=()
            eval "MAKE_FLAGS=($MAKE_FLAGS_STR)"

            KREL="$(make "${MAKE_FLAGS[@]}" -C "$MSM" O="$OUT" kernelrelease)"
            echo "Kernel release: $KREL"

            echo "==== Kernel OUT info ===="
            echo "MSM=$MSM"
            echo "OUT=$OUT"
            echo "EXTERNAL_MODULES_OUT=$EXTERNAL_MODULES_OUT"
            ls -la "$OUT" || true
            ls -la "$OUT/include/generated" || true
            ls -la "$OUT/arch/arm64/include/generated" || true
            test -f "$OUT/Module.symvers" && echo "Module.symvers exists" || echo "Module.symvers missing"

            make "${MAKE_FLAGS[@]}" \
              KLIB_BUILD="$OUT" \
              KLIB="$OUT" \
              allnoconfig

            cat >> .config <<'EOF'
            CPTCFG_WLAN=y
            CPTCFG_CFG80211=m
            CPTCFG_MAC80211=m
            CPTCFG_WLAN_VENDOR_MEDIATEK=y
            CPTCFG_MT76_CORE=m
            CPTCFG_MT76_USB=m
            CPTCFG_MT76_CONNAC_LIB=m
            CPTCFG_MT792x_LIB=m
            CPTCFG_MT792x_USB=m
            CPTCFG_MT7921_COMMON=m
            CPTCFG_MT7921U=m
            CPTCFG_USB=y
            CPTCFG_PCI=y
            CPTCFG_NL80211_TESTMODE=y
            EOF

            make "${MAKE_FLAGS[@]}" \
              KLIB_BUILD="$OUT" \
              KLIB="$OUT" \
              olddefconfig </dev/null

            echo "==== Final backports config check ===="
            grep -E 'CPTCFG_(CFG80211|MAC80211|MT76|MT792|WLAN_VENDOR_MEDIATEK|WLAN|USB|PCI|NL80211_TESTMODE)' .config || true

            FILE="backport-include/linux/module.h"
            if [ -f "$FILE" ]; then
              sed -i 's/__CFI_ADDRESSABLE(init_module, __initdata)/__CFI_ADDRESSABLE(init_module)/g' "$FILE"
              sed -i 's/__CFI_ADDRESSABLE(cleanup_module, __exitdata)/__CFI_ADDRESSABLE(cleanup_module)/g' "$FILE"
            fi

            echo "==== Start backports build ===="
            make -j"$(nproc --all)" "${MAKE_FLAGS[@]}" \
              KLIB_BUILD="$OUT" \
              KLIB="$OUT" \
              V=1 \
              2>&1 | tee "$GITHUB_WORKSPACE/backports-build.log"

            KO_COUNT="$(find . -type f -name '*.ko' | wc -l || true)"
            echo "KO_COUNT=$KO_COUNT"
            [ "$KO_COUNT" -gt 0 ] || { echo "No backports .ko modules produced"; exit 1; }

            mkdir -p "$EXTERNAL_MODULES_OUT"
            find . -type f -name '*.ko' -exec cp -f {} "$EXTERNAL_MODULES_OUT/" \;

            echo "==== Copied backports modules ===="
            find "$EXTERNAL_MODULES_OUT" -type f -name '*.ko' | sort || true

            echo "==== modinfo check ===="
            for ko in "$EXTERNAL_MODULES_OUT"/*.ko; do
              [ -f "$ko" ] || continue
              echo "--- $(basename "$ko") ---"
              modinfo "$ko" | grep -E '^(filename|name|vermagic|depends):' || true
            done

      - name: Collect extra artifacts
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p extra-artifacts

          [ -f backports-build.log ] && cp -f backports-build.log extra-artifacts/ || true
          [ -f backports-stable/.config ] && cp -f backports-stable/.config extra-artifacts/backports.config || true
          [ -f backports-stable/Module.symvers ] && cp -f backports-stable/Module.symvers extra-artifacts/ || true

          find backports-stable -type f -name '*.ko' -exec cp --parents {} extra-artifacts/ \; || true

          echo "==== extra-artifacts ===="
          find extra-artifacts -maxdepth 6 -type f | sort || true

      - name: Upload extra artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backports-extra-logs
          path: extra-artifacts/
          if-no-files-found: ignore
