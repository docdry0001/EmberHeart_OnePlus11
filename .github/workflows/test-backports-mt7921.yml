name: Prepare MT76/MT7921 Source Port Bundle for OP11R

on:
  workflow_dispatch:
    inputs:
      manifest:
        description: "Manifest preset"
        required: true
        default: "OOS16"
        type: choice
        options:
          - OOS14
          - OOS15
          - OOS16
      backports_release:
        description: "Stable backports release"
        required: true
        default: "backports-6.1.97-1"
        type: choice
        options:
          - backports-6.1.97-1

jobs:
  prepare-mt76-port-bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    env:
      MODEL: OP11R
      SOC: waipio
      CONFIG: OP11R
      BRANCH: oneplus/sm8475
      MANIFEST_OOS14_MODULES: oneplus_11r_u.xml
      MANIFEST_OOS15_MODULES: oneplus_11r_v.xml
      MANIFEST_OOS16_MODULES: oneplus_11r_b.xml

    steps:
      - name: Validate OP11R target
        shell: bash
        run: |
          set -euo pipefail
          [ "$MODEL" = "OP11R" ] || { echo "Expected MODEL=OP11R, got $MODEL"; exit 1; }
          [ "$SOC" = "waipio" ] || { echo "Expected SOC=waipio, got $SOC"; exit 1; }

      - name: Cleanup runner
        shell: bash
        run: |
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet /usr/share/swift /usr/local/.ghcup /usr/local/julia* \
            /usr/local/lib/android /usr/local/share/chromium /opt/microsoft /opt/google \
            /opt/az /usr/local/share/powershell /opt/hostedtoolcache || true
          docker system prune -af || true
          docker builder prune -af || true
          df -h

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git curl ca-certificates build-essential clang lld flex bison \
            libelf-dev libssl-dev libncurses-dev zlib1g-dev liblz4-tool \
            libxml2-utils rsync unzip dwarves file python3 ccache wget patch jq \
            coccinelle kmod bc perl xz-utils zip
          sudo apt-get clean

      - name: Set manifest
        shell: bash
        run: |
          set -euo pipefail
          case "${{ github.event.inputs.manifest }}" in
            OOS14) echo "MANIFEST=$MANIFEST_OOS14_MODULES" >> "$GITHUB_ENV" ;;
            OOS15) echo "MANIFEST=$MANIFEST_OOS15_MODULES" >> "$GITHUB_ENV" ;;
            OOS16) echo "MANIFEST=$MANIFEST_OOS16_MODULES" >> "$GITHUB_ENV" ;;
            *) echo "Unknown manifest"; exit 1 ;;
          esac

      - name: Install repo tool
        shell: bash
        run: |
          set -euo pipefail
          sudo curl -L https://storage.googleapis.com/git-repo-downloads/repo -o /usr/local/bin/repo
          sudo chmod +x /usr/local/bin/repo
          repo --version

      - name: Sync OP11R kernel source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$CONFIG"
          cd "$CONFIG"

          repo init -u https://github.com/OnePlusOSS/kernel_manifest.git \
            -b "$BRANCH" \
            -m "$MANIFEST" \
            --repo-rev=v2.16 \
            --depth=1 \
            --no-clone-bundle \
            --no-tags

          ok=false
          for i in 1 2 3; do
            if repo sync -c --no-clone-bundle --no-tags --optimized-fetch -j"$(nproc --all)" --fail-fast; then
              ok=true
              break
            fi
            echo "repo sync attempt $i failed"
            sleep 20
          done
          $ok || { echo "repo sync failed"; exit 1; }

      - name: Detect kernel version and prepare msm tree
        shell: bash
        run: |
          set -euo pipefail
          MSM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel"
          cd "$MSM"

          VERSION=$(grep '^VERSION *=' Makefile | awk '{print $3}')
          PATCHLEVEL=$(grep '^PATCHLEVEL *=' Makefile | awk '{print $3}')
          SUBLEVEL=$(grep '^SUBLEVEL *=' Makefile | awk '{print $3}')
          echo "KERNEL_VER=$VERSION.$PATCHLEVEL.$SUBLEVEL" >> "$GITHUB_ENV"

          make ARCH=arm64 mrproper
          mkdir -p out

          ./scripts/kconfig/merge_config.sh -O out -m \
            arch/arm64/configs/gki_defconfig \
            arch/arm64/configs/vendor/${SOC}_GKI.config

          cp out/.config arch/arm64/configs/gki_defconfig
          make O=out ARCH=arm64 olddefconfig </dev/null

      - name: Detect clang
        shell: bash
        run: |
          set -euo pipefail
          KP="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
          FOUND=false
          for base in "$KP/prebuilts" "$KP/prebuilts-master"; do
            [ -d "$base/clang/host/linux-x86" ] || continue
            latest=$(ls -d "$base"/clang/host/linux-x86/clang-r*/ 2>/dev/null | sort -V | tail -n1 || true)
            if [ -n "$latest" ] && [ -x "$latest/bin/clang" ]; then
              echo "CLANG_BIN=$latest/bin" >> "$GITHUB_ENV"
              FOUND=true
            fi
          done
          if ! $FOUND; then
            echo "CLANG_BIN=$(dirname "$(command -v clang)")" >> "$GITHUB_ENV"
          fi

      - name: Download stable backports release
        shell: bash
        run: |
          set -euo pipefail
          RELEASE="${{ github.event.inputs.backports_release }}"
          URL="https://cdn.kernel.org/pub/linux/kernel/projects/backports/stable/v6.1.97/${RELEASE}.tar.xz"

          wget -O backports.tar.xz "$URL"
          tar -xf backports.tar.xz
          mv "$RELEASE" backports-stable

      - name: Inspect backports MediaTek tree
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/backports-stable"

          echo "===== MEDIATEK TREE ====="
          find drivers/net/wireless/mediatek/mt76 -maxdepth 2 -type f | sort || true

          echo "===== MEDIATEK CONFIG ENTRIES ====="
          grep -Rns "config .*MT7921\|config .*MT792x\|config .*MT76" drivers/net/wireless/mediatek/mt76 || true

      - name: Build backports modules
        shell: bash
        run: |
          set -euo pipefail
          
          # Սահմանում ենք ճանապարհները
          MSM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel"
          KERNEL_BUILD="$MSM/out"
          BP_DIR="$GITHUB_WORKSPACE/backports-stable"
          
          if [ -n "${CLANG_BIN:-}" ] && [ -x "${CLANG_BIN}/clang" ]; then
            export PATH="${CLANG_BIN}:$PATH"
          fi
          export PATH="/usr/lib/ccache:$PATH"
      
          # Կոմպիլյացիայի դրոշակները (Flags)
          MAKE_FLAGS=(
            LLVM=1
            LLVM_IAS=1
            ARCH=arm64
            SUBARCH=arm64
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
            LD=ld.lld
            HOSTLD=ld.lld
            AR=llvm-ar
            NM=llvm-nm
            OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump
            STRIP=llvm-strip
            HOSTCC=clang
            HOSTCXX=clang++
            CC="ccache clang"
          )
      
          cd "$BP_DIR"
      
          # Ավելացնում ենք նախածանցը բոլոր սիմվոլների և namespace-ի համար,
          # որպեսզի խուսափենք բեռնված միջուկի հետ կոնֆլիկտից
          export EXTRA_CFLAGS="-Dbackport_prefix=bp_ -Dbackport_ns=bp"
      
          # Գործարկում ենք բուն կոմպիլյացիան 'modules' թիրախով
          make -j"$(nproc --all)" "${MAKE_FLAGS[@]}" \
            KLIB="$KERNEL_BUILD" \
            KLIB_BUILD="$KERNEL_BUILD" \
            EXTRA_CFLAGS="$EXTRA_CFLAGS" \
            V=1 \
            modules
      
      - name: Configure backports for MT76/MT7921 only
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/backports-stable"

          # 1. Փոխում ենք մոդուլների ներքին անունները Makefile-ներում, 
          # որպեսզի միջուկը դրանք տեսնի որպես 'bp_cfg80211' և այլն:
          find . -name "Makefile" -type f -exec sed -i 's/cfg80211-/bp_cfg80211-/g' {} +
          find . -name "Makefile" -type f -exec sed -i 's/mac80211-/bp_mac80211-/g' {} +
          sed -i 's/obj-$(CPTCFG_CFG80211) += cfg80211.o/obj-$(CPTCFG_CFG80211) += bp_cfg80211.o/' net/wireless/Makefile
          sed -i 's/obj-$(CPTCFG_MAC80211) += mac80211.o/obj-$(CPTCFG_MAC80211) += bp_mac80211.o/' net/mac80211/Makefile

          KERNEL_BUILD="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel/out"
          
          # [Նախկին MAKE_FLAGS-ը այստեղ...]
          MAKE_FLAGS=(
            LLVM=1 ARCH=arm64 SUBARCH=arm64
            # [span_1](start_span)... մնացած դրոշակները[span_1](end_span)
          )

          make "${MAKE_FLAGS[@]}" KLIB="$KERNEL_BUILD" KLIB_BUILD="$KERNEL_BUILD" allnoconfig

          # [span_2](start_span)Ավելացնում ենք կոնֆիգուրացիան[span_2](end_span)
          printf '%s\n' \
          'CPTCFG_WLAN=y' \
          'CPTCFG_CFG80211=m' \
          'CPTCFG_MAC80211=m' \
          'CPTCFG_BACKPORT_OPTION_UNUSED=y' >> .config

          make "${MAKE_FLAGS[@]}" KLIB="$KERNEL_BUILD" KLIB_BUILD="$KERNEL_BUILD" olddefconfig </dev/null

      
      - name: Build backports tree for source adaptation validation
        shell: bash
        run: |
          set -euo pipefail
          KERNEL_BUILD="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel/out"

          if [ -n "${CLANG_BIN:-}" ] && [ -x "${CLANG_BIN}/clang" ]; then
            export PATH="${CLANG_BIN}:$PATH"
          fi
          export PATH="/usr/lib/ccache:$PATH"

          MAKE_FLAGS=(
            LLVM=1
            LLVM_IAS=1
            ARCH=arm64
            SUBARCH=arm64
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
            LD=ld.lld
            HOSTLD=ld.lld
            AR=llvm-ar
            NM=llvm-nm
            OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump
            DEPMOD=depmod
            DTC=dtc
            STRIP=llvm-strip
            HOSTCC=clang
            HOSTCXX=clang++
            CC=clang
          )

          cd "$GITHUB_WORKSPACE/backports-stable"

          make -j"$(nproc --all)" "${MAKE_FLAGS[@]}" \
            KLIB="$KERNEL_BUILD" \
            KLIB_BUILD="$KERNEL_BUILD" \
            V=1 \
            2>&1 | tee "$GITHUB_WORKSPACE/backports-build.log" || true
            
      
      - name: Prepare MT76 transplant bundle
        shell: bash
        run: |
          set -euo pipefail

          BUNDLE_ROOT="$GITHUB_WORKSPACE/mt76-port-bundle"
          BP="$GITHUB_WORKSPACE/backports-stable"
          MSM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel"

          rm -rf "$BUNDLE_ROOT"
          mkdir -p "$BUNDLE_ROOT/drivers/net/wireless/mediatek"

          cp -a "$BP/drivers/net/wireless/mediatek/mt76" \
                "$BUNDLE_ROOT/drivers/net/wireless/mediatek/"

          mkdir -p "$BUNDLE_ROOT/metadata"

          {
            echo "MODEL=$MODEL"
            echo "SOC=$SOC"
            echo "TARGET_KERNEL=$KERNEL_VER"
            echo "BACKPORTS_RELEASE=${{ github.event.inputs.backports_release }}"
            echo "MANIFEST=$MANIFEST"
            echo "BUNDLE_KIND=source_transplant"
          } > "$BUNDLE_ROOT/metadata/manifest.txt"

          if [ -f "$BP/.config" ]; then
            cp -f "$BP/.config" "$BUNDLE_ROOT/metadata/backports.config"
          fi

          if [ -f "$GITHUB_WORKSPACE/backports-build.log" ]; then
            cp -f "$GITHUB_WORKSPACE/backports-build.log" "$BUNDLE_ROOT/metadata/"
          fi

          if [ -f "$BP/drivers/net/wireless/mediatek/mt76/Kconfig" ]; then
            cp -f "$BP/drivers/net/wireless/mediatek/mt76/Kconfig" "$BUNDLE_ROOT/metadata/mt76.Kconfig"
          fi

          if [ -f "$BP/drivers/net/wireless/mediatek/mt76/Makefile" ]; then
            cp -f "$BP/drivers/net/wireless/mediatek/mt76/Makefile" "$BUNDLE_ROOT/metadata/mt76.Makefile"
          fi

          echo "===== BUNDLE CONTENTS ====="
          find "$BUNDLE_ROOT" -maxdepth 5 -type f | sort || true

      - name: Create transplant bundle zip
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          zip -r mediatek-mt76-port-op11r-5.10.zip mt76-port-bundle >/dev/null

      - name: Collect KO modules
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/modules

          # Փնտրում և հավաքում է բոլոր .ko ֆայլերը backports թղթապանակից
          find "$GITHUB_WORKSPACE/backports-stable" -name "*.ko" -exec cp {} artifacts/modules/ \;

          # Նաև պահպանում ենք լոգերը և կոնֆիգը
          [ -f "$GITHUB_WORKSPACE/backports-stable/.config" ] && cp "$GITHUB_WORKSPACE/backports-stable/.config" artifacts/backports.config || true
          
          echo "===== GENERATED MODULES ====="
          ls -R artifacts/modules


      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: op11r-mt76-port-bundle
          path: artifacts
