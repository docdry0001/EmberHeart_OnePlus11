name: Test OpenWrt Backports MT7921U on OP11R

on:
  workflow_dispatch:
    inputs:
      manifest:
        description: "Manifest preset"
        required: true
        default: "OOS16"
        type: choice
        options:
          - OOS14
          - OOS15
          - OOS16
      linux_source_branch:
        description: "Linux stable branch for gentree source"
        required: true
        default: "linux-5.10.y"
        type: choice
        options:
          - linux-5.10.y
          - linux-5.15.y
      optimize_level:
        description: "Optimization level"
        required: true
        default: "O2"
        type: choice
        options:
          - O2
          - O3

jobs:
  backports-mt7921:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    env:
      MODEL: OP11R
      SOC: waipio
      CONFIG: OP11R
      BRANCH: oneplus/sm8475
      MANIFEST_OOS14_MODULES: oneplus_11r_u.xml
      MANIFEST_OOS15_MODULES: oneplus_11r_v.xml
      MANIFEST_OOS16_MODULES: oneplus_11r_b.xml

    steps:
      - name: Validate OP11R target
        shell: bash
        run: |
          set -euo pipefail
          [ "$MODEL" = "OP11R" ] || { echo "Expected MODEL=OP11R, got $MODEL"; exit 1; }
          [ "$SOC" = "waipio" ] || { echo "Expected SOC=waipio, got $SOC"; exit 1; }

      - name: Cleanup runner
        shell: bash
        run: |
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet /usr/share/swift /usr/local/.ghcup /usr/local/julia* \
            /usr/local/lib/android /usr/local/share/chromium /opt/microsoft /opt/google \
            /opt/az /usr/local/share/powershell /opt/hostedtoolcache || true
          docker system prune -af || true
          docker builder prune -af || true
          df -h

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git curl ca-certificates build-essential clang lld flex bison \
            libelf-dev libssl-dev libncurses-dev zlib1g-dev liblz4-tool \
            libxml2-utils rsync unzip dwarves file python3 ccache wget patch jq \
            coccinelle kmod bc perl xz-utils
          sudo apt-get clean

      - name: Set manifest
        shell: bash
        run: |
          set -euo pipefail
          case "${{ github.event.inputs.manifest }}" in
            OOS14) echo "MANIFEST=$MANIFEST_OOS14_MODULES" >> "$GITHUB_ENV" ;;
            OOS15) echo "MANIFEST=$MANIFEST_OOS15_MODULES" >> "$GITHUB_ENV" ;;
            OOS16) echo "MANIFEST=$MANIFEST_OOS16_MODULES" >> "$GITHUB_ENV" ;;
            *) echo "Unknown manifest"; exit 1 ;;
          esac

      - name: Install repo tool
        shell: bash
        run: |
          set -euo pipefail
          sudo curl -L https://storage.googleapis.com/git-repo-downloads/repo -o /usr/local/bin/repo
          sudo chmod +x /usr/local/bin/repo
          repo --version

      - name: Sync OP11R kernel source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$CONFIG"
          cd "$CONFIG"

          repo init -u https://github.com/OnePlusOSS/kernel_manifest.git \
            -b "$BRANCH" \
            -m "$MANIFEST" \
            --repo-rev=v2.16 \
            --depth=1 \
            --no-clone-bundle \
            --no-tags

          ok=false
          for i in 1 2 3; do
            if repo sync -c --no-clone-bundle --no-tags --optimized-fetch -j"$(nproc --all)" --fail-fast; then
              ok=true
              break
            fi
            echo "repo sync attempt $i failed"
            sleep 20
          done
          $ok || { echo "repo sync failed"; exit 1; }

      - name: Detect kernel version and prepare msm tree
        shell: bash
        run: |
          set -euo pipefail
          MSM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel"
          cd "$MSM"

          VERSION=$(grep '^VERSION *=' Makefile | awk '{print $3}')
          PATCHLEVEL=$(grep '^PATCHLEVEL *=' Makefile | awk '{print $3}')
          SUBLEVEL=$(grep '^SUBLEVEL *=' Makefile | awk '{print $3}')
          echo "KERNEL_VER=$VERSION.$PATCHLEVEL.$SUBLEVEL" >> "$GITHUB_ENV"

          make ARCH=arm64 mrproper
          mkdir -p out

          ./scripts/kconfig/merge_config.sh -O out -m \
            arch/arm64/configs/gki_defconfig \
            arch/arm64/configs/vendor/${SOC}_GKI.config

          cp out/.config arch/arm64/configs/gki_defconfig
          make O=out ARCH=arm64 olddefconfig </dev/null

      - name: Detect clang
        shell: bash
        run: |
          set -euo pipefail
          KP="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
          FOUND=false
          for base in "$KP/prebuilts" "$KP/prebuilts-master"; do
            [ -d "$base/clang/host/linux-x86" ] || continue
            latest=$(ls -d "$base"/clang/host/linux-x86/clang-r*/ 2>/dev/null | sort -V | tail -n1 || true)
            if [ -n "$latest" ] && [ -x "$latest/bin/clang" ]; then
              echo "CLANG_BIN=$latest/bin" >> "$GITHUB_ENV"
              FOUND=true
            fi
          done
          if ! $FOUND; then
            echo "CLANG_BIN=$(dirname "$(command -v clang)")" >> "$GITHUB_ENV"
          fi

      - name: Build kernel modules_prepare target
        shell: bash
        run: |
          set -euo pipefail
          MSM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel"
          OUT="$MSM/out"

          export PATH="$CLANG_BIN:$PATH"
          export PATH="/usr/lib/ccache:$PATH"

          MAKE_FLAGS=(
            LLVM=1
            LLVM_IAS=1
            ARCH=arm64
            SUBARCH=arm64
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
            LD=ld.lld
            HOSTLD=ld.lld
            AR=llvm-ar
            NM=llvm-nm
            OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump
            DEPMOD=depmod
            DTC=dtc
            STRIP=llvm-strip
            HOSTCC=clang
            HOSTCXX=clang++
            CC=ccache\ clang
          )

          cd "$MSM"
          make "${MAKE_FLAGS[@]}" O="$OUT" gki_defconfig
          make "${MAKE_FLAGS[@]}" O="$OUT" olddefconfig </dev/null
          make -j"$(nproc --all)" "${MAKE_FLAGS[@]}" O="$OUT" modules_prepare

      - name: Clone OpenWrt backports
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth=1 https://github.com/openwrt/backports.git backports
          cd backports
          git rev-parse HEAD
      
      - name: Clone matching Linux source for gentree
        shell: bash
        run: |
          set -euo pipefail
          BRANCH_NAME="${{ github.event.inputs.linux_source_branch }}"
          git clone --depth=1 --branch "$BRANCH_NAME" https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git linux-stable-src
      
          echo "===== DIRECTORY CHECK ====="
          for d in \
            drivers/net/wireless/purelifi \
            drivers/net/wireless/mediatek \
            net/mac80211 \
            net/wireless
          do
            if [ -d "linux-stable-src/$d" ]; then
              echo "[OK] $d"
            else
              echo "[MISS] $d"
            fi
          done
      
      - name: Patch backports copy-list for missing source paths
        shell: bash
        env:
          LINUX_SRC: ${{ github.workspace }}/linux-stable-src
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/backports"
      
          cp copy-list copy-list.bak
      
          python3 - <<'PY'
          import os
          from pathlib import Path
          
          kernel_src = Path(os.environ["LINUX_SRC"])
          copy_list = Path("copy-list")
          
          lines = copy_list.read_text().splitlines()
          kept = []
          dropped = []
          
          for line in lines:
              stripped = line.strip()
          
              if not stripped or stripped.startswith("#"):
                  kept.append(line)
                  continue
          
              src = stripped.split(" -> ", 1)[0].strip()
          
              if (kernel_src / src).exists():
                  kept.append(line)
              else:
                  dropped.append(src)
          
          copy_list.write_text("\n".join(kept) + "\n")
          
          print("===== DROPPED COPY-LIST ENTRIES =====")
          for item in dropped:
              print(item)
          print(f"Total dropped: {len(dropped)}")
          PY
      
          echo "===== COPY-LIST DIFF ====="
          diff -u copy-list.bak copy-list || true
      
      - name: Generate backports package
        shell: bash
        run: |
          set -euo pipefail
          OUTDIR="$GITHUB_WORKSPACE/backports-generated"
          cd "$GITHUB_WORKSPACE/backports"
          python3 ./gentree.py "$GITHUB_WORKSPACE/linux-stable-src" "$OUTDIR"
      - name: Inspect generated package
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/backports-generated"

          echo "===== RELEVANT MT7921 / MT76 / MAC80211 FILES ====="
          find . -type f | grep -E 'mt7921|mt76|mac80211|cfg80211' | head -300 || true

          echo "===== RELEVANT CONFIG ENTRIES ====="
          grep -Rns "config .*MT7921\|config .*MT76\|config .*CFG80211\|config .*MAC80211" . || true

      - name: Configure backports for Wi-Fi
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/backports-generated"
          make defconfig-wifi
          make olddefconfig </dev/null

      - name: Try to narrow to mt76/mt7921u if symbols exist
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/backports-generated"

          if [ -x ./scripts/config ]; then
            ./scripts/config --enable CPTCFG_CFG80211 || true
            ./scripts/config --enable CPTCFG_MAC80211 || true
            ./scripts/config --module CPTCFG_MT76_CORE || true
            ./scripts/config --module CPTCFG_MT76_USB || true
            ./scripts/config --module CPTCFG_MT76_CONNAC_LIB || true
            ./scripts/config --module CPTCFG_MT792x_LIB || true
            ./scripts/config --module CPTCFG_MT792x_USB || true
            ./scripts/config --module CPTCFG_MT7921_COMMON || true
            ./scripts/config --module CPTCFG_MT7921U || true
            make olddefconfig </dev/null || true
          fi

          echo "===== FINAL BACKPORTS CONFIG MT7921 CHECK ====="
          grep -E 'MT7921|MT792|MT76|CFG80211|MAC80211' .config || true

      - name: Build backports against OP11R kernel tree
        shell: bash
        run: |
          set -euo pipefail
          KERNEL_BUILD="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel/out"

          cd "$GITHUB_WORKSPACE/backports-generated"

          make -j"$(nproc --all)" \
            KLIB="$KERNEL_BUILD" \
            KLIB_BUILD="$KERNEL_BUILD" \
            V=1 \
            2>&1 | tee "$GITHUB_WORKSPACE/backports-build.log"

      - name: Collect artifacts
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts

          cp -f "$GITHUB_WORKSPACE/backports-build.log" artifacts/ || true
          cp -f "$GITHUB_WORKSPACE/backports-generated/.config" artifacts/backports.config || true
          cp -f "$GITHUB_WORKSPACE/backports-generated/Module.symvers" artifacts/ || true

          find "$GITHUB_WORKSPACE/backports-generated" -type f -name '*.ko' -exec cp --parents {} artifacts/ \; || true
          find "$GITHUB_WORKSPACE/backports-generated" -type f | grep -E 'mt7921|mt76|cfg80211|mac80211' > artifacts/relevant-files.txt || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: op11r-backports-mt7921
          path: artifacts/
