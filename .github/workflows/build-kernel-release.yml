name: Build OP11R Kernel (Safe Mode)

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download boot image
        run: |
          mkdir -p tools/OP11R
          python3 -m pip install --user gdown
          python3 -m gdown 1ym34EoBpoz_BNzBqdFHdCDt8OTWSC5GH -O tools/OP11R/boot.zip
          ls -lh tools/OP11R/

      - name: Build kernel (NO SUSFS / NO MODULES)
        uses: ./.github/kernel
        with:
          op_config_json: '{"model":"OP11R","soc":"sm8475","branch":"oneplus/sm8475","manifest_oos16":"oneplus_11r_b.xml","manifest_oos16_modules":"oneplus_11r_b.xml","android_version":"android16","kernel_version":"5.10","hmbird":false}'
          ksun_branch_or_hash: dev
          susfs_commit_hash_or_branch: ""
          optimize_level: O2
          kernel_uname: EmberHeart
          manifest: OOS16
