        CPTCFG_IWLDVM=m
        CPTCFGEOF

        make KLIB="$KERNEL_BUILD" KLIB_BUILD="$KERNEL_BUILD" olddefconfig
        make -j$(nproc) KLIB="$KERNEL_BUILD" KLIB_BUILD="$KERNEL_BUILD"

        mkdir -p "$GITHUB_WORKSPACE/backports-artifacts"
        find . -name '*.ko' -exec cp --parents {} "$GITHUB_WORKSPACE/backports-artifacts/" \;
        echo "Backports built, .ko count: $(find . -name '*.ko' | wc -l)"
        echo "::endgroup::"

    - name: Create Magisk module for backports
      shell: bash
      run: |
        MODDIR="$GITHUB_WORKSPACE/magisk-backports"
        ZIPOUT="$ARTIFACTS_FOLDER/backports-full-magisk.zip"
        rm -rf "$MODDIR"
        mkdir -p "$MODDIR/system/vendor/lib/modules"
        find "$GITHUB_WORKSPACE/backports-artifacts" -name '*.ko' -exec cp {} "$MODDIR/system/vendor/lib/modules/" \;
        cat > "$MODDIR/module.prop" <<'EOF'
        id=backports_full
        name=Full Wi-Fi Backports v6.19
        version=1.0
        versionCode=1
        author=EmberHeart
        description=Backports Wi-Fi drivers for Nethunter
        EOF
        cat > "$MODDIR/post-fs-data.sh" <<'EOF'
        #!/system/bin/sh
        MODDIR=${0%/*}
        MODPATH="$MODDIR/system/vendor/lib/modules"
        for m in compat cfg80211 mac80211 rtlwifi rtl8xxxu rtw88 rtw89 rt2x00lib rt2800usb rt2500usb rt73usb ath9k ath9k_htc ath10k_core ath10k_usb ath11k iwlwifi; do
          [ -f "$MODPATH/${m}.ko" ] && insmod "$MODPATH/${m}.ko" 2>/dev/null || true
        done
        EOF
        chmod +x "$MODDIR/post-fs-data.sh"
        cd "$MODDIR" && zip -r "$ZIPOUT" .

    - name: Collect Build Stats
      id: collect_stats
      shell: bash
      run: |
        IMG="$COMMON_KERNEL_FOLDER/out/arch/arm64/boot/Image"
        WARN=$(grep -ci warning "$COMMON_KERNEL_FOLDER/build.log" 2>/dev/null || echo 0)
        SHA256=$(sha256sum "$IMG" | awk '{print $1}')
        echo "warnings_count=$WARN" >> "$GITHUB_OUTPUT"
        echo "image_sha256=$SHA256" >> "$GITHUB_OUTPUT"
        echo "build_time=$(( $(date +%s) - ${BUILD_START:-0} ))" >> "$GITHUB_OUTPUT"

    - name: Create Kernel ZIP
      id: create_zip
      shell: bash
      run: |
        cp "$COMMON_KERNEL_FOLDER/out/arch/arm64/boot/Image" "$GITHUB_WORKSPACE/AnyKernel3/Image"
        cd "$GITHUB_WORKSPACE/AnyKernel3"
        ZIP_NAME="AnyKernel3_${OP_MODEL}_${KERNEL_FULL_VER}_Next_${KSUVER}_SuSFS_${SUSVER}_backports.zip"
        zip -r "$ARTIFACTS_FOLDER/$ZIP_NAME" . -x "*.git*"
        SHA256=$(sha256sum "$ARTIFACTS_FOLDER/$ZIP_NAME" | awk '{print $1}')
        echo "zip_sha256=$SHA256" >> "$GITHUB_OUTPUT"

    - name: Save Build Metadata
      id: save_metadata
      shell: bash
      run: |
        cd "$ARTIFACTS_FOLDER"
        echo "kernel_version=$KERNEL_FULL_VER" >> "$GITHUB_OUTPUT"
        echo "ksu_version=${KSUVER:-unknown}" >> "$GITHUB_OUTPUT"
        echo "susfs_version=${SUSVER:-disable}" >> "$GITHUB_OUTPUT"

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: EmberHeart-${{ env.OP_MODEL }}-v${{ env.KERNEL_FULL_VER }}
        path: |
          ${{ env.ARTIFACTS_FOLDER }}/
          ${{ github.workspace }}/backports-artifacts/
