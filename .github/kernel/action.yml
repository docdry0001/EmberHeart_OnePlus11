        CPTCFG_RTL8180=m
        CPTCFG_RTL8187=m
        CPTCFG_RTW88=m
        CPTCFG_RTW88_CORE=m
        CPTCFG_RTW88_PCI=m
        CPTCFG_RTW88_USB=m
        CPTCFG_RTW88_8822B=m
        CPTCFG_RTW88_8822C=m
        CPTCFG_RTW89=m
        CPTCFG_RTW89_CORE=m
        CPTCFG_RTW89_PCI=m
        # Ralink
        CPTCFG_WLAN_VENDOR_RALINK=y
        CPTCFG_RT2X00=m
        CPTCFG_RT2X00_LIB=m
        CPTCFG_RT2X00_USB=m
        CPTCFG_RT2X00_PCI=m
        CPTCFG_RT2800LIB=m
        CPTCFG_RT2800USB=m
        CPTCFG_RT2800USB_RT35XX=y
        CPTCFG_RT2800USB_RT53XX=y
        CPTCFG_RT2800USB_RT55XX=y
        CPTCFG_RT2800USB_UNKNOWN=y
        CPTCFG_RT2500USB=m
        CPTCFG_RT73USB=m
        # Atheros
        CPTCFG_WLAN_VENDOR_ATH=y
        CPTCFG_ATH9K=m
        CPTCFG_ATH9K_HTC=m
        CPTCFG_ATH10K=m
        CPTCFG_ATH10K_USB=m
        CPTCFG_ATH10K_PCI=m
        CPTCFG_ATH10K_SDIO=m
