name: Build OnePlus EmberHeart Kernel

permissions:
  contents: write
  actions: write

inputs:
  op_config_json:
    description: 'JSON string containing full device config'
    required: true
    type: string
  ksu_branch_or_hash:
    description: 'KSU branch or commit hash (empty = auto-detect by ksu_type)'
    required: false
    type: string
    default: ""
  susfs_commit_hash_or_branch:
    description: 'SUSFS branch or commit hash'
    required: false
    type: string
    default: "gki-android12-5.10"
  optimize_level:
    description: 'Compiler optimization level (O2 or O3)'
    required: false
    type: string
    default: O2
  backports_release:
    description: 'OpenWrt backports release name'
    required: false
    type: string
    default: backports-6.19

outputs:
  kernel_version:
    value: ${{ steps.save_metadata.outputs.kernel_version }}
  ksu_version:
    value: ${{ steps.save_metadata.outputs.ksu_version }}
  susfs_version:
    value: ${{ steps.save_metadata.outputs.susfs_version }}
  image_sha256:
    value: ${{ steps.collect_stats.outputs.image_sha256 }}
  zip_sha256:
    value: ${{ steps.create_zip.outputs.zip_sha256 }}
  warnings:
    value: ${{ steps.collect_stats.outputs.warnings_count }}
  build_time:
    value: ${{ steps.collect_stats.outputs.build_time }}

runs:
  using: composite
  steps:
    - name: Parse op_config_json
      shell: bash
      run: |
        set -euo pipefail
        echo '${{ inputs.op_config_json }}' > /tmp/config.json
        jq -r 'to_entries[] | "OP_\(.key | ascii_upcase)=\(.value)"' /tmp/config.json >> "$GITHUB_ENV"
        echo "Parsed config:"
        jq '.' /tmp/config.json

    - name: Validate Inputs
      shell: bash
      run: |
        set -euo pipefail
        model="$OP_MODEL"
        soc="$OP_SOC"
        branch="$OP_BRANCH"
        manifest="$OP_MANIFEST"
        optimize='${{ inputs.optimize_level }}'
        errors=()
        [[ -n "$model" ]] || errors+=("model empty")
        [[ -n "$soc" ]] || errors+=("soc empty")
        [[ -n "$branch" ]] || errors+=("branch empty")
        [[ -n "$manifest" ]] || errors+=("manifest empty")
        [[ "$optimize" =~ ^(O2|O3)$ ]] || errors+=("optimize must be O2 or O3")
        if [ ${#errors[@]} -ne 0 ]; then
          printf '::error::%s\n' "${errors[@]}"
          exit 1
        fi
        echo "✅ Inputs validated"

    - name: Setup Base Environment
      shell: bash
      run: |
        set -euo pipefail
        CONFIG="$OP_MODEL"
        echo "CONFIG=$CONFIG" >> "$GITHUB_ENV"
        REPO="/usr/local/bin/repo"
        [ -x "$REPO" ] || { curl -s https://storage.googleapis.com/git-repo-downloads/repo -o "$REPO"; chmod +x "$REPO"; }
        echo "REPO=$REPO" >> "$GITHUB_ENV"
        git config --global feature.manyFiles true
        git config --global core.fsmonitor true
        git config --global pack.sparse true

    - name: Initialize and Sync Kernel Source
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p "$CONFIG" && cd "$CONFIG"
        if [[ "$OP_MANIFEST" == https://* ]]; then
          mkdir -p .repo/manifests
          curl --fail --location --proto '=https' "$OP_MANIFEST" -o .repo/manifests/temp_manifest.xml
          "$REPO" init -u https://github.com/OnePlusOSS/kernel_manifest.git -b oneplus/sm8650 -m temp_manifest.xml --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags
        else
          "$REPO" init -u https://github.com/OnePlusOSS/kernel_manifest.git -b "$OP_BRANCH" -m "$OP_MANIFEST" --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags
        fi
        success=false
        for i in 1 2 3; do
          if "$REPO" sync -c --no-clone-bundle --no-tags --optimized-fetch -j"$(nproc --all)" --fail-fast; then
            success=true; break
          fi
          sleep 30
        done
        $success || { echo "::error::repo sync failed"; exit 1; }

    - name: Set Dir Paths and Get Kernel Version
      shell: bash
      run: |
        set -euo pipefail
        CONFIG_DIR="$GITHUB_WORKSPACE/$CONFIG"
        ARTIFACTS_DIR="$CONFIG_DIR/artifacts"
        KERNEL_PLATFORM_DIR="$CONFIG_DIR/kernel_platform"
        COMMON_KERNEL_DIR="$KERNEL_PLATFORM_DIR/common"
        mkdir -p "$ARTIFACTS_DIR"
        
        echo "CONFIG_FOLDER=$CONFIG_DIR" >> "$GITHUB_ENV"
        echo "ARTIFACTS_FOLDER=$ARTIFACTS_DIR" >> "$GITHUB_ENV"
        echo "KERNEL_PLATFORM_FOLDER=$KERNEL_PLATFORM_DIR" >> "$GITHUB_ENV"
        echo "COMMON_KERNEL_FOLDER=$COMMON_KERNEL_DIR" >> "$GITHUB_ENV"
        
        cd "$COMMON_KERNEL_DIR"
        BRANCH_LINE=$(grep '^[[:space:]]*BRANCH=' build.config.common build.config.constants 2>/dev/null | head -n1 || true)
        BRANCH_VALUE="${BRANCH_LINE#*=}"
        ANDROID_VER="${BRANCH_VALUE%-*}"
        VERSION=$(grep '^VERSION *=' Makefile | awk '{print $3}')
        PATCHLEVEL=$(grep '^PATCHLEVEL *=' Makefile | awk '{print $3}')
        SUBLEVEL=$(grep '^SUBLEVEL *=' Makefile | awk '{print $3}')
        FULL_VERSION="$VERSION.$PATCHLEVEL.$SUBLEVEL"
        cd "$ARTIFACTS_DIR"
        echo "$ANDROID_VER-$FULL_VERSION" > "${OP_MODEL}.txt"
        echo "ANDROID_VER=$ANDROID_VER" >> "$GITHUB_ENV"
        echo "KERNEL_VER=$VERSION.$PATCHLEVEL" >> "$GITHUB_ENV"
        echo "KERNEL_FULL_VER=$ANDROID_VER-$FULL_VERSION" >> "$GITHUB_ENV"
        if [ "$OP_SUSFS" = "true" ]; then
          echo "SUSFS_KERNEL_BRANCH=gki-$ANDROID_VER-$VERSION.$PATCHLEVEL" >> "$GITHUB_ENV"
        fi
        echo "✅ Kernel: $ANDROID_VER-$FULL_VERSION"

    - name: Set Build Identity
      shell: bash
      run: |
        echo "BUILD_USER=EmberHeart" >> "$GITHUB_ENV"
        echo "BUILD_HOST=OnePlus" >> "$GITHUB_ENV"

    - name: Detect Clang
      shell: bash
      run: |
        echo "::group::Detect Clang"
        CLANG_FOUND=false
        for base in "$KERNEL_PLATFORM_FOLDER/prebuilts" "$KERNEL_PLATFORM_FOLDER/prebuilts-master"; do
          [ -d "$base/clang/host/linux-x86" ] || continue
          latest=$(ls -d "$base/clang/host/linux-x86/clang-r"* 2>/dev/null | sort -V | tail -n1 || true)
          if [ -n "$latest" ] && [ -x "$latest/bin/clang" ]; then
            CLANG_BIN="$latest/bin"; CLANG_FOUND=true; break
          fi
        done
        $CLANG_FOUND || { command -v clang >/dev/null && CLANG_BIN="$(dirname "$(command -v clang)")" && CLANG_FOUND=true; }
        $CLANG_FOUND || { echo "::error::No clang"; exit 1; }
        echo "CLANG_BIN_PATH=$CLANG_BIN" >> "$GITHUB_ENV"
        CLANG_VERSION="$("$CLANG_BIN/clang" --version | head -n1)"
        echo "CLANG_VERSION=$CLANG_VERSION" >> "$GITHUB_ENV"
        echo "✅ $CLANG_VERSION"
        echo "::endgroup::"

    - name: Cache ccache
      uses: actions/cache@v5
      with:
        path: ~/.ccache
        key: ccache-ember-${{ env.OP_MODEL }}-${{ env.KERNEL_FULL_VER }}-${{ hashFiles('**/*.c', '**/*.h') }}
        restore-keys: ccache-ember-${{ env.OP_MODEL }}-

    - name: Clone AnyKernel3 and SUSFS
      shell: bash
      run: |
        echo "::group::Clone dependencies"
        git clone --depth=1 https://github.com/TheWildJames/AnyKernel3.git -b gki-2.0 "$GITHUB_WORKSPACE/AnyKernel3"
        git clone --depth=1 https://github.com/TheWildJames/kernel_patches.git "$GITHUB_WORKSPACE/kernel_patches"
        if [ "$OP_SUSFS" = "true" ]; then
          git clone https://gitlab.com/simonpunk/susfs4ksu.git "$GITHUB_WORKSPACE/susfs4ksu"
          cd "$GITHUB_WORKSPACE/susfs4ksu"
          SUSFS_REF="${{ inputs.susfs_commit_hash_or_branch }}"
          git checkout "$SUSFS_REF" || { echo "::error::SUSFS ref $SUSFS_REF not found"; exit 1; }
          SUSFS_COMMIT_SHA=$(git rev-parse HEAD)
          echo "SUSFS_COMMIT_SHA=$SUSFS_COMMIT_SHA" >> $GITHUB_ENV
          echo "SUSFS_BRANCH_NAME=$(git rev-parse --abbrev-ref HEAD)" >> $GITHUB_ENV
          cd "$GITHUB_WORKSPACE"
        fi
        echo "::endgroup::"

    - name: Clean Up ABI Protected Exports
      shell: bash
      run: |
        cd "$KERNEL_PLATFORM_FOLDER"
        rm -f common/android/abi_gki_protected_exports_* msm-kernel/android/abi_gki_protected_exports_* || true
        sed -i 's/protected_modules = \[.*\]/protected_modules = []/' common/modules.bzl || true

    - name: Add KernelSU Next
      shell: bash
      run: |
        echo "::group::Add KernelSU Next"
        cd "$KERNEL_PLATFORM_FOLDER"
        KSU_INPUT="${{ inputs.ksu_branch_or_hash }}"
        if [ -z "$KSU_INPUT" ]; then
          curl --fail --location --proto '=https' -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -
        else
          curl --fail --location --proto '=https' -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s "$KSU_INPUT"
        fi
        git submodule update --init --recursive
        cd KernelSU-Next/kernel
        COMMITS_COUNT=$(git rev-list --count HEAD)
        BASE_VERSION=$((COMMITS_COUNT < 2684 ? 10200 : 30000))
        KSU_VERSION=$((COMMITS_COUNT + BASE_VERSION))
        sed -i "s/DKSU_VERSION=11998/DKSU_VERSION=${KSU_VERSION}/" Makefile
        if [ -f ksu.c ]; then
          sed -i 's/#if defined(CONFIG_STACKPROTECTOR) && (defined(CONFIG_ARM64) && !defined(CONFIG_STACKPROTECTOR_PER_TASK))/#if 0/' ksu.c
        fi
        echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
        KSU_COMMIT_SHA=$(git rev-parse HEAD)
        echo "KSU_COMMIT_SHA=$KSU_COMMIT_SHA" >> $GITHUB_ENV
        cd ..
        echo "CONFIG_KSU=y" >> "$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig"
        echo "CONFIG_KSU_KPROBES_HOOK=n" >> "$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig"
        echo "$KSU_VERSION" >> "$ARTIFACTS_FOLDER/${OP_MODEL}.txt"
        echo "✅ KernelSU Next v$KSU_VERSION"
        echo "::endgroup::"

    - name: Apply SUSFS Patches
      if: ${{ env.OP_SUSFS == 'true' }}
      shell: bash
      run: |
        echo "::group::Apply SUSFS patches"
        cd "$KERNEL_PLATFORM_FOLDER"
        cp "$GITHUB_WORKSPACE/susfs4ksu/kernel_patches/fs/"* "$COMMON_KERNEL_FOLDER/fs/"
        cp "$GITHUB_WORKSPACE/susfs4ksu/kernel_patches/include/linux/"* "$COMMON_KERNEL_FOLDER/include/linux/"
        susfs_version=$(grep '#define SUSFS_VERSION' "$COMMON_KERNEL_FOLDER/include/linux/susfs.h" | awk -F'"' '{print $2}')
        echo "SUSVER=$susfs_version" >> $GITHUB_ENV
        echo "$susfs_version" >> "$ARTIFACTS_FOLDER/${OP_MODEL}.txt"
        echo "SUSFS Version: $susfs_version"
        
        version_lte() { [ "$(printf '%s\n' "$2" "$1" | sort -V | head -n1)" = "$1" ]; }
        if version_lte "${susfs_version:1}" "1.5.12"; then NEED_HOOKS=true; else NEED_HOOKS=false; fi
        echo "NEED_HOOKS=$NEED_HOOKS" >> $GITHUB_ENV

        cd KernelSU-Next
        if [ "$susfs_version" = "v2.1.0" ]; then
          patch -p1 --forward < "$GITHUB_WORKSPACE/susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch" || true
          for file in $(find ./kernel -maxdepth 2 -name "*.rej" -exec basename {} .rej \;); do
            patch -p1 --forward < "$GITHUB_WORKSPACE/kernel_patches/next/susfs_fix_patches/$susfs_version/fix_$file.patch"
          done
          patch -p1 --forward < "$GITHUB_WORKSPACE/kernel_patches/next/susfs_fix_patches/$susfs_version/overwrite_hook_mode.patch"
          patch -p1 --forward < "$GITHUB_WORKSPACE/kernel_patches/next/susfs_fix_patches/$susfs_version/ksu_toolkit.patch"
          if [ "$KSUVER" -le 33095 ]; then
            patch -p1 --forward < "$GITHUB_WORKSPACE/kernel_patches/next/susfs_fix_patches/$susfs_version/multi_manager.patch"
          fi
          if [ "$KSUVER" -ge 33068 ] && [ "$KSUVER" -lt 33070 ]; then
            patch -p1 --forward < "$GITHUB_WORKSPACE/kernel_patches/next/susfs_fix_patches/$susfs_version/multi_sepolicy_fix.patch"
          fi
          # Fix implicit declarations removal
          sed -i 's/ksu_sucompat_init();/\/\* SUSFS removed \*\//g' kernel/init.c
          sed -i 's/ksu_setuid_hook_init();/\/\* SUSFS removed \*\//g' kernel/init.c
        else
          echo "::error::Only SUSFS v2.1.0 is handled here"
          exit 1
        fi
        
        cd "$COMMON_KERNEL_FOLDER"
        patch -p1 --forward < "$GITHUB_WORKSPACE/susfs4ksu/kernel_patches/50_add_susfs_in_${{ env.SUSFS_KERNEL_BRANCH }}.patch"
        
        cat >> "$COMMON_KERNEL_FOLDER/arch/arm64/configs/gki_defconfig" <<EOF
        CONFIG_KSU_SUSFS=y
        CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
        CONFIG_KSU_SUSFS_SUS_PATH=y
        CONFIG_KSU_SUSFS_SUS_MOUNT=y
        CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
        CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
        CONFIG_KSU_SUSFS_SUS_KSTAT=y
        CONFIG_KSU_SUSFS_SUS_OVERLAYFS=n
        CONFIG_KSU_SUSFS_TRY_UMOUNT=y
        CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y
        CONFIG_KSU_SUSFS_SPOOF_UNAME=y
        CONFIG_KSU_SUSFS_ENABLE_LOG=y
        CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
        CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
        CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
        CONFIG_KSU_SUSFS_SUS_MAP=y
        CONFIG_KSU_SUSFS_SUS_SU=n
        EOF
        echo "✅ SUSFS patches applied"
        echo "::endgroup::"

    - name: Apply Nethunter / Optimisation Patches
      shell: bash
      run: |
        echo "::group::Apply Nethunter & Optimisation Patches"
        cd "$COMMON_KERNEL_FOLDER"
        # Import Ralink rt2x00 driver
        RT2X00_TMP="$GITHUB_WORKSPACE/rt2x00-import"
        git clone --depth=1 https://github.com/torvalds/linux.git "$RT2X00_TMP"
        mkdir -p drivers/net/wireless/ralink
        rm -rf drivers/net/wireless/ralink/rt2x00
        cp -a "$RT2X00_TMP/drivers/net/wireless/ralink/rt2x00" drivers/net/wireless/ralink/
        grep -q 'source "drivers/net/wireless/ralink/rt2x00/Kconfig"' drivers/net/wireless/ralink/Kconfig || \
          printf '\nsource "drivers/net/wireless/ralink/rt2x00/Kconfig"\n' >> drivers/net/wireless/ralink/Kconfig
        grep -q 'obj-$(CONFIG_RT2X00) += rt2x00/' drivers/net/wireless/ralink/Makefile || \
          printf '\nobj-$(CONFIG_RT2X00) += rt2x00/\n' >> drivers/net/wireless/ralink/Makefile

        # Add MT76 override (ensure backports will have complete code)
        MT76_TMP="$GITHUB_WORKSPACE/mt76-import"
        git clone --depth=1 https://github.com/torvalds/linux.git "$MT76_TMP"
        mkdir -p drivers/net/wireless/mediatek
        rm -rf drivers/net/wireless/mediatek/mt76
        cp -a "$MT76_TMP/drivers/net/wireless/mediatek/mt76" drivers/net/wireless/mediatek/
        grep -q 'source "drivers/net/wireless/mediatek/mt76/Kconfig"' drivers/net/wireless/mediatek/Kconfig || \
          printf '\nsource "drivers/net/wireless/mediatek/mt76/Kconfig"\n' >> drivers/net/wireless/mediatek/Kconfig

        # Add other kernel features (TTL, IP_SET, etc.)
        cat >> arch/arm64/configs/gki_defconfig <<EOF
        CONFIG_BT_HCIBTUSB=m
        CONFIG_BT_HCIBTUSB_BCM=y
        CONFIG_BT_HCIBTUSB_RTL=y
        CONFIG_USB_SERIAL=m
        CONFIG_USB_SERIAL_CH341=m
        CONFIG_USB_SERIAL_FTDI_SIO=m
        CONFIG_USB_SERIAL_PL2303=m
        CONFIG_IP_NF_TARGET_TTL=m
        CONFIG_IP6_NF_TARGET_HL=m
        CONFIG_IP6_NF_MATCH_HL=m
        CONFIG_IP_SET=m
        CONFIG_IP_SET_HASH_IP=m
        CONFIG_IP_SET_HASH_NET=m
        CONFIG_NETFILTER_XT_SET=m
        CONFIG_WLAN_VENDOR_RALINK=y
        CONFIG_RT2X00=m
        CONFIG_RT2800USB=m
        CONFIG_RT2800USB_RT35XX=y
        CONFIG_RT2800USB_RT53XX=y
        CONFIG_RT2800USB_UNKNOWN=y
        EOF
        
        # Apply general kernel patches from WildJames
        patch -p1 --forward < "$GITHUB_WORKSPACE/kernel_patches/common/mem_opt_prefetch.patch"
        patch -p1 --forward < "$GITHUB_WORKSPACE/kernel_patches/common/minimise_wakeup_time.patch"
        patch -p1 --forward < "$GITHUB_WORKSPACE/kernel_patches/common/force_tcp_nodelay.patch"
        patch -p1 --forward < "$GITHUB_WORKSPACE/kernel_patches/common/f2fs_reduce_congestion.patch"
        echo "✅ Nethunter patches applied"
        echo "::endgroup::"

    - name: Add Build Configs & Force MAC80211Module
      shell: bash
      run: |
        cd "$COMMON_KERNEL_FOLDER"
        cat >> arch/arm64/configs/gki_defconfig <<EOF
        CONFIG_LTO_CLANG_THIN=y
        CONFIG_LTO_CLANG=y
        CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y
        CONFIG_OPTIMIZE_INLINING=y
        CONFIG_TRACEPOINTS=y
        CONFIG_TMPFS_XATTR=y
        CONFIG_TMPFS_POSIX_ACL=y
        EOF
        # Change mac80211 to module to allow backports
        ./scripts/config --file arch/arm64/configs/gki_defconfig --module CONFIG_MAC80211
        # If cfg80211 also needed as module (optional, backports usually =m anyway)
        ./scripts/config --file arch/arm64/configs/gki_defconfig --module CONFIG_CFG80211
        echo "CONFIG_MAC80211=m" >> arch/arm64/configs/gki_defconfig

    - name: Customize Kernel Branding
      shell: bash
      run: |
        cd "$COMMON_KERNEL_FOLDER"
        mkdir -p out
        CUSTOM_LOCALVERSION="-${ANDROID_VER}-EmberHeart"
        echo "CUSTOM_LOCALVERSION=$CUSTOM_LOCALVERSION" >> "$GITHUB_ENV"

    - name: Build Kernel
      shell: bash
      env:
        PYTHONWARNINGS: "ignore:invalid escape sequence"
      run: |
        echo "::group::Build Kernel"
        cd "$COMMON_KERNEL_FOLDER"
        : > .scmversion
        export LLVM=1 LLVM_IAS=1 ARCH=arm64 SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export LD=ld.lld HOSTLD=ld.lld AR=llvm-ar NM=llvm-nm
        export OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip
        export PATH="${CLANG_BIN_PATH}:$PATH"
        export CC="ccache clang"
        export CXX="ccache clang++"
        
        OUT=out
        make O="$OUT" gki_defconfig
        ./scripts/config --file "$OUT/.config" --set-str LOCALVERSION "${CUSTOM_LOCALVERSION}"
        ./scripts/config --file "$OUT/.config" -d LOCALVERSION_AUTO
        sed -i 's/scm_version="$(scm_version --short)"/scm_version=""/' scripts/setlocalversion
        if [ "${{ inputs.optimize_level }}" = "O3" ]; then
          ./scripts/config --file "$OUT/.config" -d CC_OPTIMIZE_FOR_PERFORMANCE -e CC_OPTIMIZE_FOR_PERFORMANCE_O3
          KCFLAGS="-O3"
        else
          ./scripts/config --file "$OUT/.config" -e CC_OPTIMIZE_FOR_PERFORMANCE -d CC_OPTIMIZE_FOR_PERFORMANCE_O3
          KCFLAGS="-O2"
        fi
        make O="$OUT" olddefconfig
        
        export KCFLAGS="$KCFLAGS -Wno-error -pipe -fno-stack-protector"
        export KCPPFLAGS="-DCONFIG_OPTIMIZE_INLINING"
        
        echo "Building Image + modules..."
        make -j$(nproc) O="$OUT" KCFLAGS="$KCFLAGS" KCPPFLAGS="$KCPPFLAGS" Image modules
        
        IMG="$OUT/arch/arm64/boot/Image"
        [ -f "$IMG" ] || { echo "::error::Image missing"; exit 1; }
        sha256sum "$IMG" | tee "$OUT/Image.sha256"
        echo "::endgroup::"

    - name: Build Backports v6.19 (Full Wi-Fi)
      shell: bash
      run: |
        echo "::group::Build Backports"
        RELEASE="${{ inputs.backports_release }}"
        URL="https://github.com/openwrt/backports/releases/download/backports-v6.19/${RELEASE}.tar.zst"
        KERNEL_BUILD="$COMMON_KERNEL_FOLDER/out"
        cd "$GITHUB_WORKSPACE"
        wget -q -O backports.tar.zst "$URL"
        tar --zstd -xf backports.tar.zst
        rm -rf backports-stable
        mv "$RELEASE" backports-stable
        cd backports-stable

        # Patch CFI macro
        sed -i 's/__CFI_ADDRESSABLE(init_module, __initdata)/__CFI_ADDRESSABLE(init_module)/g' backport-include/linux/module.h
        sed -i 's/__CFI_ADDRESSABLE(cleanup_module, __exitdata)/__CFI_ADDRESSABLE(cleanup_module)/g' backport-include/linux/module.h

        # Create missing args.h for rtw89
        if [ ! -f backport-include/linux/args.h ]; then
          cat > backport-include/linux/args.h <<'ARGSHEADER'
        #ifndef _BACKPORT_LINUX_ARGS_H
        #define _BACKPORT_LINUX_ARGS_H
        #define __args(args...) args
        #define __struct_group(TAG, NAME, ATTRS, INIT...) struct TAG { ATTRS } NAME; INIT
        #define struct_group_attr(ATTRS, NAME) __struct_group(/* no tag */, NAME, ATTRS, /* no init */)
        #define STRUCT_GROUP_ATTR(ATTRS, NAME) struct_group_attr(ATTRS, NAME)
        #endif
        ARGSHEADER
        fi

        make \
          LLVM=1 LLVM_IAS=1 ARCH=arm64 SUBARCH=arm64 \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-gnu- \
          LD=ld.lld AR=llvm-ar NM=llvm-nm \
          OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump \
          DEPMOD=depmod STRIP=llvm-strip \
          CC=clang \
          KLIB="$KERNEL_BUILD" KLIB_BUILD="$KERNEL_BUILD" allnoconfig

        cat >> .config <<'CPTCFGEOF'
        CPTCFG_CFG80211=m
        CPTCFG_CFG80211_WEXT=y
        CPTCFG_MAC80211=m
        CPTCFG_WLAN=y
        CPTCFG_NL80211_TESTMODE=y
        CPTCFG_USB=y
        CPTCFG_PCI=y
        # MediaTek
        CPTCFG_WLAN_VENDOR_MEDIATEK=y
        CPTCFG_MT76_CORE=m
        CPTCFG_MT76_USB=m
        CPTCFG_MT76_PCI=m
        CPTCFG_MT76_CONNAC_LIB=m
        CPTCFG_MT76x0_COMMON=m
        CPTCFG_MT76x0U=m
        CPTCFG_MT76x2_COMMON=m
        CPTCFG_MT76x2U=m
        CPTCFG_MT7601U=m
        CPTCFG_MT7915E=m
        CPTCFG_MT7921_COMMON=m
        CPTCFG_MT7921U=m
        CPTCFG_MT7921S=m
        CPTCFG_MT7921E=m
        CPTCFG_MT7925_COMMON=m
        CPTCFG_MT7925U=m
        CPTCFG_MT7925E=m
        CPTCFG_MT7996E=m
        # Realtek
        CPTCFG_WLAN_VENDOR_REALTEK=y
        CPTCFG_RTLWIFI=m
        CPTCFG_RTLWIFI_USB=m
        CPTCFG_RTLWIFI_PCI=m
        CPTCFG_RTL8192CU=m
        CPTCFG_RTL8192CC_COMMON=m
        CPTCFG_RTL8192CE=m
        CPTCFG_RTL8192SE=m
