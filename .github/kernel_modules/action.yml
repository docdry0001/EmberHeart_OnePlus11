name: Build OnePlus external Wi-Fi modules only

permissions:
  contents: write
  actions: write

inputs:
  op_config_json:
    description: 'JSON string containing full device config'
    required: true
    type: string
  optimize_level:
    required: false
    type: string
    default: O2
  manifest:
    required: true
    type: string
    default: OOS16

runs:
  using: composite
  steps:
    - name: Parse op_config_json
      shell: bash
      run: |
        set -euo pipefail
        echo '${{ inputs.op_config_json }}' > /tmp/config.json
        jq -r 'to_entries[] | "\(.key | ascii_upcase)=\(.value)"' /tmp/config.json >> "$GITHUB_ENV"
        jq '.' /tmp/config.json

    - name: Set Manifest
      shell: bash
      run: |
        set -euo pipefail
        echo "MANIFEST=$MANIFEST_${{ inputs.manifest }}_MODULES" >> "$GITHUB_ENV"

    - name: Install Minimal Dependencies
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get -o Acquire::Retries=3 update -qq
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
          git curl ca-certificates build-essential clang lld flex bison \
          libelf-dev libssl-dev libncurses-dev zlib1g-dev liblz4-tool \
          libxml2-utils rsync unzip dwarves file python3 ccache jq
        sudo apt-get clean

    - name: Setup Base Environment
      shell: bash
      run: |
        set -euo pipefail
        CONFIG="$MODEL"
        echo "CONFIG=$CONFIG" >> "$GITHUB_ENV"

        REPO="/usr/local/bin/repo"
        if [ ! -x "$REPO" ]; then
          curl -s https://storage.googleapis.com/git-repo-downloads/repo -o "$REPO"
          chmod +x "$REPO"
        fi
        echo "REPO=$REPO" >> "$GITHUB_ENV"

    - name: Initialize and Sync Kernel Source
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p "$CONFIG"
        cd "$CONFIG"

        if [[ "$MANIFEST" == https://* ]]; then
          mkdir -p .repo/manifests
          curl --fail --show-error --location --proto '=https' "$MANIFEST" -o .repo/manifests/temp_manifest.xml
          "$REPO" init -u https://github.com/OnePlusOSS/kernel_manifest.git -b oneplus/sm8650 -m temp_manifest.xml --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags
        else
          "$REPO" init -u https://github.com/OnePlusOSS/kernel_manifest.git -b "$BRANCH" -m "$MANIFEST" --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags
        fi

        success=false
        for i in 1 2 3; do
          if "$REPO" sync -c --no-clone-bundle --no-tags --optimized-fetch -j"$(nproc --all)" --fail-fast; then
            success=true
            break
          fi
          echo "repo sync attempt $i failed; retrying..."
          sleep 20
        done
        $success || { echo "repo sync failed after 3 attempts"; exit 1; }

    - name: Get Kernel Version Info
      shell: bash
      run: |
        set -euo pipefail
        CONFIG_DIR="$GITHUB_WORKSPACE/$CONFIG"
        ARTIFACTS_DIR="$CONFIG_DIR/artifacts"
        mkdir -p "$ARTIFACTS_DIR"

        cd "$CONFIG_DIR/kernel_platform/msm-kernel"
        VERSION=$(grep '^VERSION *=' Makefile | awk '{print $3}')
        PATCHLEVEL=$(grep '^PATCHLEVEL *=' Makefile | awk '{print $3}')
        SUBLEVEL=$(grep '^SUBLEVEL *=' Makefile | awk '{print $3}')
        FULL_VERSION="$VERSION.$PATCHLEVEL.$SUBLEVEL"

        CONFIG_FILES=("build.config.common" "build.config.constants")
        BRANCH_LINE=""
        for f in "${CONFIG_FILES[@]}"; do
          if [ -f "$f" ]; then
            l=$(grep '^[[:space:]]*BRANCH=' "$f" || true)
            if [ -n "$l" ]; then BRANCH_LINE="$l"; break; fi
          fi
        done

        if [ -n "$BRANCH_LINE" ]; then
          BRANCH_VALUE="${BRANCH_LINE#*=}"
          ANDROID_VERSION="${BRANCH_VALUE%-*}"
        else
          ANDROID_VERSION="android12"
        fi

        echo "ANDROID_VER=$ANDROID_VERSION" >> "$GITHUB_ENV"
        echo "KERNEL_VER=$VERSION.$PATCHLEVEL" >> "$GITHUB_ENV"
        echo "KERNEL_FULL_VER=$ANDROID_VERSION-$FULL_VERSION" >> "$GITHUB_ENV"

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2.19
      with:
        key: ${{ env.CONFIG }}-wifi-only-${{ env.KERNEL_FULL_VER }}
        max-size: 5G
        append-timestamp: false
        create-symlink: true
        job-summary: 'CCache stats'
        evict-old-files: 'job'

    - name: Clean Up ABI Protected Exports
      shell: bash
      run: |
        set -euo pipefail
        cd "$CONFIG/kernel_platform"
        rm -f msm-kernel/android/abi_gki_protected_exports_* || true

    - name: Merge base defconfig
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PLATFORM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        MSM="$KERNEL_PLATFORM/msm-kernel"
        OUT=out

        cd "$MSM"
        make ARCH=arm64 mrproper
        mkdir -p "$OUT"

        ./scripts/kconfig/merge_config.sh -O "$OUT" -m \
          arch/arm64/configs/gki_defconfig \
          arch/arm64/configs/vendor/${SOC}_GKI.config

        cp "$OUT/.config" arch/arm64/configs/gki_defconfig
        rm -f "$OUT/.config"

    - name: Enable external Wi-Fi oriented configs
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PATH="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        MSM="$KERNEL_PATH/msm-kernel"
        cd "$MSM"

        # Realtek
        ./scripts/config --file arch/arm64/configs/gki_defconfig \
          --enable CONFIG_WLAN_VENDOR_REALTEK \
          --module CONFIG_RTW88 \
          --module CONFIG_RTW88_CORE \
          --module CONFIG_RTW88_PCI \
          --module CONFIG_RTW88_USB \
          --module CONFIG_RTW88_SDIO \
          --module CONFIG_RTW_8703B \
          --module CONFIG_RTW_8723D \
          --module CONFIG_RTW_8723DU \
          --module CONFIG_RTW_8723DE \
          --module CONFIG_RTW_8723DS \
          --module CONFIG_RTW_8812A \
          --module CONFIG_RTW_8812AU \
          --module CONFIG_RTW_8812AE \
          --module CONFIG_RTW_8814A \
          --module CONFIG_RTW_8814AU \
          --module CONFIG_RTW_8814AE \
          --module CONFIG_RTW_8821A \
          --module CONFIG_RTW_8821AU \
          --module CONFIG_RTW_8821AE \
          --module CONFIG_RTW_8821C \
          --module CONFIG_RTW_8821CU \
          --module CONFIG_RTW_8821CE \
          --module CONFIG_RTW_8821CS \
          --module CONFIG_RTW_8822B \
          --module CONFIG_RTW_8822BU \
          --module CONFIG_RTW_8822BE \
          --module CONFIG_RTW_8822BS \
          --module CONFIG_RTW_8822C \
          --module CONFIG_RTW_8822CU \
          --module CONFIG_RTW_8822CE \
          --module CONFIG_RTW_8822CS

        # Atheros / ath
        ./scripts/config --file arch/arm64/configs/gki_defconfig \
          --enable CONFIG_WLAN_VENDOR_ATH \
          --module CONFIG_ATH_COMMON \
          --module CONFIG_ATH9K \
          --module CONFIG_ATH9K_HW \
          --module CONFIG_ATH9K_COMMON \
          --module CONFIG_ATH9K_HTC \
          --module CONFIG_ATH10K \
          --module CONFIG_ATH10K_USB

        # MediaTek / mt76
        ./scripts/config --file arch/arm64/configs/gki_defconfig \
          --enable CONFIG_WLAN_VENDOR_MEDIATEK \
          --module CONFIG_MT76_CORE \
          --module CONFIG_MT76_USB \
          --module CONFIG_MT76x02_LIB \
          --module CONFIG_MT76x02_USB \
          --module CONFIG_MT76x0_COMMON \
          --module CONFIG_MT76x2_COMMON \
          --module CONFIG_MT76_CONNAC_LIB \
          --module CONFIG_MT7601U \
          --module CONFIG_MT7603E \
          --module CONFIG_MT7615_COMMON \
          --module CONFIG_MT7915E \
          --module CONFIG_MT7921E

        # Ralink / rt2x00
        ./scripts/config --file arch/arm64/configs/gki_defconfig \
          --enable CONFIG_WLAN_VENDOR_RALINK \
          --module CONFIG_RT2X00 \
          --module CONFIG_RT2X00_LIB \
          --module CONFIG_RT2X00_LIB_FIRMWARE \
          --module CONFIG_RT2X00_USB \
          --module CONFIG_RT2800LIB \
          --module CONFIG_RT2800USB \
          --module CONFIG_RT2800USB_RT33XX \
          --module CONFIG_RT2800USB_RT35XX \
          --module CONFIG_RT2800USB_RT3573 \
          --module CONFIG_RT2800USB_RT53XX \
          --module CONFIG_RT2800USB_RT55XX \
          --module CONFIG_RT2800USB_UNKNOWN

        # Shared bits
        ./scripts/config --file arch/arm64/configs/gki_defconfig \
          --module CONFIG_MAC80211 \
          --module CONFIG_MAC80211_LEDS \
          --module CONFIG_CFG80211 \
          --module CONFIG_NL80211_TESTMODE

    - name: Add external rtw88 tree
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PATH="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        MSM="$KERNEL_PATH/msm-kernel"
        cd "$MSM/drivers/net/wireless/realtek"
        rm -rf rtw88
        git clone --depth=1 https://github.com/lwfinger/rtw88.git
        sed -i 's/$(CONFIG_RTW88)/m/g' Makefile || true
        sed -i '/^source "drivers\/net\/wireless\/realtek\/rtw88\/Kconfig"$/d' Kconfig || true
        printf '\nsource "drivers/net/wireless/realtek/rtw88/Kconfig"\n' >> Kconfig

    - name: Detect Clang
      shell: bash
      run: |
        set -euo pipefail
        KP="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        CLANG_FOUND=false
        for base in "$KP/prebuilts" "$KP/prebuilts-master"; do
          [ -d "$base/clang/host/linux-x86" ] || continue
          latest=$(ls -d "$base"/clang/host/linux-x86/clang-r*/ 2>/dev/null | sort -V | tail -n1 || true)
          if [ -n "$latest" ] && [ -x "$latest/bin/clang" ]; then
            CLANG_BIN="$latest/bin"
            CLANG_FOUND=true
          fi
        done

        if ! $CLANG_FOUND && command -v clang >/dev/null 2>&1; then
          CLANG_BIN="$(dirname "$(command -v clang)")"
          CLANG_FOUND=true
        fi

        $CLANG_FOUND || { echo "No clang toolchain found"; exit 1; }
        echo "CLANG_BIN_PATH=$CLANG_BIN" >> "$GITHUB_ENV"

    - name: Build Wi-Fi modules only
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PLATFORM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        MSM="$KERNEL_PLATFORM/msm-kernel"
        cd "$MSM"

        export PATH="${CLANG_BIN_PATH}:$PATH"
        export PATH="/usr/lib/ccache:$PATH"

        MAKE_FLAGS=(
          LLVM=1
          LLVM_IAS=1
          ARCH=arm64
          SUBARCH=arm64
          CLANG_TRIPLE=aarch64-linux-gnu-
          CROSS_COMPILE=aarch64-linux-gnu-
          CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          LD=ld.lld
          HOSTLD=ld.lld
          AR=llvm-ar
          NM=llvm-nm
          OBJCOPY=llvm-objcopy
          OBJDUMP=llvm-objdump
          DEPMOD=depmod
          DTC=dtc
          STRIP=llvm-strip
          HOSTCC=clang
          HOSTCXX=clang++
          CC="ccache clang"
        )

        OUT=out
        INSTALL_MOD_PATH="$MSM/out"
        mkdir -p "$OUT"

        make "${MAKE_FLAGS[@]}" O="$OUT" gki_defconfig

        ./scripts/config --file "$OUT/.config" \
          --enable CONFIG_LTO_CLANG_THIN \
          --enable CONFIG_LTO_CLANG \
          --enable CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE \
          --disable CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE_O3

        make "${MAKE_FLAGS[@]}" O="$OUT" olddefconfig

        # Build all in-tree modules once, then filter to Wi-Fi related modules only
        make -j"$(nproc --all)" "${MAKE_FLAGS[@]}" O="$OUT" modules
        make -j"$(nproc --all)" "${MAKE_FLAGS[@]}" O="$OUT" INSTALL_MOD_PATH="$INSTALL_MOD_PATH" modules_install

    - name: Collect Wi-Fi modules only
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PLATFORM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        MSM="$KERNEL_PLATFORM/msm-kernel"
        OUT="$MSM/out"
        UNAME=$(ls "$OUT/lib/modules/")
        DEST="$OUT/wifi-modules"

        mkdir -p "$DEST"

        find "$OUT/lib/modules/$UNAME" -type f -name '*.ko' | while read -r f; do
          base="$(basename "$f")"
          case "$base" in
            ath*.ko|rtw*.ko|mt*.ko|rt2*.ko|rt2800*.ko|cfg80211.ko|mac80211.ko)
              cp "$f" "$DEST/"
              ;;
          esac
        done

        echo "Collected Wi-Fi modules:"
        ls -1 "$DEST" || true

    - name: Create Wi-Fi modules zip
      id: create_zip
      shell: bash
      run: |
        set -euo pipefail
        CONFIG_DIR="$GITHUB_WORKSPACE/$CONFIG"
        KERNEL_PLATFORM="$CONFIG_DIR/kernel_platform"
        MSM="$KERNEL_PLATFORM/msm-kernel"
        OUT="$MSM/out"
        MODULES_SRC="$OUT/wifi-modules"
        MODULES_ZIP="$CONFIG_DIR/artifacts/wifi_modules_${{ env.MODEL }}.zip"

        mkdir -p "$CONFIG_DIR/artifacts"

        cd "$MODULES_SRC"
        zip -r "$MODULES_ZIP" ./* >/dev/null || true
        echo "Packaged Wi-Fi modules to $MODULES_ZIP"

    - name: Upload Wi-Fi modules zip
      if: success() && steps.create_zip.conclusion == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: wifi-modules-${{ env.CONFIG }}
        path: ${{ env.CONFIG }}/artifacts/
        
