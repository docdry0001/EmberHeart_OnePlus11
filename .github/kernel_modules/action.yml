name: Build OnePlus kernel modules

permissions:
  contents: write
  actions: write

inputs:
  op_config_json:
    description: 'JSON string containing full device config'
    required: true
    type: string

  optimize_level:
    description: 'Optimization level'
    required: false
    type: string
    default: O2

  manifest:
    description: 'Manifest preset'
    required: true
    type: string
    default: OOS16

  external_modules_script:
    description: 'Optional shell script that builds external modules inside the stock kernel build environment'
    required: false
    type: string
    default: ''

  package_external_only:
    description: 'If true and external modules were built, zip only those external modules'
    required: false
    type: string
    default: 'false'

runs:
  using: composite
  steps:
    - name: Parse op_config_json
      shell: bash
      run: |
        set -euo pipefail
        echo '${{ inputs.op_config_json }}' > /tmp/config.json
        jq -r 'to_entries[] | "\(.key | ascii_upcase)=\(.value)"' /tmp/config.json >> "$GITHUB_ENV"
        echo "Parsed config:"
        jq '.' /tmp/config.json

    - name: Set Manifest
      shell: bash
      run: |
        set -euo pipefail
        MANIFEST_VAR="MANIFEST_${{ inputs.manifest }}_MODULES"
        MANIFEST_VALUE="${!MANIFEST_VAR:-}"
        [ -n "$MANIFEST_VALUE" ] || { echo "Manifest preset not found: $MANIFEST_VAR"; exit 1; }
        echo "MANIFEST=$MANIFEST_VALUE" >> "$GITHUB_ENV"

    - name: Validate Inputs
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Validate inputs"

        model="${MODEL:-}"
        soc="${SOC:-}"
        branch="${BRANCH:-}"
        manifest="${MANIFEST:-}"
        optimize='${{ inputs.optimize_level }}'

        [[ -n "$model" ]] || { echo "Input 'model' cannot be empty"; exit 1; }
        [[ -n "$soc" ]] || { echo "Input 'soc' cannot be empty"; exit 1; }
        [[ -n "$branch" ]] || { echo "Input 'branch' cannot be empty"; exit 1; }
        [[ -n "$manifest" ]] || { echo "Input 'manifest' cannot be empty"; exit 1; }

        if ! [[ "$soc" =~ ^[A-Za-z0-9_-]+$ ]]; then
          echo "Input 'soc' contains invalid characters. Allowed: letters, digits, underscore, dash"
          exit 1
        fi

        if ! [[ "$branch" =~ ^[A-Za-z0-9._/-]+$ ]]; then
          echo "Input 'branch' contains invalid characters. Allowed: letters, digits, ., _, -, /"
          exit 1
        fi

        if [[ "$manifest" == http*://* ]]; then
          if ! [[ "$manifest" =~ ^https:// ]]; then
            echo "Manifest URL must be HTTPS"
            exit 1
          fi
          if ! [[ "$manifest" =~ \.xml($|\?) ]]; then
            echo "Manifest URL should point to an XML file (.xml)"
            exit 1
          fi
        else
          if ! [[ "$manifest" =~ \.xml$ ]]; then
            echo "Manifest filename must end with .xml"
            exit 1
          fi
          if [[ "$manifest" =~ [[:space:]] ]]; then
            echo "Manifest filename cannot contain spaces"
            exit 1
          fi
        fi

        case "$optimize" in
          O2|O3) ;;
          *)
            echo "optimize_level must be O2 or O3; got '$optimize'"
            exit 1
            ;;
        esac

        echo "Input validation OK."
        echo "::endgroup::"

    - name: Aggressive cleanup
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Cleanup space"
        sudo rm -rf /usr/share/dotnet || true
        sudo rm -rf /usr/share/swift || true
        sudo rm -rf /usr/local/.ghcup || true
        sudo rm -rf /usr/local/julia* || true
        sudo rm -rf /usr/local/lib/android || true
        sudo rm -rf /usr/local/share/chromium || true
        sudo rm -rf /opt/microsoft /opt/google || true
        sudo rm -rf /opt/az || true
        sudo rm -rf /usr/local/share/powershell || true
        sudo rm -rf /opt/hostedtoolcache || true
        docker system prune -af || true
        docker builder prune -af || true
        df -h
        echo "::endgroup::"

    - name: Install Minimal Dependencies
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Install deps"
        sudo apt-get -o Acquire::Retries=3 update -qq
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
          git curl ca-certificates build-essential clang lld flex bison \
          libelf-dev libssl-dev libncurses-dev zlib1g-dev liblz4-tool \
          libxml2-utils rsync unzip dwarves file python3 ccache wget patch jq \
          coccinelle kmod bc perl xz-utils
        sudo apt-get clean
        echo "::endgroup::"

    - name: Setup Base Environment
      shell: bash
      run: |
        set -euo pipefail
        CONFIG="$MODEL"
        echo "CONFIG=$CONFIG" >> "$GITHUB_ENV"

        REPO="/usr/local/bin/repo"
        if [ ! -x "$REPO" ]; then
          curl -sSL https://storage.googleapis.com/git-repo-downloads/repo -o "$REPO"
          chmod +x "$REPO"
        fi
        echo "REPO=$REPO" >> "$GITHUB_ENV"

    - name: Initialize and Sync Kernel Source
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p "$CONFIG"
        cd "$CONFIG"

        if [[ "$MANIFEST" == https://* ]]; then
          mkdir -p .repo/manifests
          curl --fail --show-error --location --proto '=https' "$MANIFEST" -o .repo/manifests/temp_manifest.xml
          "$REPO" init -u https://github.com/OnePlusOSS/kernel_manifest.git \
            -b "$BRANCH" \
            -m temp_manifest.xml \
            --repo-rev=v2.16 \
            --depth=1 \
            --no-clone-bundle \
            --no-tags
        else
          "$REPO" init -u https://github.com/OnePlusOSS/kernel_manifest.git \
            -b "$BRANCH" \
            -m "$MANIFEST" \
            --repo-rev=v2.16 \
            --depth=1 \
            --no-clone-bundle \
            --no-tags
        fi

        "$REPO" --version

        ok=false
        for i in 1 2 3; do
          if "$REPO" sync -c --no-clone-bundle --no-tags --optimized-fetch -j"$(nproc --all)" --fail-fast; then
            ok=true
            break
          fi
          echo "repo sync attempt $i failed; retrying..."
          sleep 30
        done

        $ok || { echo "repo sync failed after 3 attempts"; exit 1; }

    - name: Get Kernel Version Info
      shell: bash
      run: |
        set -euo pipefail
        CONFIG_DIR="$GITHUB_WORKSPACE/$CONFIG"
        ARTIFACTS_DIR="$CONFIG_DIR/artifacts"
        mkdir -p "$ARTIFACTS_DIR"

        cd "$CONFIG_DIR/kernel_platform/msm-kernel"

        CONFIG_FILES=("build.config.common" "build.config.constants")
        BRANCH_LINE=""

        for f in "${CONFIG_FILES[@]}"; do
          if [ -f "$f" ]; then
            l=$(grep '^[[:space:]]*BRANCH=' "$f" || true)
            if [ -n "$l" ]; then
              BRANCH_LINE="$l"
              break
            fi
          fi
        done

        if [ -z "$BRANCH_LINE" ]; then
          echo "Error: No BRANCH= found"
          exit 1
        fi

        BRANCH_VALUE="${BRANCH_LINE#*=}"
        ANDROID_VERSION="${BRANCH_VALUE%-*}"

        [ -n "$ANDROID_VERSION" ] || { echo "Could not parse android version from BRANCH=$BRANCH_VALUE"; exit 1; }

        VERSION=$(grep '^VERSION *=' Makefile | awk '{print $3}')
        PATCHLEVEL=$(grep '^PATCHLEVEL *=' Makefile | awk '{print $3}')
        SUBLEVEL=$(grep '^SUBLEVEL *=' Makefile | awk '{print $3}')
        FULL_VERSION="$VERSION.$PATCHLEVEL.$SUBLEVEL"

        echo "ANDROID_VER=$ANDROID_VERSION" >> "$GITHUB_ENV"
        echo "KERNEL_VER=$VERSION.$PATCHLEVEL" >> "$GITHUB_ENV"
        echo "KERNEL_SUBLEVEL=$SUBLEVEL" >> "$GITHUB_ENV"
        echo "KERNEL_FULL_VER=$ANDROID_VERSION-$FULL_VERSION" >> "$GITHUB_ENV"
        echo "SUSFS_KERNEL_BRANCH=gki-$ANDROID_VERSION-$VERSION.$PATCHLEVEL" >> "$GITHUB_ENV"

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2.19
      with:
        key: ${{ env.CONFIG }}-modules-${{ env.KERNEL_FULL_VER }}
        max-size: 5G
        append-timestamp: false
        create-symlink: true
        job-summary: 'CCache stats'
        evict-old-files: 'job'

    - name: Clone kernel patches for msm kernel
      shell: bash
      run: |
        set -euo pipefail
        git clone --depth=1 https://github.com/nullptr-t-oss/kernel_patches.git my_patches

    - name: Clean Up ABI Protected Exports
      shell: bash
      run: |
        set -euo pipefail
        cd "$CONFIG/kernel_platform"
        rm -f msm-kernel/android/abi_gki_protected_exports_* || true
        df -h

    - name: Merge
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PLATFORM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        MSM="$KERNEL_PLATFORM/msm-kernel"
        OUT="$MSM/out"

        cd "$MSM"

        make ARCH=arm64 mrproper
        mkdir -p "$OUT"

        ./scripts/kconfig/merge_config.sh -O "$OUT" -m \
          arch/arm64/configs/gki_defconfig \
          arch/arm64/configs/vendor/${SOC}_GKI.config

        cp "$OUT/.config" arch/arm64/configs/gki_defconfig
        rm -f "$OUT/.config"

    - name: Add my kernel patches to msm kernel
      if: env.SOC == 'waipio'
      shell: bash
      run: |
        set -euo pipefail
        cd "$CONFIG/kernel_platform/msm-kernel"

        shopt -s nullglob
        PATCHES=(../../../my_patches/kernel_patches/op11/msm/*.patch)

        if [ ${#PATCHES[@]} -eq 0 ]; then
          echo "[!] No OP11 msm patches found, skipping."
        else
          for patch_file in "${PATCHES[@]}"; do
            echo "Applying patch: $patch_file"
            patch -p1 < "$patch_file"
          done
        fi

    - name: FIX vmscan scan_adjusted (waipio)
      if: env.SOC == 'waipio'
      shell: bash
      run: |
        set -euo pipefail
        cd "$CONFIG/kernel_platform/msm-kernel/mm"

        sed -i '/bool scan_adjusted = false;/d' vmscan.c
        perl -0pi -e 's/(unsigned long nr_reclaimed = 0;\n\s*unsigned long nr_to_reclaim = sc->nr_to_reclaim;\n\s*)bool proportional_reclaim;/$1bool proportional_reclaim __maybe_unused;\n\tbool scan_adjusted = false;/s' vmscan.c

        grep -n -A4 -B4 "nr_to_reclaim = sc->nr_to_reclaim" vmscan.c | head -20 || true
        grep -n "scan_adjusted" vmscan.c | head -20 || true

    - name: FIX thermal kvzalloc kvfree (waipio)
      if: env.SOC == 'waipio'
      shell: bash
      run: |
        set -euo pipefail
        export FILE="$CONFIG/kernel_platform/msm-kernel/drivers/thermal/thermal_sysfs.c"

        python3 - <<'PY'
        import os
        from pathlib import Path

        path = Path(os.environ["FILE"])
        text = path.read_text()

        if "#include <linux/mm.h>" not in text and "#include <linux/slab.h>" in text:
            text = text.replace("#include <linux/slab.h>", "#include <linux/slab.h>\n#include <linux/mm.h>", 1)

        if "#define kvzalloc(size, flags)" not in text:
            shim = (
                "\n#ifndef kvzalloc\n"
                "#define kvzalloc(size, flags) kzalloc((size), (flags))\n"
                "#endif\n"
                "#ifndef kvfree\n"
                "#define kvfree(ptr) kfree((ptr))\n"
                "#endif\n"
            )

            if "#include <linux/mm.h>" in text:
                text = text.replace("#include <linux/mm.h>", "#include <linux/mm.h>" + shim, 1)
            elif "#include <linux/slab.h>" in text:
                text = text.replace("#include <linux/slab.h>", "#include <linux/slab.h>" + shim, 1)

        path.write_text(text)
        PY

        grep -n -E 'linux/mm.h|kvzalloc|kvfree' "$FILE" | head -20 || true

    - name: FIX binder mmget_still_valid compat (waipio)
      if: env.SOC == 'waipio'
      shell: bash
      run: |
        set -euo pipefail
        FILE="$CONFIG/kernel_platform/msm-kernel/drivers/android/binder_alloc.c"

        sed -i '/^#include <linux\/mm.h>$/d' "$FILE"
        sed -i '/HAVE_MMGET_STILL_VALID_COMPAT/,+5d' "$FILE"
        sed -i 's/mmget_still_valid_still_valid/mmget_still_valid/g' "$FILE"

        grep -q '^#include <linux/sched/mm.h>$' "$FILE" || \
          sed -i '/^#include <linux\/list.h>$/a #include <linux/sched/mm.h>' "$FILE"

        grep -q 'HAVE_MMGET_STILL_VALID_COMPAT' "$FILE" || \
          perl -0pi -e 's@(#include <linux/sched/mm.h>\n)@$1#ifndef HAVE_MMGET_STILL_VALID_COMPAT\n#define HAVE_MMGET_STILL_VALID_COMPAT\nstatic inline bool mmget_still_valid(struct mm_struct *mm)\n{\n\treturn likely(!mm->core_state);\n}\n#endif\n@' "$FILE"

        grep -n '^#include <linux/sched/mm.h>$' "$FILE" | head -5 || true
        grep -n 'mmget_still_valid' "$FILE" | head -20 || true

    - name: Add rtw88 modules
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PATH="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        MSM="$KERNEL_PATH/msm-kernel"

        cd "$MSM/drivers/net/wireless/realtek/"
        rm -rf rtw88
        git clone --depth=1 https://github.com/lwfinger/rtw88.git
        sed -i 's/$(CONFIG_RTW88)/m/g' Makefile
        sed -i '/^source "drivers\/net\/wireless\/realtek\/rtw88\/Kconfig"$/s/.*/ /' Kconfig

    - name: Detect Clang (toolchain for build)
      shell: bash
      run: |
        set -euo pipefail
        KP="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        CLANG_FOUND=false

        for base in "$KP/prebuilts" "$KP/prebuilts-master"; do
          [ -d "$base/clang/host/linux-x86" ] || continue
          latest=$(ls -d "$base"/clang/host/linux-x86/clang-r*/ 2>/dev/null | sort -V | tail -n1 || true)
          if [ -n "$latest" ] && [ -x "$latest/bin/clang" ]; then
            CLANG_BIN="$latest/bin"
            CLANG_FOUND=true
          fi
        done

        if ! $CLANG_FOUND && command -v clang >/dev/null 2>&1; then
          CLANG_BIN="$(dirname "$(command -v clang)")"
          CLANG_FOUND=true
          echo "Using system clang."
        fi

        $CLANG_FOUND || { echo "No clang toolchain found"; exit 1; }

        echo "CLANG_BIN_PATH=$CLANG_BIN" >> "$GITHUB_ENV"
        CLANG_VERSION="$("$CLANG_BIN/clang" --version | head -n1)"
        echo "CLANG_VERSION=$CLANG_VERSION" >> "$GITHUB_ENV"
        echo "Detected Clang: $CLANG_VERSION"


    - name: Build external modules in stock kernel environment
      if: ${{ inputs.external_modules_script != '' }}
      shell: bash
      run: |
        set -euo pipefail

        KERNEL_PLATFORM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        MSM="$KERNEL_PLATFORM/msm-kernel"
        OUT="$MSM/out"
        INSTALL_MOD_PATH="$MSM/out"
        EXTERNAL_MODULES_OUT="$GITHUB_WORKSPACE/$CONFIG/artifacts/external_modules"

        mkdir -p "$EXTERNAL_MODULES_OUT"

        export KERNEL_PLATFORM MSM OUT INSTALL_MOD_PATH EXTERNAL_MODULES_OUT
        export CONFIG SOC MODEL KERNEL_VER KERNEL_FULL_VER CLANG_BIN_PATH
        export PATH="${CLANG_BIN_PATH}:$PATH"
        export PATH="/usr/lib/ccache:$PATH"

        MAKE_FLAGS=()
        eval "MAKE_FLAGS=($MAKE_FLAGS_STR)"

        cat > /tmp/external_modules_build.sh <<'EOF'
        ${{ inputs.external_modules_script }}
        EOF

        chmod +x /tmp/external_modules_build.sh
        /tmp/external_modules_build.sh

        echo "==== External modules collected ===="
        find "$EXTERNAL_MODULES_OUT" -type f -name '*.ko' | sort || true

    - name: Filter modules
      if: ${{ inputs.package_external_only != 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PLATFORM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        MSM="$KERNEL_PLATFORM/msm-kernel"
        OUT="$MSM/out"

        UNAME=$(ls "$OUT/lib/modules/" | head -n1)
        [ -n "$UNAME" ] || { echo "No installed module directory found"; exit 1; }

        cd "$OUT"
        mkdir -p modules
        find "lib/modules/$UNAME" -type f -name '*.ko' -exec cp {} modules/ \;

        echo "Total modules copied: $(find modules -type f -name '*.ko' | wc -l)"

        cd modules
        curl -L -o default_modules.txt https://raw.githubusercontent.com/nullptr-t-oss/kernel_patches/refs/heads/main/default_modules.txt

        while IFS= read -r module; do
          [ -n "$module" ] || continue
          if [ -e "$module" ]; then
            rm -f "$module"
            echo "Removed module: $module"
          fi
        done < default_modules.txt

        cd ..
        echo "Modules remaining after filtering: $(find modules -type f -name '*.ko' | wc -l)"

    - name: Create MT7921 Modules zip (FIXED)
      id: create_zip
      shell: bash
      run: |
        set -euo pipefail
    
        CONFIG_DIR="$GITHUB_WORKSPACE/$CONFIG"
        COMMON="$CONFIG_DIR/kernel_platform/common"
        OUT="$COMMON/out"
    
        ZIP_OUT="$CONFIG_DIR/artifacts/mt7921_modules.zip"
    
        mkdir -p "$CONFIG_DIR/artifacts"
        rm -f "$ZIP_OUT"
    
        echo "[*] Finding modules directory..."
    
        MOD_DIR="$(find "$OUT" -type d -path "*/lib/modules/*" | head -n1)"
    
        if [ -z "$MOD_DIR" ]; then
          echo "::error::Modules directory not found"
          find "$OUT" -maxdepth 4 -type d
          exit 1
        fi
    
        echo "[*] Using modules from: $MOD_DIR"
    
        TMP_DIR="$OUT/mt7921_modules"
        rm -rf "$TMP_DIR"
        mkdir -p "$TMP_DIR"
    
        # --- CORE WIFI STACK ---
        cp -v "$MOD_DIR/kernel/net/wireless/cfg80211.ko" "$TMP_DIR/" || true
        cp -v "$MOD_DIR/kernel/net/mac80211/mac80211.ko" "$TMP_DIR/" || true
    
        # --- MT76 + MT7921 ---
        if [ -d "$MOD_DIR/kernel/drivers/net/wireless/mediatek/mt76" ]; then
          find "$MOD_DIR/kernel/drivers/net/wireless/mediatek/mt76" -type f -name "*.ko" \
            -exec cp -v {} "$TMP_DIR/" \;
        fi
    
        echo "[*] Final module list:"
        ls -lah "$TMP_DIR"
    
        cd "$TMP_DIR"
        zip -r "$ZIP_OUT" .
    
        echo "[*] Created zip: $ZIP_OUT"

    - name: Final Build Summary
      shell: bash
      run: |
        set -euo pipefail
        {
          echo "CCache Statistics :"
          echo "$(/usr/bin/ccache -s)"
        } | tee summary.txt

        {
          echo "### Kernel Modules Build Summary"
          echo ""
          echo "CCache Statistics :"
          echo "$(ccache -s -v)"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Cleanup old ccache
      shell: bash
      run: |
        set -euo pipefail
        gh cache delete ccache-${{ env.CONFIG }}-modules-${{ env.KERNEL_FULL_VER }}- || true

    - name: Upload Kernel Modules zip
      if: success() && steps.create_zip.conclusion == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: kernel-modules-${{ env.CONFIG }}
        path: ${{ env.CONFIG }}/artifacts/
