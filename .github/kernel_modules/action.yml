name: Build OnePlus kernel modules

permissions:
  contents: write
  actions: write

inputs:
  op_config_json:
    description: 'JSON string containing full device config'
    required: true
    type: string
  optimize_level:
    required: false
    type: string
    default: O2
  manifest:
    required: true
    type: string
    default: OOS16

runs:
  using: composite
  steps:
    - name: Parse op_config_json
      shell: bash
      run: |
        set -euo pipefail
        echo '${{ inputs.op_config_json }}' > /tmp/config.json
        jq -r 'to_entries[] | "\(.key | ascii_upcase)=\(.value)"' /tmp/config.json >> "$GITHUB_ENV"
        echo "Parsed config:"
        jq '.' /tmp/config.json

    - name: Set Manifest
      shell: bash
      run: |
        set -euo pipefail
        echo "MANIFEST=$MANIFEST_${{ inputs.manifest }}_MODULES" >> "$GITHUB_ENV"

    - name: Validate Inputs
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Validate inputs"
        model="$MODEL"
        soc="$SOC"
        branch="$BRANCH"
        manifest="$MANIFEST"
        optimize='${{ inputs.optimize_level }}'

        [[ -n "$model" ]] || { echo "Input 'model' cannot be empty"; exit 1; }
        [[ -n "$soc" ]] || { echo "Input 'soc' cannot be empty"; exit 1; }
        [[ -n "$branch" ]] || { echo "Input 'branch' cannot be empty"; exit 1; }
        [[ -n "$manifest" ]] || { echo "Input 'manifest' cannot be empty"; exit 1; }

        [[ "$soc" =~ ^[A-Za-z0-9_-]+$ ]] || { echo "Invalid soc: $soc"; exit 1; }
        [[ "$branch" =~ ^[A-Za-z0-9._/-]+$ ]] || { echo "Invalid branch: $branch"; exit 1; }

        if [[ "$manifest" == http*://* ]]; then
          [[ "$manifest" =~ ^https:// ]] || { echo "Manifest URL must be HTTPS"; exit 1; }
          [[ "$manifest" =~ \.xml($|\?) ]] || { echo "Manifest URL should point to an XML file"; exit 1; }
        else
          [[ "$manifest" =~ \.xml$ ]] || { echo "Manifest filename must end with .xml"; exit 1; }
          [[ ! "$manifest" =~ [[:space:]] ]] || { echo "Manifest filename cannot contain spaces"; exit 1; }
        fi

        case "$optimize" in
          O2|O3) ;;
          *) echo "optimize_level must be O2 or O3; got '$optimize'"; exit 1 ;;
        esac
        echo "Input validation OK."
        echo "::endgroup::"

    - name: Aggressive cleanup
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Cleanup space"
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/share/swift
        sudo rm -rf /usr/local/.ghcup
        sudo rm -rf /usr/local/julia*
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /usr/local/share/chromium
        sudo rm -rf /opt/microsoft /opt/google
        sudo rm -rf /opt/az
        sudo rm -rf /usr/local/share/powershell
        sudo rm -rf /opt/hostedtoolcache
        docker system prune -af || true
        docker builder prune -af || true
        df -h
        echo "::endgroup::"

    - name: Install Minimal Dependencies
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Install deps"
        sudo apt-get -o Acquire::Retries=3 update -qq
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
          git curl ca-certificates build-essential clang lld flex bison \
          libelf-dev libssl-dev libncurses-dev zlib1g-dev liblz4-tool \
          libxml2-utils rsync unzip dwarves file python3 ccache jq bc kmod perl
        sudo apt-get clean
        echo "::endgroup::"

    - name: Setup Base Environment
      shell: bash
      run: |
        set -euo pipefail
        CONFIG="$MODEL"
        echo "CONFIG=$CONFIG" >> "$GITHUB_ENV"

        REPO="/usr/local/bin/repo"
        if [ ! -x "$REPO" ]; then
          curl -s https://storage.googleapis.com/git-repo-downloads/repo -o "$REPO"
          chmod +x "$REPO"
        fi
        echo "REPO=$REPO" >> "$GITHUB_ENV"

    - name: Initialize and Sync Kernel Source
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p "$CONFIG"
        cd "$CONFIG"

        if [[ "$MANIFEST" == https://* ]]; then
          mkdir -p .repo/manifests
          curl --fail --show-error --location --proto '=https' "$MANIFEST" -o .repo/manifests/temp_manifest.xml
          "$REPO" init -u https://github.com/OnePlusOSS/kernel_manifest.git -b "$BRANCH" -m temp_manifest.xml --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags
        else
          "$REPO" init -u https://github.com/OnePlusOSS/kernel_manifest.git -b "$BRANCH" -m "$MANIFEST" --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags
        fi

        success=false
        for i in 1 2 3; do
          if "$REPO" sync -c --no-clone-bundle --no-tags --optimized-fetch -j"$(nproc --all)" --fail-fast; then
            success=true
            break
          fi
          echo "repo sync attempt $i failed; retrying..."
          sleep 30
        done
        $success || { echo "repo sync failed after 3 attempts"; exit 1; }

    - name: Get Kernel Version Info
      shell: bash
      run: |
        set -euo pipefail
        CONFIG_DIR="$GITHUB_WORKSPACE/$CONFIG"
        ARTIFACTS_DIR="$CONFIG_DIR/artifacts"
        mkdir -p "$ARTIFACTS_DIR"
        cd "$CONFIG_DIR/kernel_platform/msm-kernel"

        CONFIG_FILES=("build.config.common" "build.config.constants")
        BRANCH_LINE=""
        for f in "${CONFIG_FILES[@]}"; do
          if [ -f "$f" ]; then
            l=$(grep '^[[:space:]]*BRANCH=' "$f" || true)
            if [ -n "$l" ]; then
              BRANCH_LINE="$l"
              break
            fi
          fi
        done

        [ -n "$BRANCH_LINE" ] || { echo "Error: No BRANCH= found"; exit 1; }

        BRANCH_VALUE="${BRANCH_LINE#*=}"
        ANDROID_VERSION="${BRANCH_VALUE%-*}"
        VERSION=$(grep '^VERSION *=' Makefile | awk '{print $3}')
        PATCHLEVEL=$(grep '^PATCHLEVEL *=' Makefile | awk '{print $3}')
        SUBLEVEL=$(grep '^SUBLEVEL *=' Makefile | awk '{print $3}')
        FULL_VERSION="$VERSION.$PATCHLEVEL.$SUBLEVEL"

        echo "ANDROID_VER=$ANDROID_VERSION" >> "$GITHUB_ENV"
        echo "KERNEL_VER=$VERSION.$PATCHLEVEL" >> "$GITHUB_ENV"
        echo "KERNEL_FULL_VER=$ANDROID_VERSION-$FULL_VERSION" >> "$GITHUB_ENV"

    - name: Setup ccache
      shell: bash
      run: |
        set -euo pipefail
        ccache --version || true
        ccache -M 5G || true
        ccache -s || true

    - name: Clean Up ABI Protected Exports
      shell: bash
      run: |
        set -euo pipefail
        cd "$CONFIG/kernel_platform"
        rm -f msm-kernel/android/abi_gki_protected_exports_* || true
        df -h

    - name: Merge vendor config
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PLATFORM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        MSM="$KERNEL_PLATFORM/msm-kernel"
        OUT=out

        cd "$MSM"
        make ARCH=arm64 mrproper
        mkdir -p "$OUT"
        ./scripts/kconfig/merge_config.sh -O "$OUT" -m \
          arch/arm64/configs/gki_defconfig \
          arch/arm64/configs/vendor/${SOC}_GKI.config

    - name: Replace in-tree mt76 with mt7921-capable backport
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PATH="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        MSM="$KERNEL_PATH/msm-kernel"
        MT76_DST="$MSM/drivers/net/wireless/mediatek/mt76"
        TMP_DIR="$GITHUB_WORKSPACE/mt76-backport"

        rm -rf "$TMP_DIR"
        git clone --depth=1 https://github.com/shengliangd/mt76-backport.git "$TMP_DIR"

        rm -rf "$MT76_DST"
        mkdir -p "$(dirname "$MT76_DST")"
        cp -a "$TMP_DIR" "$MT76_DST"

        test -f "$MT76_DST/mt7921/usb.c"
        echo "[+] mt76 backport imported"

    - name: Patch mt76 backport for Snapdragon vendor kernel
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PATH="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        MSM="$KERNEL_PATH/msm-kernel"
        MT76_DIR="$MSM/drivers/net/wireless/mediatek/mt76"
        MCU_FILE="$MT76_DIR/mt76_connac_mcu.c"

        sed -i '/linux\/soc\/mediatek\/mtk_wed.h/d' "$MT76_DIR/mt76.h"

        python3 - <<PY
          from pathlib import Path
          p = Path(r"$MT76_DIR/mt76.h")
          txt = p.read_text()
          marker = "#include <linux/etherdevice.h>\n"
          stub = r'''
          #ifndef __MT76_WED_STUBS_H
          #define __MT76_WED_STUBS_H
          struct mtk_wed_device { int dummy; };
          struct mtk_wed_ops { int dummy; };
          enum mtk_wed_bus_type {
              MTK_WED_BUS_PCIE = 0,
              MTK_WED_BUS_AXI = 1,
              MTK_WED_BUS_USB = 2,
          };
          #define mtk_wed_device_active(...)            false
          #define mtk_wed_get_rx_capa(...)              false
          #define mtk_wed_device_attach(...)            (-1)
          #define mtk_wed_device_detach(...)            do { } while (0)
          #define mtk_wed_device_start(...)             do { } while (0)
          #define mtk_wed_device_stop(...)              do { } while (0)
          #define mtk_wed_device_tx_ring_setup(...)     0
          #define mtk_wed_device_rx_ring_setup(...)     0
          #define mtk_wed_device_dma_reset(...)         do { } while (0)
          #define mtk_wed_device_ppe_check(...)         false
          #define mtk_wed_device_irq_set_mask(...)      do { } while (0)
          #define mtk_wed_device_update_msg(...)        do { } while (0)
          #define mtk_wed_get_pci_bus(...)              NULL
          #define mtk_wed_device_setup_tc(...)          0
          #define mtk_wed_device_txfree(...)            false
          #define mtk_wed_device_register(...)          0
          #define mtk_wed_device_unregister(...)        do { } while (0)
          #endif
          '''
          if "__MT76_WED_STUBS_H" not in txt:
              txt = txt.replace(marker, marker + stub + "\n", 1) if marker in txt else stub + "\n" + txt
          p.write_text(txt)
         PY

        sed -i 's/s8 reg_power, sar_power;/s8 reg_power = 0, sar_power = 0;/' "$MCU_FILE" || true
        find "$MT76_DIR" -type f -name 'Makefile' -exec sed -i 's/-Werror//g' {} +
        find "$MT76_DIR" -type f -exec sed -i 's/-Werror//g' {} +

    - name: Apply Qualcomm 5.10 compatibility fixes
      if: env.SOC == 'waipio'
      shell: bash
      run: |
        set -euo pipefail

        VMSCAN="$CONFIG/kernel_platform/msm-kernel/mm/vmscan.c"
        THERMAL="$CONFIG/kernel_platform/msm-kernel/drivers/thermal/thermal_sysfs.c"
        BINDER="$CONFIG/kernel_platform/msm-kernel/drivers/android/binder_alloc.c"

        sed -i '/bool scan_adjusted = false;/d' "$VMSCAN"
        perl -0pi -e 's/(unsigned long nr_reclaimed = 0;\n\s*unsigned long nr_to_reclaim = sc->nr_to_reclaim;\n\s*)bool proportional_reclaim;/$1bool proportional_reclaim __maybe_unused;\n\tbool scan_adjusted = false;/s' "$VMSCAN"

        FILE="$THERMAL" python3 - <<'PY'
          import os
          from pathlib import Path
          path = Path(os.environ['FILE'])
          text = path.read_text()
          if '#include <linux/mm.h>' not in text and '#include <linux/slab.h>' in text:
              text = text.replace('#include <linux/slab.h>', '#include <linux/slab.h>\n#include <linux/mm.h>', 1)
          if '#define kvzalloc(size, flags)' not in text:
              shim = (
                  '\n#ifndef kvzalloc\n'
                  '#define kvzalloc(size, flags) kzalloc((size), (flags))\n'
                  '#endif\n'
                  '#ifndef kvfree\n'
                  '#define kvfree(ptr) kfree((ptr))\n'
                  '#endif\n'
              )
              if '#include <linux/mm.h>' in text:
                  text = text.replace('#include <linux/mm.h>', '#include <linux/mm.h>' + shim, 1)
              elif '#include <linux/slab.h>' in text:
                  text = text.replace('#include <linux/slab.h>', '#include <linux/slab.h>' + shim, 1)
          path.write_text(text)
          PY

        sed -i '/^#include <linux\/mm.h>$/d' "$BINDER"
        sed -i '/HAVE_MMGET_STILL_VALID_COMPAT/,+5d' "$BINDER"
        sed -i 's/mmget_still_valid_still_valid/mmget_still_valid/g' "$BINDER"
        grep -q '^#include <linux/sched/mm.h>$' "$BINDER" || sed -i '/^#include <linux\/list.h>$/a #include <linux/sched/mm.h>' "$BINDER"
        grep -q 'HAVE_MMGET_STILL_VALID_COMPAT' "$BINDER" || \
          perl -0pi -e 's@(#include <linux/sched/mm.h>\n)@$1#ifndef HAVE_MMGET_STILL_VALID_COMPAT\n#define HAVE_MMGET_STILL_VALID_COMPAT\nstatic inline bool mmget_still_valid(struct mm_struct *mm)\n{\n\treturn likely(!mm->core_state);\n}\n#endif\n@' "$BINDER"

    - name: Detect Clang toolchain
      shell: bash
      run: |
        set -euo pipefail
        KP="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        CLANG_FOUND=false

        for base in "$KP/prebuilts" "$KP/prebuilts-master"; do
          [ -d "$base/clang/host/linux-x86" ] || continue
          latest=$(ls -d "$base"/clang/host/linux-x86/clang-r*/ 2>/dev/null | sort -V | tail -n1 || true)
          if [ -n "$latest" ] && [ -x "$latest/bin/clang" ]; then
            CLANG_BIN="$latest/bin"
            CLANG_FOUND=true
          fi
        done

        if ! $CLANG_FOUND && command -v clang >/dev/null 2>&1; then
          CLANG_BIN="$(dirname "$(command -v clang)")"
          CLANG_FOUND=true
        fi

        $CLANG_FOUND || { echo "No clang toolchain found"; exit 1; }
        echo "CLANG_BIN_PATH=$CLANG_BIN" >> "$GITHUB_ENV"
        echo "CLANG_VERSION=$($CLANG_BIN/clang --version | head -n1)" >> "$GITHUB_ENV"

    - name: Configure only MT7921U stack
      shell: bash
      run: |
        set -euo pipefail
        MSM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel"
        OUT="$MSM/out"

        cd "$MSM"
        : > .scmversion

        ./scripts/config --file "$OUT/.config" --disable LOCALVERSION_AUTO || true
        ./scripts/config --file "$OUT/.config" --enable WLAN
        ./scripts/config --file "$OUT/.config" --module CFG80211
        ./scripts/config --file "$OUT/.config" --module MAC80211
        ./scripts/config --file "$OUT/.config" --enable WLAN_VENDOR_MEDIATEK

        ./scripts/config --file "$OUT/.config" --module MT76_CORE
        ./scripts/config --file "$OUT/.config" --module MT76_USB
        ./scripts/config --file "$OUT/.config" --module MT76_CONNAC_LIB
        ./scripts/config --file "$OUT/.config" --module MT7921_COMMON
        ./scripts/config --file "$OUT/.config" --module MT7921U
        ./scripts/config --file "$OUT/.config" --module MT76_LEDS || true
        ./scripts/config --file "$OUT/.config" --module MAC80211_LEDS || true
        ./scripts/config --file "$OUT/.config" --enable SECTION_MISMATCH_WARN_ONLY || true

        # Strip unrelated wireless families so the artifact only contains the MT7921U path.
        for sym in \
          WLAN_VENDOR_ATH WLAN_VENDOR_ATMEL WLAN_VENDOR_BROADCOM WLAN_VENDOR_CISCO \
          WLAN_VENDOR_INTEL WLAN_VENDOR_INTERSIL WLAN_VENDOR_MARVELL WLAN_VENDOR_QUANTENNA \
          WLAN_VENDOR_RALINK WLAN_VENDOR_REALTEK WLAN_VENDOR_RSI WLAN_VENDOR_ST \
          WLAN_VENDOR_TI WLAN_VENDOR_ZYDAS RT2X00 RTL8187 RTL_CARDS RTW88 RTW89 ATH_CARDS \
          ATH9K ATH10K ATH11K BRCMFMAC MWIFIEX LIBERTAS_IWLAGN PRISM54 HOSTAP_P54_USB \
          MT7601U MT76x0_COMMON MT76x2_COMMON MT7615_COMMON MT7615E MT7663_USB_SDIO_COMMON \
          MT7663U MT7663S MT7915E MT7921E MT7925_COMMON MT7925E MT7996E; do
          ./scripts/config --file "$OUT/.config" --disable "$sym" || true
        done

        ./scripts/config --file "$OUT/.config" --disable LTO || true
        ./scripts/config --file "$OUT/.config" --disable LTO_CLANG || true
        ./scripts/config --file "$OUT/.config" --disable LTO_CLANG_FULL || true
        ./scripts/config --file "$OUT/.config" --disable LTO_CLANG_THIN || true
        ./scripts/config --file "$OUT/.config" --enable LTO_NONE || true
        ./scripts/config --file "$OUT/.config" --disable CFI || true
        ./scripts/config --file "$OUT/.config" --disable CFI_CLANG || true
        ./scripts/config --file "$OUT/.config" --disable SHADOW_CALL_STACK || true

        grep -q '^CONFIG_LTO_NONE=y' "$OUT/.config" || echo 'CONFIG_LTO_NONE=y' >> "$OUT/.config"
        grep -q '^CONFIG_SECTION_MISMATCH_WARN_ONLY=y' "$OUT/.config" || echo 'CONFIG_SECTION_MISMATCH_WARN_ONLY=y' >> "$OUT/.config"

        make O="$OUT" olddefconfig
        echo "[*] Active MT7921 config:"
        grep -E 'CONFIG_(MT76|MT7921|CFG80211|MAC80211|LOCALVERSION)' "$OUT/.config" || true

    - name: Build modules
      shell: bash
      run: |
        set -euo pipefail
        MSM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel"
        OUT="$MSM/out"
        INSTALL_MOD_PATH="$OUT"

        cd "$MSM"
        export PATH="${CLANG_BIN_PATH}:$PATH"
        export PATH="/usr/lib/ccache:$PATH"

        MAKE_FLAGS=(
          LLVM=1
          LLVM_IAS=1
          ARCH=arm64
          SUBARCH=arm64
          CLANG_TRIPLE=aarch64-linux-gnu-
          CROSS_COMPILE=aarch64-linux-gnu-
          CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          LD=ld.lld
          HOSTLD=ld.lld
          AR=llvm-ar
          NM=llvm-nm
          OBJCOPY=llvm-objcopy
          OBJDUMP=llvm-objdump
          DEPMOD=depmod
          DTC=dtc
          STRIP=llvm-strip
          HOSTCC=clang
          HOSTCXX=clang++
          CC="ccache clang"
        )

        if [ '${{ inputs.optimize_level }}' = 'O3' ]; then
          export KCFLAGS='-Wno-error -Wframe-larger-than=4096 -O3'
        else
          export KCFLAGS='-Wno-error -Wframe-larger-than=4096 -O2'
        fi
        export KCPPFLAGS='-Wno-error'
        export KBUILD_BUILD_TIMESTAMP="$(date)"

        JOBS=2
        timeout 35m make -j"$JOBS" "${MAKE_FLAGS[@]}" O="$OUT" modules 2>&1 | tee "$OUT/build-modules.log"
        timeout 20m make -j"$JOBS" "${MAKE_FLAGS[@]}" O="$OUT" INSTALL_MOD_PATH="$INSTALL_MOD_PATH" modules_install

    - name: Collect only MT7921U dependency chain
      shell: bash
      run: |
        set -euo pipefail
        MSM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel"
        OUT="$MSM/out"
        PKG="$OUT/modules_mt7921u"

        mkdir -p "$PKG"
        find "$OUT/lib/modules" -type f -name '*.ko' -exec cp {} "$PKG/" \;

        cd "$PKG"
        find . -maxdepth 1 -type f -name '*.ko' | while read -r f; do
          base="$(basename "$f")"
          case "$base" in
            cfg80211*.ko|mac80211*.ko|mt76*.ko|mt792*.ko)
              ;;
            *)
              rm -f "$f"
              ;;
          esac
        done

        echo "Remaining modules:"
        ls -1 *.ko | sort

        ls -1 *.ko | grep -Eq '^mt7921u.*\.ko$' || { echo '::error::mt7921u.ko was not produced'; exit 1; }
        ls -1 *.ko | grep -Eq '^cfg80211.*\.ko$' || { echo '::error::cfg80211.ko missing'; exit 1; }
        ls -1 *.ko | grep -Eq '^mac80211.*\.ko$' || { echo '::error::mac80211.ko missing'; exit 1; }

        {
          printf '%s\n' cfg80211.ko
          printf '%s\n' mac80211.ko
          ls -1 mt76*.ko 2>/dev/null | sort
          ls -1 mt792*.ko 2>/dev/null | sort
        } | awk '!seen[$0]++' > modules.load.order

        cat modules.load.order

    - name: Create Kernel Modules zip
      id: create_zip
      shell: bash
      run: |
        set -euo pipefail
        CONFIG_DIR="$GITHUB_WORKSPACE/$CONFIG"
        MSM="$CONFIG_DIR/kernel_platform/msm-kernel"
        MODULES_SRC="$MSM/out/modules_mt7921u"
        MODULES_ZIP="$CONFIG_DIR/artifacts/kernel_modules_${{ env.MODEL }}_mt7921u_only.zip"

        mkdir -p "$CONFIG_DIR/artifacts"
        (cd "$MODULES_SRC" && zip -r "$MODULES_ZIP" ./* >/dev/null)
        echo "Packaged kernel modules to $MODULES_ZIP"

    - name: Final Build Summary
      shell: bash
      run: |
        set -euo pipefail
        {
          echo "### Kernel Modules Build Summary"
          echo ""
          echo "Model: $MODEL"
          echo "Kernel: $KERNEL_FULL_VER"
          echo "Manifest: $MANIFEST"
          echo ""
          echo "CCache Statistics:"
          ccache -s -v || true
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Upload Kernel Modules zip
      if: success() && steps.create_zip.conclusion == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: kernel-modules-${{ env.CONFIG }}
        path: ${{ env.CONFIG }}/artifacts/
