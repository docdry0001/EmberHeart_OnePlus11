=name: Build OnePlus kernel modules

permissions:
  contents: write
  actions: write

inputs:
  op_config_json:
    description: 'JSON string containing full device config'
    required: true
    type: string
  optimize_level:
    required: false
    type: string
    default: O2
  manifest:
    required: true
    type: string
    default: OOS16

runs:
  using: composite
  steps:
    - name: Parse op_config_json
      shell: bash
      run: |
        set -euo pipefail
        echo '${{ inputs.op_config_json }}' > /tmp/config.json
        jq -r 'to_entries[] | "\(.key | ascii_upcase)=\(.value)"' /tmp/config.json >> "$GITHUB_ENV"
        jq '.' /tmp/config.json

    - name: Set Manifest
      shell: bash
      run: |
        set -euo pipefail
        echo "MANIFEST=$MANIFEST_${{ inputs.manifest }}_MODULES" >> "$GITHUB_ENV"

    - name: Validate Inputs
      shell: bash
      run: |
        set -euo pipefail
        [[ -n "${MODEL:-}" ]] || { echo "MODEL is empty"; exit 1; }
        [[ -n "${SOC:-}" ]] || { echo "SOC is empty"; exit 1; }
        [[ -n "${BRANCH:-}" ]] || { echo "BRANCH is empty"; exit 1; }
        [[ -n "${MANIFEST:-}" ]] || { echo "MANIFEST is empty"; exit 1; }

        [[ "$SOC" =~ ^[A-Za-z0-9_-]+$ ]] || { echo "Invalid SOC"; exit 1; }
        [[ "$BRANCH" =~ ^[A-Za-z0-9._/-]+$ ]] || { echo "Invalid BRANCH"; exit 1; }

        case '${{ inputs.optimize_level }}' in
          O2|O3) ;;
          *) echo "optimize_level must be O2 or O3"; exit 1 ;;
        esac

    - name: Cleanup runner
      shell: bash
      run: |
        set -euo pipefail
        sudo rm -rf /usr/share/dotnet /usr/share/swift /usr/local/.ghcup /usr/local/julia* \
          /usr/local/lib/android /usr/local/share/chromium /opt/microsoft /opt/google \
          /opt/az /usr/local/share/powershell /opt/hostedtoolcache || true
        docker system prune -af || true
        docker builder prune -af || true
        df -h

    - name: Install dependencies
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update -qq
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
          git curl ca-certificates build-essential clang lld flex bison \
          libelf-dev libssl-dev libncurses-dev zlib1g-dev liblz4-tool \
          libxml2-utils rsync unzip dwarves file python3 ccache wget patch jq zip
        sudo apt-get clean

    - name: Setup base environment
      shell: bash
      run: |
        set -euo pipefail
        CONFIG="$MODEL"
        echo "CONFIG=$CONFIG" >> "$GITHUB_ENV"

        REPO="/usr/local/bin/repo"
        if [ ! -x "$REPO" ]; then
          curl -s https://storage.googleapis.com/git-repo-downloads/repo -o "$REPO"
          chmod +x "$REPO"
        fi
        echo "REPO=$REPO" >> "$GITHUB_ENV"

    - name: Initialize and Sync Kernel Source
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p "$CONFIG"
        cd "$CONFIG"

        if [[ "$MANIFEST" == https://* ]]; then
          mkdir -p .repo/manifests
          curl --fail --show-error --location --proto '=https' "$MANIFEST" -o .repo/manifests/temp_manifest.xml
          "$REPO" init -u https://github.com/OnePlusOSS/kernel_manifest.git \
            -b oneplus/sm8650 \
            -m temp_manifest.xml \
            --repo-rev=v2.16 \
            --depth=1 \
            --no-clone-bundle \
            --no-tags
        else
          "$REPO" init -u https://github.com/OnePlusOSS/kernel_manifest.git \
            -b "$BRANCH" \
            -m "$MANIFEST" \
            --repo-rev=v2.16 \
            --depth=1 \
            --no-clone-bundle \
            --no-tags
        fi

        ok=false
        for i in 1 2 3; do
          if "$REPO" sync -c --no-clone-bundle --no-tags --optimized-fetch -j"$(nproc --all)" --fail-fast; then
            ok=true
            break
          fi
          echo "repo sync attempt $i failed"
          sleep 20
        done
        $ok || { echo "repo sync failed"; exit 1; }

    - name: Get Kernel Version Info
      shell: bash
      run: |
        set -euo pipefail
        CONFIG_DIR="$GITHUB_WORKSPACE/$CONFIG"
        ARTIFACTS_DIR="$CONFIG_DIR/artifacts"
        mkdir -p "$ARTIFACTS_DIR"

        cd "$CONFIG_DIR/kernel_platform/msm-kernel"

        VERSION=$(grep '^VERSION *=' Makefile | awk '{print $3}')
        PATCHLEVEL=$(grep '^PATCHLEVEL *=' Makefile | awk '{print $3}')
        SUBLEVEL=$(grep '^SUBLEVEL *=' Makefile | awk '{print $3}')
        FULL_VERSION="$VERSION.$PATCHLEVEL.$SUBLEVEL"

        CONFIG_FILES=("build.config.common" "build.config.constants")
        BRANCH_LINE=""
        for f in "${CONFIG_FILES[@]}"; do
          if [ -f "$f" ]; then
            l=$(grep '^[[:space:]]*BRANCH=' "$f" || true)
            if [ -n "$l" ]; then
              BRANCH_LINE="$l"
              break
            fi
          fi
        done

        if [ -z "$BRANCH_LINE" ]; then
          echo "Error: No BRANCH= found"
          exit 1
        fi

        BRANCH_VALUE="${BRANCH_LINE#*=}"
        ANDROID_VERSION="${BRANCH_VALUE%-*}"

        echo "ANDROID_VER=$ANDROID_VERSION" >> "$GITHUB_ENV"
        echo "KERNEL_VER=$VERSION.$PATCHLEVEL" >> "$GITHUB_ENV"
        echo "KERNEL_FULL_VER=$ANDROID_VERSION-$FULL_VERSION" >> "$GITHUB_ENV"

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2.19
      with:
        key: ${{ env.CONFIG }}-modules-${{ env.KERNEL_FULL_VER }}
        max-size: 5G
        append-timestamp: false
        create-symlink: true
        job-summary: 'CCache stats'
        evict-old-files: 'job'

    - name: Import mt76 source bundle into kernel tree
      shell: bash
      run: |
        set -euo pipefail

        BUNDLE_URL="https://raw.githubusercontent.com/docdry0001/EmberHeart_OnePlus11/main/.github/mt76.zip"
        TMP="$GITHUB_WORKSPACE/_mt76_bundle"
        MSM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel"
        DEST_PARENT="$MSM/drivers/net/wireless/mediatek"
        DEST="$DEST_PARENT/mt76"

        rm -rf "$TMP"
        mkdir -p "$TMP"
        mkdir -p "$DEST_PARENT"

        echo "Downloading mt76.zip..."
        curl -L --fail "$BUNDLE_URL" -o "$TMP/mt76.zip"

        echo "Zip contents:"
        zipinfo -1 "$TMP/mt76.zip" | sed -n '1,200p'

        echo "Unpacking mt76.zip..."
        unzip -q "$TMP/mt76.zip" -d "$TMP/unpacked"

        SRC="$(find "$TMP/unpacked" -type f -path '*/mt76/Kconfig' | head -n 1)"
        [ -n "$SRC" ] || { echo "mt76/Kconfig not found inside zip"; exit 1; }
        SRC="$(dirname "$SRC")"

        echo "Resolved SRC=$SRC"
        echo "Replacing kernel mt76 tree..."
        rm -rf "$DEST"
        cp -a "$SRC" "$DEST"
        echo "Normalizing mt76 file timestamps..."
        find "$DEST" -exec touch -c {} +
        find "$DEST" -type d -exec touch -c {} +
        echo "Removing build artifacts from imported mt76 tree..."
        find "$DEST" -type f \
          \( -name '*.o' -o -name '*.ko' -o -name '*.mod' -o -name '*.mod.c' -o -name '*.mod.o' \
             -o -name '*.symversions' -o -name '*.lto.o' -o -name 'modules.order' -o -name 'Module.symvers' \) \
          -delete

        echo "Normalizing mt76 file timestamps..."
        find "$DEST" -exec touch -c {} +

        echo "===== IMPORTED MT76 TREE CHECK ====="
        find "$DEST" -maxdepth 2 -type f | sort | head -200 || true

        echo "===== IMPORTED MT7921 CHECK ====="
        find "$DEST/mt7921" -maxdepth 2 -type f | sort || true

    - name: Detect Clang
      shell: bash
      run: |
        set -euo pipefail
        KP="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        CLANG_FOUND=false

        for base in "$KP/prebuilts" "$KP/prebuilts-master"; do
          [ -d "$base/clang/host/linux-x86" ] || continue
          latest=$(ls -d "$base"/clang/host/linux-x86/clang-r*/ 2>/dev/null | sort -V | tail -n1 || true)
          if [ -n "$latest" ] && [ -x "$latest/bin/clang" ]; then
            CLANG_BIN="$latest/bin"
            CLANG_FOUND=true
          fi
        done

        if ! $CLANG_FOUND && command -v clang >/dev/null 2>&1; then
          CLANG_BIN="$(dirname "$(command -v clang)")"
          CLANG_FOUND=true
        fi

        $CLANG_FOUND || { echo "No clang toolchain found"; exit 1; }

        echo "CLANG_BIN_PATH=$CLANG_BIN" >> "$GITHUB_ENV"
        "$CLANG_BIN/clang" --version | head -n1

    - name: Merge
      shell: bash
      run: |
        set -euo pipefail
        MSM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel"
        OUT="$MSM/out"

        cd "$MSM"
        make ARCH=arm64 mrproper
        mkdir -p "$OUT"

        ./scripts/kconfig/merge_config.sh -O "$OUT" -m \
          arch/arm64/configs/gki_defconfig \
          arch/arm64/configs/vendor/${SOC}_GKI.config

        cp "$OUT/.config" arch/arm64/configs/gki_defconfig
        make O="$OUT" ARCH=arm64 olddefconfig </dev/null

    - name: Enable MediaTek MT7921U configs
      shell: bash
      run: |
        set -euo pipefail
        MSM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel"
        DEFCONFIG="$MSM/arch/arm64/configs/gki_defconfig"
        OUT="$MSM/out"

        cd "$MSM"
        chmod +x ./scripts/config
        mkdir -p "$OUT"

        ./scripts/config --file "$DEFCONFIG" --enable CONFIG_WLAN_VENDOR_MEDIATEK
        ./scripts/config --file "$DEFCONFIG" --module CONFIG_MT76_CORE
        ./scripts/config --file "$DEFCONFIG" --module CONFIG_MT76_USB
        ./scripts/config --file "$DEFCONFIG" --module CONFIG_MT76_CONNAC_LIB
        ./scripts/config --file "$DEFCONFIG" --module CONFIG_MT7921_COMMON
        ./scripts/config --file "$DEFCONFIG" --module CONFIG_MT7921U

        make ARCH=arm64 O="$OUT" gki_defconfig
        make ARCH=arm64 O="$OUT" olddefconfig </dev/null

        echo "===== MT7921 CONFIG CHECK ====="
        grep -E 'CONFIG_(WLAN_VENDOR_MEDIATEK|MT76_CORE|MT76_USB|MT76_CONNAC_LIB|MT792x_LIB|MT792x_USB|MT7921_COMMON|MT7921U)=' "$OUT/.config" || true

    - name: FIX vmscan scan_adjusted (waipio)
      if: env.SOC == 'waipio'
      shell: bash
      run: |
       set -euo pipefail
       cd "$CONFIG/kernel_platform/msm-kernel/mm"

       sed -i '/bool scan_adjusted = false;/d' vmscan.c

       perl -0pi -e 's/(unsigned long nr_reclaimed = 0;\n\s*unsigned long nr_to_reclaim = sc->nr_to_reclaim;\n\s*)bool proportional_reclaim;/$1bool proportional_reclaim __maybe_unused;\n\tbool scan_adjusted = false;/s' vmscan.c

       grep -n -A4 -B4 "nr_to_reclaim = sc->nr_to_reclaim" vmscan.c | head -20 || true
       grep -n "scan_adjusted" vmscan.c | head -20 || true 

    - name: FIX thermal_sysfs for old kernel API
      shell: bash
      run: |
       set -euo pipefail

       REPO_ROOT="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel"
       FILE="$REPO_ROOT/drivers/thermal/thermal_sysfs.c"

       cd "$REPO_ROOT"
       git checkout -- "$FILE"

       sed -i 's/\<kvzalloc(/kzalloc(/g' "$FILE"
       sed -i 's/\<kvfree(/kfree(/g' "$FILE"

       echo "[+] Verify thermal replacements:"
       grep -n -E 'kvzalloc|kvfree|kzalloc|kfree' "$FILE" | head -20 || true

    - name: FIX binder mmget_still_valid compat (waipio)
      if: env.SOC == 'waipio'
      shell: bash
      run: |
        set -euo pipefail
        FILE="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel/drivers/android/binder_alloc.c"
    
        echo "[+] Cleaning previous broken binder edits..."
        sed -i '/^#include <linux\/mm.h>$/d' "$FILE" || true
        sed -i '/HAVE_MMGET_STILL_VALID_COMPAT/,+6d' "$FILE" || true
        sed -i 's/mmget_still_valid_still_valid/mmget_still_valid/g' "$FILE" || true
    
        echo "[+] Ensuring correct mm header..."
        grep -q '^#include <linux/sched/mm.h>$' "$FILE" || \
          sed -i '/^#include <linux\/list.h>$/a #include <linux/sched/mm.h>' "$FILE"
    
        echo "[+] Adding local compat shim only for mmget_still_valid()..."
        grep -q 'HAVE_MMGET_STILL_VALID_COMPAT' "$FILE" || \
          perl -0pi -e 's@(#include <linux/sched/mm.h>\n)@$1#ifndef HAVE_MMGET_STILL_VALID_COMPAT\n#define HAVE_MMGET_STILL_VALID_COMPAT\nstatic inline bool mmget_still_valid(struct mm_struct *mm)\n{\n\treturn likely(!mm->core_state);\n}\n#endif\n@' "$FILE"
    
        echo "[+] Verifying binder fix..."
        grep -n '^#include <linux/sched/mm.h>$' "$FILE" | head -5 || true
        grep -n 'mmget_still_valid' "$FILE" | head -20 || true
    
        
    - name: Build only in-tree modules, package only Wi-Fi
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PLATFORM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        MSM="$KERNEL_PLATFORM/msm-kernel"
        cd "$MSM"
    
        export PATH="${CLANG_BIN_PATH}:$PATH"
        export PATH="/usr/lib/ccache:$PATH"
    
        MAKE_FLAGS=(
          LLVM=1
          LLVM_IAS=1
          ARCH=arm64
          SUBARCH=arm64
          CLANG_TRIPLE=aarch64-linux-gnu-
          CROSS_COMPILE=aarch64-linux-gnu-
          CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          LD=ld.lld
          HOSTLD=ld.lld
          AR=llvm-ar
          NM=llvm-nm
          OBJCOPY=llvm-objcopy
          OBJDUMP=llvm-objdump
          DEPMOD=depmod
          DTC=dtc
          STRIP=llvm-strip
          HOSTCC=clang
          HOSTCXX=clang++
          CC=ccache\ clang
        )
    
        OUT=out
        INSTALL_MOD_PATH="$MSM/out-modules"
        KCFLAGS="-Wno-error -Wframe-larger-than=4096"
    
        mkdir -p "$OUT"
        mkdir -p "$INSTALL_MOD_PATH"
    
        echo "[+] Prepare config"
        make "${MAKE_FLAGS[@]}" O="$OUT" olddefconfig </dev/null
    
        if [ -x ./scripts/config ]; then
          ./scripts/config --file "$OUT/.config" --set-val CONFIG_FRAME_WARN 4096 || true
          ./scripts/config --file "$OUT/.config" --enable CONFIG_SECTION_MISMATCH_WARN_ONLY || true
        fi
    
        grep -q '^CONFIG_SECTION_MISMATCH_WARN_ONLY=y$' "$OUT/.config" || \
          echo 'CONFIG_SECTION_MISMATCH_WARN_ONLY=y' >> "$OUT/.config"
    
        sed -i '/^CONFIG_FRAME_WARN=/d' "$OUT/.config" || true
        echo 'CONFIG_FRAME_WARN=4096' >> "$OUT/.config"
    
        make "${MAKE_FLAGS[@]}" O="$OUT" olddefconfig </dev/null
    
        echo "[+] Building in-tree modules..."
        make -j"$(nproc --all)" "${MAKE_FLAGS[@]}" KCFLAGS="$KCFLAGS" O="$OUT" modules
    
        echo "[+] Force-building mt76 subtree too..."
        make -j"$(nproc --all)" "${MAKE_FLAGS[@]}" KCFLAGS="$KCFLAGS" \
          O="$OUT" M=drivers/net/wireless/mediatek/mt76 modules
    
        echo "[+] Installing in-tree modules..."
        make -j"$(nproc --all)" "${MAKE_FLAGS[@]}" KCFLAGS="$KCFLAGS" \
          O="$OUT" INSTALL_MOD_PATH="$INSTALL_MOD_PATH" modules_install
    
        echo "[+] Force-installing mt76 subtree..."
        make -j"$(nproc --all)" "${MAKE_FLAGS[@]}" KCFLAGS="$KCFLAGS" \
          O="$OUT" M=drivers/net/wireless/mediatek/mt76 \
          INSTALL_MOD_PATH="$INSTALL_MOD_PATH" modules_install
    
        echo "[+] Installed Wi-Fi modules:"
        find "$INSTALL_MOD_PATH" -type f \( \
          -name 'cfg80211.ko' -o \
          -name 'mac80211.ko' -o \
          -name 'mt76*.ko' -o \
          -name 'mt7921*.ko' \
        \) | sort || true    
    - name: Inspect installed modules
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PLATFORM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        MSM="$KERNEL_PLATFORM/msm-kernel"
        MODROOT="$MSM/out-modules"
    
        echo "[+] Module root:"
        find "$MODROOT" -maxdepth 4 -type d | sort || true
    
        echo "[+] Interesting modules:"
        find "$MODROOT" -type f \( \
          -name 'cfg80211.ko' -o \
          -name 'mac80211.ko' -o \
          -name 'mt76*.ko' -o \
           -name 'mt7921*.ko' \
         \) | sort || true

    - name: Create Kernel Modules zip
      id: create_zip
      shell: bash
      run: |
        set -euo pipefail
      
         CONFIG_DIR="$GITHUB_WORKSPACE/$CONFIG"
         MSM="$CONFIG_DIR/kernel_platform/msm-kernel"
         MODULES_ROOT="$MSM/out-modules"
         MODULES_ZIP="$CONFIG_DIR/artifacts/kernel_modules_${MODEL}.zip"
      
         mkdir -p "$CONFIG_DIR/artifacts"
      
         echo "[+] Module root:"
         find "$MODULES_ROOT" -maxdepth 4 -type d | sort || true
      
         echo "[+] Collecting .ko files..."
      
         mapfile -t KO_FILES < <(find "$MODULES_ROOT" -type f -name '*.ko' | sort)
      
         if [ "${#KO_FILES[@]}" -eq 0 ]; then
           echo "❌ No modules found!"
           exit 1
         fi
      
         printf '%s\n' "${KO_FILES[@]}" > "$CONFIG_DIR/artifacts/modules.list.txt"
      
         zip -j "$MODULES_ZIP" "${KO_FILES[@]}"
      
         echo "✅ Packaged modules: $MODULES_ZIP"
         echo "📦 Total modules: ${#KO_FILES[@]}"
      
    - name: Final Build Summary
      shell: bash
      run: |
        set -euo pipefail
        {
          echo "### Kernel Modules Build Summary"
          echo ""
          echo "Model: $MODEL"
          echo "Manifest: $MANIFEST"
          echo "Kernel: $KERNEL_FULL_VER"
          echo ""
          echo "CCache Statistics:"
          ccache -s || true
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Upload Kernel Modules zip
      if: success() && steps.create_zip.conclusion == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: kernel-modules-${{ env.CONFIG }}
        path: ${{ env.CONFIG }}/artifacts/
        
