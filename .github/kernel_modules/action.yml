name: Build OnePlus kernel modules

permissions:
  contents: write
  actions: write

inputs:
  op_config_json:
    description: 'JSON string containing full device config'
    required: true
    type: string
  optimize_level:
    required: false
    type: string
    default: O2
  manifest:
    required: true
    type: string
    default: OOS16
  backports_release:
    required: false
    type: string
    default: backports-6.1.97-1

runs:
  using: composite
  steps:
    - name: Parse op_config_json
      shell: bash
      run: |
        set -euo pipefail
        echo '${{ inputs.op_config_json }}' > /tmp/config.json
        jq -r 'to_entries[] | "\(.key | ascii_upcase)=\(.value)"' /tmp/config.json >> "$GITHUB_ENV"
        echo "Parsed config:"
        jq '.' /tmp/config.json

    - name: Set CONFIG fallback
      shell: bash
      run: |
        set -euo pipefail
        if [ -z "${CONFIG:-}" ]; then
          echo "CONFIG=$MODEL" >> "$GITHUB_ENV"
        fi
        echo "CONFIG=${CONFIG:-$MODEL}"

    - name: Set manifest
      shell: bash
      run: |
        set -euo pipefail
        echo "MANIFEST=$MANIFEST_${{ inputs.manifest }}_MODULES" >> "$GITHUB_ENV"

    - name: Validate inputs
      shell: bash
      run: |
        set -euo pipefail
        [[ -n "${MODEL:-}" ]] || { echo "MODEL is empty"; exit 1; }
        [[ -n "${SOC:-}" ]] || { echo "SOC is empty"; exit 1; }
        [[ -n "${BRANCH:-}" ]] || { echo "BRANCH is empty"; exit 1; }
        [[ -n "${MANIFEST:-}" ]] || { echo "MANIFEST is empty"; exit 1; }
        [[ -n "${CONFIG:-$MODEL}" ]] || { echo "CONFIG is empty"; exit 1; }

        echo "MODEL=$MODEL"
        echo "CONFIG=${CONFIG:-$MODEL}"
        echo "SOC=$SOC"
        echo "BRANCH=$BRANCH"
        echo "MANIFEST=$MANIFEST"

    - name: Cleanup runner
      shell: bash
      run: |
        set -euo pipefail
        sudo rm -rf /usr/share/dotnet /usr/share/swift /usr/local/.ghcup /usr/local/julia* \
          /usr/local/lib/android /usr/local/share/chromium /opt/microsoft /opt/google \
          /opt/az /usr/local/share/powershell /opt/hostedtoolcache || true
        docker system prune -af || true
        docker builder prune -af || true
        df -h

    - name: Install dependencies
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update -qq
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
          git curl ca-certificates build-essential clang lld llvm flex bison \
          libelf-dev libssl-dev libncurses-dev zlib1g-dev liblz4-tool \
          libxml2-utils rsync unzip dwarves file python3 ccache wget patch jq \
          coccinelle kmod bc perl xz-utils zip
        sudo apt-get clean

    - name: Install repo tool
      shell: bash
      run: |
        set -euo pipefail
        sudo curl -L https://storage.googleapis.com/git-repo-downloads/repo -o /usr/local/bin/repo
        sudo chmod +x /usr/local/bin/repo
        repo --version

    - name: Sync kernel source
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p "$CONFIG"
        cd "$CONFIG"

        repo init -u https://github.com/OnePlusOSS/kernel_manifest.git \
          -b "$BRANCH" \
          -m "$MANIFEST" \
          --repo-rev=v2.16 \
          --depth=1 \
          --no-clone-bundle \
          --no-tags

        ok=false
        for i in 1 2 3; do
          if repo sync -c --no-clone-bundle --no-tags --optimized-fetch -j"$(nproc --all)" --fail-fast; then
            ok=true
            break
          fi
          echo "repo sync attempt $i failed"
          sleep 20
        done
        $ok || { echo "repo sync failed"; exit 1; }

    - name: Detect kernel version and prepare msm tree
      shell: bash
      run: |
        set -euo pipefail
        MSM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel"
        cd "$MSM"

        VERSION=$(grep '^VERSION *=' Makefile | awk '{print $3}')
        PATCHLEVEL=$(grep '^PATCHLEVEL *=' Makefile | awk '{print $3}')
        SUBLEVEL=$(grep '^SUBLEVEL *=' Makefile | awk '{print $3}')
        echo "KERNEL_VER=$VERSION.$PATCHLEVEL.$SUBLEVEL" >> "$GITHUB_ENV"

        make ARCH=arm64 mrproper
        mkdir -p out

        ./scripts/kconfig/merge_config.sh -O out -m \
          arch/arm64/configs/gki_defconfig \
          arch/arm64/configs/vendor/${SOC}_GKI.config

        cp out/.config arch/arm64/configs/gki_defconfig
        make O=out ARCH=arm64 olddefconfig </dev/null

    - name: Detect clang
      shell: bash
      run: |
        set -euo pipefail
        KP="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        FOUND=false
        for base in "$KP/prebuilts" "$KP/prebuilts-master"; do
          [ -d "$base/clang/host/linux-x86" ] || continue
          latest=$(ls -d "$base"/clang/host/linux-x86/clang-r*/ 2>/dev/null | sort -V | tail -n1 || true)
          if [ -n "$latest" ] && [ -x "$latest/bin/clang" ]; then
            echo "CLANG_BIN=$latest/bin" >> "$GITHUB_ENV"
            FOUND=true
            break
          fi
        done
        if ! $FOUND; then
          echo "CLANG_BIN=$(dirname "$(command -v clang)")" >> "$GITHUB_ENV"
        fi

    - name: Build kernel prepare targets for backports
      shell: bash
      run: |
        set -euo pipefail
        MSM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel"
        OUT="$MSM/out"

        if [ -n "${CLANG_BIN:-}" ] && [ -x "${CLANG_BIN}/clang" ]; then
          export PATH="${CLANG_BIN}:$PATH"
        fi
        export PATH="/usr/lib/ccache:$PATH"

a        MAKE_FLAGS=(
          LLVM=1
          LLVM_IAS=1
          ARCH=arm64
          SUBARCH=arm64
          CLANG_TRIPLE=aarch64-linux-gnu-
          CROSS_COMPILE=aarch64-linux-gnu-
          CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          LD=ld.lld
          HOSTLD=ld.lld
          AR=llvm-ar
          NM=llvm-nm
          OBJCOPY=llvm-objcopy
          OBJDUMP=llvm-objdump
          DEPMOD=depmod
          DTC=dtc
          STRIP=llvm-strip
          HOSTCC=clang
          HOSTCXX=clang++
          CC=ccache\ clang
        )

        cd "$MSM"
        mkdir -p "$OUT"

        make "${MAKE_FLAGS[@]}" O="$OUT" gki_defconfig

        if [ -x ./scripts/config ]; then
          ./scripts/config --file "$OUT/.config" --disable CONFIG_CFI || true
          ./scripts/config --file "$OUT/.config" --disable CONFIG_CFI_CLANG || true
          ./scripts/config --file "$OUT/.config" --disable CONFIG_LTO_CLANG || true
          ./scripts/config --file "$OUT/.config" --disable CONFIG_LTO_CLANG_THIN || true
          ./scripts/config --file "$OUT/.config" --disable CONFIG_SHADOW_CALL_STACK || true
          ./scripts/config --file "$OUT/.config" --disable CONFIG_KASAN || true
          ./scripts/config --file "$OUT/.config" --disable CONFIG_KASAN_SW_TAGS || true
          ./scripts/config --file "$OUT/.config" --disable CONFIG_KASAN_HW_TAGS || true
          ./scripts/config --file "$OUT/.config" --disable CONFIG_UBSAN || true
          ./scripts/config --file "$OUT/.config" --disable CONFIG_UBSAN_TRAP || true
          ./scripts/config --file "$OUT/.config" --disable CONFIG_UBSAN_BOUNDS || true
        fi

        make "${MAKE_FLAGS[@]}" O="$OUT" olddefconfig </dev/null
        make "${MAKE_FLAGS[@]}" O="$OUT" prepare
        make "${MAKE_FLAGS[@]}" O="$OUT" modules_prepare

        ls -l "$OUT/include/generated/autoconf.h" || true
        ls -l "$OUT/include/config/auto.conf" || true
        ls -ld "$OUT/arch/arm64/include/generated" || true
        grep -E 'CONFIG_(CFI|CFI_CLANG|LTO_CLANG|LTO_CLANG_THIN|SHADOW_CALL_STACK|KASAN|UBSAN)=' "$OUT/.config" || true

    - name: Download stable backports release
      shell: bash
      run: |
        set -euo pipefail
        RELEASE="${{ inputs.backports_release }}"
        URL="https://cdn.kernel.org/pub/linux/kernel/projects/backports/stable/v6.1.97/${RELEASE}.tar.xz"

        wget -O backports.tar.xz "$URL"
        tar -xf backports.tar.xz
        rm -rf backports-stable
        mv "$RELEASE" backports-stable

    - name: Inspect stable backports package
      shell: bash
      run: |
        set -euo pipefail
        cd "$GITHUB_WORKSPACE/backports-stable"

        echo "===== RELEVANT FILES ====="
        find . -type f | grep -E 'mt7921|mt76|cfg80211|mac80211' | head -300 || true

        echo "===== RELEVANT CONFIG ENTRIES ====="
        grep -Rns "config .*MT7921\|config .*MT76\|config .*CFG80211\|config .*MAC80211" . || true

    - name: Configure stable backports for MT7921U
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_BUILD="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel/out"

        if [ -n "${CLANG_BIN:-}" ] && [ -x "${CLANG_BIN}/clang" ]; then
          export PATH="${CLANG_BIN}:$PATH"
        fi
        export PATH="/usr/lib/ccache:$PATH"

        MAKE_FLAGS=(
          LLVM=1
          LLVM_IAS=1
          ARCH=arm64
          SUBARCH=arm64
          CLANG_TRIPLE=aarch64-linux-gnu-
          CROSS_COMPILE=aarch64-linux-gnu-
          CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          LD=ld.lld
          HOSTLD=ld.lld
          AR=llvm-ar
          NM=llvm-nm
          OBJCOPY=llvm-objcopy
          OBJDUMP=llvm-objdump
          DEPMOD=depmod
          DTC=dtc
          STRIP=llvm-strip
          HOSTCC=clang
          HOSTCXX=clang++
          CC=clang
        )

        cd "$GITHUB_WORKSPACE/backports-stable"

        make "${MAKE_FLAGS[@]}" \
          KLIB="$KERNEL_BUILD" \
          KLIB_BUILD="$KERNEL_BUILD" \
          allnoconfig

        printf '%s\n' \
        'CPTCFG_WLAN=y' \
        'CPTCFG_CFG80211=y' \
        'CPTCFG_MAC80211=y' \
        'CPTCFG_WLAN_VENDOR_MEDIATEK=y' \
        'CPTCFG_MT76_CORE=m' \
        'CPTCFG_MT76_USB=m' \
        'CPTCFG_MT76_CONNAC_LIB=m' \
        'CPTCFG_MT792x_LIB=m' \
        'CPTCFG_MT792x_USB=m' \
        'CPTCFG_MT7921_COMMON=m' \
        'CPTCFG_MT7921U=m' \
        'CPTCFG_USB=y' \
        'CPTCFG_PCI=y' \
        'CPTCFG_NL80211_TESTMODE=y' >> .config

        make "${MAKE_FLAGS[@]}" \
          KLIB="$KERNEL_BUILD" \
          KLIB_BUILD="$KERNEL_BUILD" \
          olddefconfig </dev/null || true

        grep -E 'CPTCFG_MT7921U|CPTCFG_MT7921_COMMON|CPTCFG_MT792x_USB|CPTCFG_MT792x_LIB|CPTCFG_MT76_USB|CPTCFG_MT76_CORE|CPTCFG_CFG80211|CPTCFG_MAC80211|CPTCFG_WLAN_VENDOR_MEDIATEK|CPTCFG_WLAN=' .config || true

        if ! grep -q '^CPTCFG_MT7921U=m' .config && ! grep -q '^CPTCFG_MT7921U=y' .config; then
          echo "MT7921U symbol is NOT enabled."
          exit 1
        fi

    - name: Patch backports compat for OnePlus CFI macros
      shell: bash
      run: |
        set -euo pipefail
        cd "$GITHUB_WORKSPACE/backports-stable"

        FILE="backport-include/linux/module.h"
        grep -n "__CFI_ADDRESSABLE" "$FILE" || true

        sed -i 's/__CFI_ADDRESSABLE(init_module, __initdata)/__CFI_ADDRESSABLE(init_module)/g' "$FILE"
        sed -i 's/__CFI_ADDRESSABLE(cleanup_module, __exitdata)/__CFI_ADDRESSABLE(cleanup_module)/g' "$FILE"

        grep -n "__CFI_ADDRESSABLE" "$FILE" || true

    - name: Build stable backports against OP11R kernel tree
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_BUILD="$GITHUB_WORKSPACE/$CONFIG/kernel_platform/msm-kernel/out"

        if [ -n "${CLANG_BIN:-}" ] && [ -x "${CLANG_BIN}/clang" ]; then
          export PATH="${CLANG_BIN}:$PATH"
        fi
        export PATH="/usr/lib/ccache:$PATH"

        MAKE_FLAGS=(
          LLVM=1
          LLVM_IAS=1
          ARCH=arm64
          SUBARCH=arm64
          CLANG_TRIPLE=aarch64-linux-gnu-
          CROSS_COMPILE=aarch64-linux-gnu-
          CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          LD=ld.lld
          HOSTLD=ld.lld
          AR=llvm-ar
          NM=llvm-nm
          OBJCOPY=llvm-objcopy
          OBJDUMP=llvm-objdump
          DEPMOD=depmod
          DTC=dtc
          STRIP=llvm-strip
          HOSTCC=clang
          HOSTCXX=clang++
          CC=clang
        )

        cd "$GITHUB_WORKSPACE/backports-stable"

        make -j"$(nproc --all)" "${MAKE_FLAGS[@]}" \
          KLIB="$KERNEL_BUILD" \
          KLIB_BUILD="$KERNEL_BUILD" \
          V=1 \
          2>&1 | tee "$GITHUB_WORKSPACE/backports-build.log"

        KO_COUNT=$(find . -type f -name '*.ko' | wc -l || true)
        echo "KO_COUNT=$KO_COUNT"

        if [ "$KO_COUNT" -eq 0 ]; then
          echo "Build completed without producing any .ko modules."
          exit 1
        fi

    - name: Collect artifacts
      if: always()
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p artifacts

        [ -f "$GITHUB_WORKSPACE/backports-stable/.config" ] && cp -f "$GITHUB_WORKSPACE/backports-stable/.config" artifacts/backports.config || true
        [ -f "$GITHUB_WORKSPACE/backports-build.log" ] && cp -f "$GITHUB_WORKSPACE/backports-build.log" artifacts/ || true
        [ -f "$GITHUB_WORKSPACE/backports-stable/Module.symvers" ] && cp -f "$GITHUB_WORKSPACE/backports-stable/Module.symvers" artifacts/ || true

        find "$GITHUB_WORKSPACE/backports-stable" -type f -name '*.ko' -exec cp --parents {} artifacts/ \; || true
        find "$GITHUB_WORKSPACE/backports-stable" -type f | grep -E 'mt7921|mt76|cfg80211|mac80211' > artifacts/relevant-files.txt || true

        cd artifacts
        zip -r "$GITHUB_WORKSPACE/$CONFIG/artifacts/backports-mt7921-build.zip" . || true

    - name: Create Magisk module for built backports
      if: always()
      shell: bash
      run: |
        set -euo pipefail
        MODDIR="$GITHUB_WORKSPACE/$CONFIG/artifacts/magisk-mt7921u"
        SRCDIR="$GITHUB_WORKSPACE/backports-stable"
        ZIPOUT="$GITHUB_WORKSPACE/$CONFIG/artifacts/mt7921u-backports-magisk.zip"

        rm -rf "$MODDIR"
        mkdir -p "$MODDIR/system/vendor/lib/modules"

        find "$SRCDIR" -type f -name '*.ko' -exec cp {} "$MODDIR/system/vendor/lib/modules/" \;

        cat > "$MODDIR/module.prop" <<'EOF'
          id=mt7921u_backports
          name=MT7921U Backports for OP11R
          version=1.0
          versionCode=1
          author=docdry0001
          description=Backports-built MT7921U stack for OP11R
          EOF

        cat > "$MODDIR/post-fs-data.sh" <<'EOF'
          #!/system/bin/sh
          MODDIR=${0%/*}
          MODPATH="$MODDIR/system/vendor/lib/modules"
          
          load_if_present() {
            [ -f "$MODPATH/$1" ] && insmod "$MODPATH/$1" 2>/dev/null || true
          }
          
          load_if_present compat.ko
          load_if_present cfg80211.ko
          load_if_present mac80211.ko
          load_if_present mt76.ko
          load_if_present mt76-usb.ko
          load_if_present mt76-connac-lib.ko
          load_if_present mt792x-lib.ko
          load_if_present mt792x-usb.ko
          load_if_present mt7921-common.ko
          load_if_present mt7921u.ko
          EOF
        chmod +x "$MODDIR/post-fs-data.sh"

        cat > "$MODDIR/service.sh" <<'EOF'
          #!/system/bin/sh
          sleep 8
          MODDIR=${0%/*}
          MODPATH="$MODDIR/system/vendor/lib/modules"
          
          for m in \
            compat.ko \
            cfg80211.ko \
            mac80211.ko \
            mt76.ko \
            mt76-usb.ko \
            mt76-connac-lib.ko \
            mt792x-lib.ko \
            mt792x-usb.ko \
            mt7921-common.ko \
            mt7921u.ko
          do
            [ -f "$MODPATH/$m" ] && insmod "$MODPATH/$m" 2>/dev/null || true
          done
          EOF
        chmod +x "$MODDIR/service.sh"

        cat > "$MODDIR/customize.sh" <<'EOF'
          #!/system/bin/sh
          ui_print "Installing MT7921U backports module"
          EOF
        chmod +x "$MODDIR/customize.sh"

        cd "$MODDIR"
        zip -r "$ZIPOUT" .

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.CONFIG }}-backports-mt7921-stable
        path: |
          artifacts
          ${{ github.workspace }}/${{ env.CONFIG }}/artifacts/backports-mt7921-build.zip
          ${{ github.workspace }}/${{ env.CONFIG }}/artifacts/mt7921u-backports-magisk.zip
        if-no-files-found: warn
