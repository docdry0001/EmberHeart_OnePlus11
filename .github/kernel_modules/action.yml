name: Build OnePlus kernel modules

permissions:
  contents: write
  actions: write

inputs:
  op_config_json:
    description: 'JSON string containing full device config'
    required: true
    type: string
  optimize_level:
    required: false
    type: string
    default: O2
  manifest:
    required: true
    type: string
    default: OOS16

runs:
  using: composite
  steps:
    - name: Parse op_config_json
      shell: bash
      run: |
        set -euo pipefail
        echo '${{ inputs.op_config_json }}' > /tmp/config.json
        jq -r 'to_entries[] | "\(.key | ascii_upcase)=\(.value)"' /tmp/config.json >> "$GITHUB_ENV"
        echo "Parsed config:"
        jq '.' /tmp/config.json

    - name: Set Manifest
      shell: bash
      run: |
        set -euo pipefail
        echo "MANIFEST=$MANIFEST_${{ inputs.manifest }}_MODULES" >> "$GITHUB_ENV"

    - name: Validate Inputs
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Validate inputs"
        model="$MODEL"
        soc="$SOC"
        branch="$BRANCH"
        manifest="$MANIFEST"
        optimize='${{ inputs.optimize_level }}'

        [[ -n "$model" ]] || { echo "Input 'model' cannot be empty"; exit 1; }
        [[ -n "$soc" ]] || { echo "Input 'soc' cannot be empty"; exit 1; }
        [[ -n "$branch" ]] || { echo "Input 'branch' cannot be empty"; exit 1; }
        [[ -n "$manifest" ]] || { echo "Input 'manifest' cannot be empty"; exit 1; }

        if ! [[ "$soc" =~ ^[A-Za-z0-9_-]+$ ]]; then
          echo "Input 'soc' contains invalid characters. Allowed: letters, digits, underscore, dash"
          exit 1
        fi

        if ! [[ "$branch" =~ ^[A-Za-z0-9._/-]+$ ]]; then
          echo "Input 'branch' contains invalid characters. Allowed: letters, digits, ., _, -, /"
          exit 1
        fi

        if [[ "$manifest" == http*://* ]]; then
          if ! [[ "$manifest" =~ ^https:// ]]; then
            echo "Manifest URL must be HTTPS"
            exit 1
          fi
          if ! [[ "$manifest" =~ \.xml($|\?) ]]; then
            echo "Manifest URL should point to an XML file (.xml)"
            exit 1
          fi
        else
          if ! [[ "$manifest" =~ \.xml$ ]]; then
            echo "Manifest filename must end with .xml"
            exit 1
          fi
          if [[ "$manifest" =~ [[:space:]] ]]; then
            echo "Manifest filename cannot contain spaces"
            exit 1
          fi
        fi

        case "$optimize" in
          O2|O3) ;;
          *)
            echo "optimize_level must be O2 or O3; got '$optimize'"
            exit 1
            ;;
        esac

        echo "Input validation OK."
        echo "::endgroup::"

    - name: Aggressive cleanup
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Cleanup space"
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/share/swift
        sudo rm -rf /usr/local/.ghcup
        sudo rm -rf /usr/local/julia*
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /usr/local/share/chromium
        sudo rm -rf /opt/microsoft /opt/google
        sudo rm -rf /opt/az
        sudo rm -rf /usr/local/share/powershell
        sudo rm -rf /opt/hostedtoolcache
        docker system prune -af || true
        docker builder prune -af || true
        df -h
        echo "::endgroup::"

    - name: Install Minimal Dependencies
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Install deps"
        sudo apt-get -o Acquire::Retries=3 update -qq
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
          git curl ca-certificates build-essential clang lld flex bison \
          libelf-dev libssl-dev libncurses-dev zlib1g-dev liblz4-tool \
          libxml2-utils rsync unzip dwarves file python3 ccache jq bc kmod perl
        sudo apt-get clean
        echo "::endgroup::"

    - name: Setup Base Environment
      shell: bash
      run: |
        set -euo pipefail
        CONFIG="$MODEL"
        echo "CONFIG=$CONFIG" >> "$GITHUB_ENV"

        REPO="/usr/local/bin/repo"
        if [ ! -x "$REPO" ]; then
          curl -s https://storage.googleapis.com/git-repo-downloads/repo -o "$REPO"
          chmod +x "$REPO"
        fi
        echo "REPO=$REPO" >> "$GITHUB_ENV"

    - name: Initialize and Sync Kernel Source
      shell: bash
      run: |
        set -euo pipefail
        echo "Creating folder for configuration: $CONFIG"
        mkdir -p "$CONFIG"
        cd "$CONFIG"
        echo "Initializing and syncing kernel source..."

        if [[ "$MANIFEST" == https://* ]]; then
          mkdir -p .repo/manifests
          curl --fail --show-error --location --proto '=https' "$MANIFEST" -o .repo/manifests/temp_manifest.xml
          "$REPO" init -u https://github.com/OnePlusOSS/kernel_manifest.git -b oneplus/sm8650 -m temp_manifest.xml --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags
        else
          "$REPO" init -u https://github.com/OnePlusOSS/kernel_manifest.git -b "$BRANCH" -m "$MANIFEST" --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags
        fi

        "$REPO" --version
        success=false
        for i in 1 2 3; do
          if "$REPO" sync -c --no-clone-bundle --no-tags --optimized-fetch -j"$(nproc --all)" --fail-fast; then
            success=true
            break
          fi
          echo "repo sync attempt $i failed; retrying..."
          sleep 30
        done
        $success || { echo "repo sync failed after 3 attempts"; exit 1; }

    - name: Get Kernel Version Info
      shell: bash
      run: |
        set -euo pipefail
        CONFIG_DIR="$GITHUB_WORKSPACE/$CONFIG"
        ARTIFACTS_DIR="$CONFIG_DIR/artifacts"
        mkdir -p "$ARTIFACTS_DIR"
        cd "$CONFIG_DIR/kernel_platform/msm-kernel"

        CONFIG_FILES=("build.config.common" "build.config.constants")
        BRANCH_LINE=""
        for f in "${CONFIG_FILES[@]}"; do
          if [ -f "$f" ]; then
            l=$(grep '^[[:space:]]*BRANCH=' "$f" || true)
            if [ -n "$l" ]; then
              BRANCH_LINE="$l"
              break
            fi
          fi
        done

        if [ -z "$BRANCH_LINE" ]; then
          echo "Error: No BRANCH= found"
          exit 1
        fi

        BRANCH_VALUE="${BRANCH_LINE#*=}"
        ANDROID_VERSION="${BRANCH_VALUE%-*}"
        if [ -z "$ANDROID_VERSION" ]; then
          echo "Could not parse android version from BRANCH=$BRANCH_VALUE"
          exit 1
        fi

        VERSION=$(grep '^VERSION *=' Makefile | awk '{print $3}')
        PATCHLEVEL=$(grep '^PATCHLEVEL *=' Makefile | awk '{print $3}')
        SUBLEVEL=$(grep '^SUBLEVEL *=' Makefile | awk '{print $3}')
        FULL_VERSION="$VERSION.$PATCHLEVEL.$SUBLEVEL"

        cd "$ARTIFACTS_DIR"
        echo "ANDROID_VER=$ANDROID_VERSION" >> "$GITHUB_ENV"
        echo "KERNEL_VER=$VERSION.$PATCHLEVEL" >> "$GITHUB_ENV"
        echo "KERNEL_FULL_VER=$ANDROID_VERSION-$FULL_VERSION" >> "$GITHUB_ENV"
        echo "SUSFS_KERNEL_BRANCH=gki-$ANDROID_VERSION-$VERSION.$PATCHLEVEL" >> "$GITHUB_ENV"

    - name: Setup ccache (manual)
      shell: bash
      run: |
        set -euo pipefail
        ccache --version || true
        ccache -M 5G || true
        ccache -s || true

    - name: Clean Up ABI Protected Exports
      shell: bash
      run: |
        set -euo pipefail
        cd "$CONFIG/kernel_platform"
        rm -f msm-kernel/android/abi_gki_protected_exports_* || true
        df -h

    - name: Merge
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PLATFORM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        MSM="$KERNEL_PLATFORM/msm-kernel"
        OUT=out

        cd "$MSM"
        make ARCH=arm64 mrproper
        mkdir -p "$OUT"

        ./scripts/kconfig/merge_config.sh -O "$OUT" -m arch/arm64/configs/gki_defconfig arch/arm64/configs/vendor/${SOC}_GKI.config
        cp "$OUT/.config" arch/arm64/configs/gki_defconfig
        rm "$OUT/.config"

    - name: Enable mt7921u backport in kernel config
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PATH="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        MSM="$KERNEL_PATH/msm-kernel"
        DEFCONFIG="$MSM/arch/arm64/configs/gki_defconfig"

        cd "$MSM"
        chmod +x ./scripts/config

        ./scripts/config --file "$DEFCONFIG" --enable WLAN
        ./scripts/config --file "$DEFCONFIG" --module CFG80211
        ./scripts/config --file "$DEFCONFIG" --module MAC80211
        ./scripts/config --file "$DEFCONFIG" --enable WLAN_VENDOR_MEDIATEK

        ./scripts/config --file "$DEFCONFIG" --module MT76_CORE
        ./scripts/config --file "$DEFCONFIG" --module MT76_USB
        ./scripts/config --file "$DEFCONFIG" --module MT76_CONNAC_LIB
        ./scripts/config --file "$DEFCONFIG" --module MT7921_COMMON
        ./scripts/config --file "$DEFCONFIG" --module MT7921U

        ./scripts/config --file "$DEFCONFIG" --module MT76_LEDS || true
        ./scripts/config --file "$DEFCONFIG" --module MAC80211_LEDS || true

        ./scripts/config --file "$DEFCONFIG" --disable LTO || true
        ./scripts/config --file "$DEFCONFIG" --disable LTO_CLANG || true
        ./scripts/config --file "$DEFCONFIG" --disable LTO_CLANG_THIN || true
        ./scripts/config --file "$DEFCONFIG" --disable CFI || true
        ./scripts/config --file "$DEFCONFIG" --disable CFI_CLANG || true
        ./scripts/config --file "$DEFCONFIG" --disable SHADOW_CALL_STACK || true

        make O=out olddefconfig

    - name: FIX vmscan scan_adjusted (waipio)
      if: env.SOC == 'waipio'
      shell: bash
      run: |
        set -euo pipefail
        cd "$CONFIG/kernel_platform/msm-kernel/mm"
        sed -i '/bool scan_adjusted = false;/d' vmscan.c
        perl -0pi -e 's/(unsigned long nr_reclaimed = 0;\n\s*unsigned long nr_to_reclaim = sc->nr_to_reclaim;\n\s*)bool proportional_reclaim;/$1bool proportional_reclaim __maybe_unused;\n\tbool scan_adjusted = false;/s' vmscan.c
        grep -n -A4 -B4 "nr_to_reclaim = sc->nr_to_reclaim" vmscan.c | head -20
        grep -n "scan_adjusted" vmscan.c | head -20

    - name: FIX thermal kvzalloc kvfree (waipio)
      if: env.SOC == 'waipio'
      shell: bash
      run: |
        set -euo pipefail
        export FILE="$CONFIG/kernel_platform/msm-kernel/drivers/thermal/thermal_sysfs.c"
        python3 - <<'PY'
        import os
        from pathlib import Path
        path = Path(os.environ["FILE"])
        text = path.read_text()
        if "#include <linux/mm.h>" not in text and "#include <linux/slab.h>" in text:
            text = text.replace("#include <linux/slab.h>", "#include <linux/slab.h>\n#include <linux/mm.h>", 1)
        if "#define kvzalloc(size, flags)" not in text:
            shim = (
                "\n#ifndef kvzalloc\n"
                "#define kvzalloc(size, flags) kzalloc((size), (flags))\n"
                "#endif\n"
                "#ifndef kvfree\n"
                "#define kvfree(ptr) kfree((ptr))\n"
                "#endif\n"
            )
            if "#include <linux/mm.h>" in text:
                text = text.replace("#include <linux/mm.h>", "#include <linux/mm.h>" + shim, 1)
            elif "#include <linux/slab.h>" in text:
                text = text.replace("#include <linux/slab.h>", "#include <linux/slab.h>" + shim, 1)
        path.write_text(text)
        PY
        grep -n -E 'linux/mm.h|kvzalloc|kvfree' "$FILE" | head -20

    - name: FIX binder mmget_still_valid compat (waipio)
      if: env.SOC == 'waipio'
      shell: bash
      run: |
        set -euo pipefail
        FILE="$CONFIG/kernel_platform/msm-kernel/drivers/android/binder_alloc.c"
        sed -i '/^#include <linux\/mm.h>$/d' "$FILE"
        sed -i '/HAVE_MMGET_STILL_VALID_COMPAT/,+5d' "$FILE"
        sed -i 's/mmget_still_valid_still_valid/mmget_still_valid/g' "$FILE"
        grep -q '^#include <linux/sched/mm.h>$' "$FILE" || \
          sed -i '/^#include <linux\/list.h>$/a #include <linux/sched/mm.h>' "$FILE"
        grep -q 'HAVE_MMGET_STILL_VALID_COMPAT' "$FILE" || \
          perl -0pi -e 's@(#include <linux/sched/mm.h>\n)@$1#ifndef HAVE_MMGET_STILL_VALID_COMPAT\n#define HAVE_MMGET_STILL_VALID_COMPAT\nstatic inline bool mmget_still_valid(struct mm_struct *mm)\n{\n\treturn likely(!mm->core_state);\n}\n#endif\n@' "$FILE"
        grep -n '^#include <linux/sched/mm.h>$' "$FILE" | head -5
        grep -n 'mmget_still_valid' "$FILE" | head -20

    - name: Replace in-tree mt76 with 5.10 backport
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PATH="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        MSM="$KERNEL_PATH/msm-kernel"
        MT76_DST="$MSM/drivers/net/wireless/mediatek/mt76"
        TMP_DIR="$GITHUB_WORKSPACE/mt76-backport"

        rm -rf "$TMP_DIR"
        git clone --depth=1 https://github.com/shengliangd/mt76-backport.git "$TMP_DIR"

        rm -rf "$MT76_DST"
        mkdir -p "$(dirname "$MT76_DST")"
        cp -a "$TMP_DIR" "$MT76_DST"

        echo "[+] Replaced in-tree mt76 with 5.10 backport"
        test -f "$MT76_DST/mt7921/usb.c"

    - name: Patch mt76-backport for Snapdragon kernel (disable WED)
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PATH="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        MSM="$KERNEL_PATH/msm-kernel"
        MT76_DIR="$MSM/drivers/net/wireless/mediatek/mt76"

        echo "[*] Patching mt76-backport for non-MediaTek kernel..."

        sed -i '/linux\/soc\/mediatek\/mtk_wed.h/d' "$MT76_DIR/mt76.h"

        python3 - <<PY
        from pathlib import Path

        p = Path(r"$MT76_DIR/mt76.h")
        txt = p.read_text()

        marker = "#include <linux/etherdevice.h>\n"
        stub = r'''
        #ifndef __MT76_WED_STUBS_H
        #define __MT76_WED_STUBS_H

        struct mtk_wed_device { int dummy; };
        struct mtk_wed_ops { int dummy; };

        enum mtk_wed_bus_type {
            MTK_WED_BUS_PCIE = 0,
            MTK_WED_BUS_AXI = 1,
            MTK_WED_BUS_USB = 2,
        };

        #define mtk_wed_device_active(...)            false
        #define mtk_wed_get_rx_capa(...)              false
        #define mtk_wed_device_attach(...)            (-1)
        #define mtk_wed_device_detach(...)            do { } while (0)
        #define mtk_wed_device_start(...)             do { } while (0)
        #define mtk_wed_device_stop(...)              do { } while (0)
        #define mtk_wed_device_tx_ring_setup(...)     0
        #define mtk_wed_device_rx_ring_setup(...)     0
        #define mtk_wed_device_dma_reset(...)         do { } while (0)
        #define mtk_wed_device_ppe_check(...)         false
        #define mtk_wed_device_irq_set_mask(...)      do { } while (0)
        #define mtk_wed_device_update_msg(...)        do { } while (0)
        #define mtk_wed_get_pci_bus(...)              NULL
        #define mtk_wed_device_setup_tc(...)          0
        #define mtk_wed_device_txfree(...)            false
        #define mtk_wed_device_register(...)          0
        #define mtk_wed_device_unregister(...)        do { } while (0)

        #endif
        '''

        if "__MT76_WED_STUBS_H" not in txt:
            if marker in txt:
                txt = txt.replace(marker, marker + stub + "\n", 1)
            else:
                txt = stub + "\n" + txt

        p.write_text(txt)
        PY

        echo "[*] mt76-backport WED patch applied"
        grep -n 'mtk_wed' "$MT76_DIR/mt76.h" || true

    - name: Patch mt76-backport uninitialized sar_power
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PATH="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        MSM="$KERNEL_PATH/msm-kernel"
        FILE="$MSM/drivers/net/wireless/mediatek/mt76/mt76_connac_mcu.c"

        sed -i 's/s8 reg_power, sar_power;/s8 reg_power = 0, sar_power = 0;/' "$FILE"
        grep -n "reg_power = 0, sar_power = 0" "$FILE"

    - name: Disable -Werror for mt76 backport
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PATH="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        MSM="$KERNEL_PATH/msm-kernel"
        MT76_DIR="$MSM/drivers/net/wireless/mediatek/mt76"

        find "$MT76_DIR" -type f -name Makefile -exec sed -i 's/-Werror//g' {} +
        find "$MT76_DIR" -type f -exec sed -i 's/-Werror//g' {} +

    - name: Detect Clang (toolchain for build)
      shell: bash
      run: |
        set -euo pipefail
        KP="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        CLANG_FOUND=false

        for base in "$KP/prebuilts" "$KP/prebuilts-master"; do
          [ -d "$base/clang/host/linux-x86" ] || continue
          latest=$(ls -d "$base"/clang/host/linux-x86/clang-r*/ 2>/dev/null | sort -V | tail -n1 || true)
          if [ -n "$latest" ] && [ -x "$latest/bin/clang" ]; then
            CLANG_BIN="$latest/bin"
            CLANG_FOUND=true
          fi
        done

        if ! $CLANG_FOUND && command -v clang >/dev/null 2>&1; then
          CLANG_BIN="$(dirname "$(command -v clang)")"
          CLANG_FOUND=true
          echo "Using system clang."
        fi

        $CLANG_FOUND || { echo "No clang toolchain found"; exit 1; }
        echo "CLANG_BIN_PATH=$CLANG_BIN" >> "$GITHUB_ENV"
        CLANG_VERSION="$("$CLANG_BIN/clang" --version | head -n1)"
        echo "CLANG_VERSION=$CLANG_VERSION" >> "$GITHUB_ENV"
        echo "Detected Clang: $CLANG_VERSION"

    - name: Build Kernel Modules
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PLATFORM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        MSM="$KERNEL_PLATFORM/msm-kernel"
        OUT="$MSM/out"
        INSTALL_MOD_PATH="$OUT"

        cd "$MSM"

        export PATH="${CLANG_BIN_PATH}:$PATH"
        export PATH="/usr/lib/ccache:$PATH"

        MAKE_FLAGS=(
          LLVM=1
          LLVM_IAS=1
          ARCH=arm64
          SUBARCH=arm64
          CLANG_TRIPLE=aarch64-linux-gnu-
          CROSS_COMPILE=aarch64-linux-gnu-
          CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          LD=ld.lld
          HOSTLD=ld.lld
          AR=llvm-ar
          NM=llvm-nm
          OBJCOPY=llvm-objcopy
          OBJDUMP=llvm-objdump
          DEPMOD=depmod
          DTC=dtc
          STRIP=llvm-strip
          HOSTCC=clang
          HOSTCXX=clang++
          CC="ccache clang"
        )

        JOBS=2
        mkdir -p "$OUT"

        echo "[*] System info:"
        nproc || true
        free -h || true

        echo "[*] Preparing kernel config"
        make -j"$JOBS" "${MAKE_FLAGS[@]}" O="$OUT" gki_defconfig
        make -j"$JOBS" "${MAKE_FLAGS[@]}" O="$OUT" olddefconfig

        echo "[*] Forcing LTO/CFI OFF in active .config"
        ./scripts/config --file "$OUT/.config" --disable LTO || true
        ./scripts/config --file "$OUT/.config" --disable LTO_CLANG || true
        ./scripts/config --file "$OUT/.config" --disable LTO_CLANG_THIN || true
        ./scripts/config --file "$OUT/.config" --disable CFI || true
        ./scripts/config --file "$OUT/.config" --disable CFI_CLANG || true
        ./scripts/config --file "$OUT/.config" --disable SHADOW_CALL_STACK || true

        sed -i 's/^CONFIG_LTO=y/# CONFIG_LTO is not set/' "$OUT/.config" || true
        sed -i 's/^CONFIG_LTO_CLANG=y/# CONFIG_LTO_CLANG is not set/' "$OUT/.config" || true
        sed -i 's/^CONFIG_LTO_CLANG_THIN=y/# CONFIG_LTO_CLANG_THIN is not set/' "$OUT/.config" || true
        sed -i 's/^CONFIG_CFI=y/# CONFIG_CFI is not set/' "$OUT/.config" || true
        sed -i 's/^CONFIG_CFI_CLANG=y/# CONFIG_CFI_CLANG is not set/' "$OUT/.config" || true
        sed -i 's/^CONFIG_SHADOW_CALL_STACK=y/# CONFIG_SHADOW_CALL_STACK is not set/' "$OUT/.config" || true

        make "${MAKE_FLAGS[@]}" O="$OUT" olddefconfig
        
        echo "[*] Checking active config"
        grep -E 'CONFIG_(LTO|LTO_CLANG|LTO_CLANG_THIN|CFI|CFI_CLANG|SHADOW_CALL_STACK)' "$OUT/.config" || true

        export KBUILD_BUILD_TIMESTAMP="$(date)"

        echo "[*] Building in-tree modules"
        set +e
        timeout 30m make -j"$JOBS" "${MAKE_FLAGS[@]}" O="$OUT" modules 2>&1 | tee "$OUT/build-modules.log"
        BUILD_RC=${PIPESTATUS[0]}
        set -e

        if [ "$BUILD_RC" -ne 0 ]; then
          echo "==== FIRST 20 ERRORS ===="
          grep -n -m 20 -E 'error:|fatal error:|undefined reference|No rule to make target' "$OUT/build-modules.log" || true
          exit "$BUILD_RC"
        fi

        echo "[*] Installing in-tree modules"
        make -j"$JOBS" "${MAKE_FLAGS[@]}" O="$OUT" INSTALL_MOD_PATH="$INSTALL_MOD_PATH" modules_install

        echo "[*] Collecting modules"
        UNAME="$(find "$OUT/lib/modules" -mindepth 1 -maxdepth 1 -type d | head -n1 | xargs basename)"
        mkdir -p "$OUT/modules"
        find "$OUT/lib/modules/$UNAME" -type f -name '*.ko' -exec cp {} "$OUT/modules/" \;

        echo "[*] MT7921 check"
        find "$OUT/modules" -type f -name '*.ko' | sort | grep -E 'mt76|mt7921|cfg80211|mac80211' || true

        if ! find "$OUT/modules" -type f -name 'mt7921u*.ko' | grep -q .; then
          echo "::error::mt7921u.ko was not produced"
          exit 1
        fi

        echo "[+] mt7921u.ko detected successfully"

    - name: Filter modules
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PLATFORM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        MSM="$KERNEL_PLATFORM/msm-kernel"
        OUT="$MSM/out"

        cd "$OUT"
        mkdir -p modules
        find lib/modules -type f -name '*.ko' -exec cp {} modules/ \;

        cd modules
        find . -type f -name '*.ko' \
          ! -name 'mt*.ko' \
          ! -name 'cfg80211*.ko' \
          ! -name 'mac80211*.ko' \
          -delete

        echo "Remaining modules:"
        find . -type f -name '*.ko' | sort

    - name: Verify expected MT7921 modules
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_PLATFORM="$GITHUB_WORKSPACE/$CONFIG/kernel_platform"
        MSM="$KERNEL_PLATFORM/msm-kernel"
        OUT="$MSM/out/modules"

        echo "Checking for mt7921 artifacts..."
        find "$OUT" -type f -name '*.ko' | sort | grep -E 'mt76|mt7921|cfg80211|mac80211' || true

        if ! find "$OUT" -type f -name 'mt7921u*.ko' | grep -q .; then
          echo "::error::mt7921u.ko was not produced"
          exit 1
        fi

    - name: Create Kernel Modules zip
      id: create_zip
      shell: bash
      run: |
        set -euo pipefail
        CONFIG_DIR="$GITHUB_WORKSPACE/$CONFIG"
        KERNEL_PLATFORM="$CONFIG_DIR/kernel_platform"
        MSM="$KERNEL_PLATFORM/msm-kernel"
        OUT="$MSM/out"
        MODULES_SRC="$OUT/modules"
        MODULES_ZIP="$CONFIG_DIR/artifacts/kernel_modules_${{ env.MODEL }}.zip"

        mkdir -p "$CONFIG_DIR/artifacts"
        find "$MODULES_SRC" -type f -name '*.ko' -print0 | xargs -0 zip -j "$MODULES_ZIP"
        echo "Packaged kernel modules to $MODULES_ZIP"

    - name: Final Build Summary
      shell: bash
      run: |
        set -euo pipefail
        {
          echo "CCache Statistics :"
          echo "$(/usr/bin/ccache -s)"
        } | tee summary.txt
        {
          echo "### Kernel Modules Build Summary"
          echo ""
          echo "CCache Statistics :"
          echo "$(ccache -s -v)"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Upload Kernel Modules zip
      if: success() && steps.create_zip.conclusion == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: kernel-modules-${{ env.CONFIG }}
        path: ${{ env.CONFIG }}/artifacts/
